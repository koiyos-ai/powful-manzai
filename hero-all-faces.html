<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>主人公 表情差分5種 (コードのみ生成)</title>
<style>
  :root{ --bg:#15122c; --panel:#1f1a45; --line:#332e63; --ink:#cdd6f5; --accent:#9ad0ff; --yellow:#ffce2b; --good:#7ee0a0; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif;}
  body{padding:14px 12px 60px;}
  h1{font-size:17px;color:var(--yellow);text-align:center;margin:6px 0 2px;font-weight:800;}
  p.note{font-size:11.5px;color:#8a93c0;text-align:center;margin:0 0 18px;line-height:1.7;}
  .wrap{max-width:640px;margin:0 auto;}
  .card{background:var(--panel);border:2px solid var(--line);border-radius:16px;padding:14px 12px;margin:0 0 16px;}
  .ttl{font-size:13px;font-weight:800;color:var(--accent);margin:0 0 4px;}
  .sub{font-size:10.5px;color:#8a93c0;margin:0 0 12px;line-height:1.6;}
  .stage{background:
      linear-gradient(45deg,#2a2456 25%,transparent 25%,transparent 75%,#2a2456 75%),
      linear-gradient(45deg,#2a2456 25%,#241f4d 25%,#241f4d 75%,#2a2456 75%);
    background-size:16px 16px;background-position:0 0,8px 8px;border-radius:10px;padding:12px;}
  .row{display:flex;justify-content:center;align-items:flex-end;gap:14px;flex-wrap:wrap;}
  .col{text-align:center;}
  .col img{image-rendering:pixelated;image-rendering:crisp-edges;display:block;margin:0 auto;}
  .cap{font-size:10px;color:#8a93c0;margin-top:7px;font-weight:700;}
  .h3{height:192px;} .h5{height:320px;}
  .badge{display:inline-block;font-size:10px;font-weight:800;color:#0c2b18;background:var(--good);
    border-radius:8px;padding:1px 8px;margin-left:6px;}
  .big-toggle{text-align:center;margin-top:10px;}
  button{background:var(--line);color:var(--ink);border:0;border-radius:10px;
    padding:8px 16px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;}
  button.on{background:var(--yellow);color:#3a2c00;}
</style>
</head>
<body>
<div class="wrap">
<h1>主人公 表情差分 5種 <span class="badge">生成AI不使用</span></h1>
<p class="note">64×96・固定14色。基本マスターから目＋眉の行だけをテキスト編集して再レンダリング。<br>
それ以外の行はバイト単位で基本と同一＝絵柄がブレない。</p>

<div class="card">
  <div class="ttl">5表情ならべ</div>
  <div class="sub">左から: 基本 / 笑い / 驚き / スベリ / ツッコミ</div>
  <div class="stage"><div class="row" id="lineup">
    <div class="col"><img class="h3" src="_pxmap_hero.png"><div class="cap">基本</div></div>
    <div class="col"><img class="h3" src="_pxmap_hero_warai.png"><div class="cap">笑い</div></div>
    <div class="col"><img class="h3" src="_pxmap_hero_odoroki.png"><div class="cap">驚き</div></div>
    <div class="col"><img class="h3" src="_pxmap_hero_suberi.png"><div class="cap">スベリ</div></div>
    <div class="col"><img class="h3" src="_pxmap_hero_tsukkomi.png"><div class="cap">ツッコミ</div></div>
  </div></div>
</div>

<div class="card">
  <div class="ttl">大きく見る（タップで切替）</div>
  <div class="big-toggle" id="btns">
    <button data-src="_pxmap_hero.png" class="on">基本</button>
    <button data-src="_pxmap_hero_warai.png">笑い</button>
    <button data-src="_pxmap_hero_odoroki.png">驚き</button>
    <button data-src="_pxmap_hero_suberi.png">スベリ</button>
    <button data-src="_pxmap_hero_tsukkomi.png">ツッコミ</button>
  </div>
  <div class="stage" style="margin-top:10px;"><div class="row">
    <div class="col"><img class="h5" id="bigimg" src="_pxmap_hero.png"></div>
  </div></div>
</div>

<div class="card">
  <div class="ttl">元イラスト(参照)との比較</div>
  <div class="stage"><div class="row">
    <div class="col"><img class="h5" src="images/parts/hero_master.png" style="height:320px;width:auto;border-radius:8px;"><div class="cap">元イラスト</div></div>
    <div class="col"><img class="h5" src="_pxmap_hero.png"><div class="cap">ドット絵マスター</div></div>
  </div></div>
</div>
</div>
<script>
  const btns = document.getElementById('btns');
  const big = document.getElementById('bigimg');
  btns.addEventListener('click', e => {
    const b = e.target.closest('button'); if(!b) return;
    btns.querySelectorAll('button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    big.src = b.dataset.src;
  });
</script>
</body>
</html>
