<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16234f">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パワフル漫才">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<title>パワフル漫才 ─ サクセス(育成)</title>
<style>
  :root{
    --ink:#16234f;
    --ink2:#2c3c7a;
    --pop-yellow:#ffce2b;
    --pop-red:#ff5252;
    --pop-blue:#34a6ff;
    --pop-green:#3ccf6e;
    --pop-orange:#ff9a3c;
    --pop-purple:#b06bff;
    --cream:#fff8e6;
    --panel:#fbf2dc;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:#0a1130;color:var(--ink);
    font-family:'DotGothic16','Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;
    font-weight:800;touch-action:manipulation;
    user-select:none;-webkit-user-select:none;overscroll-behavior:none;
  }
  #app{
    position:fixed;inset:0;max-width:520px;margin:0 auto;
    height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
    background:#0a1130;
  }

  /* ============ 上部 HUD ============ */
  #topbar{
    flex:none;display:flex;align-items:center;gap:8px;
    padding:7px 9px;
    background:linear-gradient(180deg,#33459e 0%,#243a86 50%,#1b2c6e 100%);
    box-shadow:0 3px 8px rgba(0,0,0,.4);z-index:6;
    border-bottom:2px solid #0a1130;
  }
  #season-badge{
    flex:none;width:46px;height:46px;border-radius:13px;position:relative;
    border:2.5px solid rgba(255,255,255,.9);
    box-shadow:0 2px 5px rgba(0,0,0,.35),inset 0 2px 3px rgba(255,255,255,.4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;line-height:1;
  }
  #season-badge .se-month{font-size:18px;font-weight:900;letter-spacing:.02em;text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .se-spring{background:linear-gradient(160deg,#5fe08a,#27b057);}
  .se-summer{background:linear-gradient(160deg,#5cc0ff,#1f8fe0);}
  .se-autumn{background:linear-gradient(160deg,#ffb35c,#ef861f);}
  .se-winter{background:linear-gradient(160deg,#c79bff,#8e5ad8);}
  #cal-text{flex:none;color:#fff;line-height:1.2;min-width:84px;}
  #cal-text .cy{font-size:15px;font-weight:900;letter-spacing:.02em;}
  #cal-text .cy b{color:var(--pop-yellow);font-size:19px;}
  #cal-text .ct{font-size:9px;color:#aebbf0;font-weight:800;margin-top:1px;}
  #res-mini{flex:1;display:flex;gap:6px;justify-content:flex-end;align-items:center;}
  .rm{
    flex:none;min-width:58px;background:rgba(255,255,255,.14);
    border:1.5px solid rgba(255,255,255,.45);border-radius:10px;padding:3px 7px 4px;
    box-shadow:inset 0 1px 2px rgba(255,255,255,.15);
  }
  .rm .rm-lab{font-size:8.5px;font-weight:900;color:#d6deff;letter-spacing:.04em;display:flex;justify-content:space-between;gap:4px;}
  .rm .rm-lab .ic{margin-right:2px;}
  .rm .rm-lab b{color:#fff;font-size:10px;}
  .rm .rm-bar{height:5px;border-radius:3px;background:rgba(0,0,0,.32);overflow:hidden;margin-top:2px;box-shadow:inset 0 1px 1px rgba(0,0,0,.3);}
  .rm .rm-bar > i{display:block;height:100%;width:0;transition:width .3s ease;border-radius:3px;}
  #hp-fill{background:linear-gradient(90deg,#8be8ac,var(--pop-green));}
  #idea-fill{background:linear-gradient(90deg,#d8b3ff,var(--pop-purple));}
  .rm.money{display:flex;align-items:center;justify-content:center;min-width:70px;}
  .rm.money .mny{font-size:15px;font-weight:900;color:var(--pop-yellow);text-shadow:0 1px 2px rgba(0,0,0,.35);letter-spacing:.01em;}
  .rm.money .mny small{font-size:9px;color:#d6deff;margin-right:1px;}

  /* 能力の常時サマリー(折衷案: コンパクト常設・タップで詳細へ) */
  #abil-strip{
    flex:none;display:flex;align-items:center;gap:8px;cursor:pointer;
    padding:3px 10px;background:#11183a;border-bottom:2px solid #0a1130;
    overflow-x:auto;white-space:nowrap;
  }
  #abil-strip .as-pop{font-size:10px;font-weight:900;color:#cdd6f5;}
  #abil-strip .as-pop b{color:var(--pop-yellow);font-size:12px;letter-spacing:1px;}
  #abil-strip .as-sep{flex:none;width:1px;height:14px;background:rgba(255,255,255,.22);}
  #abil-strip .as-abils{display:flex;gap:8px;}
  #abil-strip .as-g{font-size:10px;font-weight:900;color:#aeb8e6;}
  #abil-strip .as-g b{font-size:12px;margin-left:1px;}
  #abil-strip .as-more{margin-left:auto;font-size:9px;font-weight:900;color:#8a93c0;}

  /* ============ 中上部: 漫才ステージ(縮小) ============ */
  #stage{
    flex:none;height:clamp(210px,36dvh,300px);position:relative;overflow:hidden;
    background:
      radial-gradient(ellipse 62% 52% at 50% 26%, rgba(255,238,196,.42), transparent 66%),
      linear-gradient(180deg,#3a2363 0%,#52306f 48%,#3c2456 62%,#2b1a40 100%);
    border-bottom:4px solid #0a1130;
  }
  /* 緞帳(上) */
  #curtain{position:absolute;top:0;left:0;right:0;height:30px;z-index:4;
    background:linear-gradient(180deg,#a01b2e,#7a1322);
    box-shadow:0 3px 7px rgba(0,0,0,.45);
  }
  #curtain::after{content:"";position:absolute;left:0;right:0;bottom:-13px;height:16px;
    background:radial-gradient(circle at 14px -2px,#9a1a2c 12px,transparent 13px) repeat-x;
    background-size:28px 16px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.35));
  }
  #curtain .swag-l,#curtain .swag-r{position:absolute;top:0;width:34px;height:78px;z-index:5;
    background:linear-gradient(180deg,#a01b2e,#6e1020);border-radius:0 0 40px 0;box-shadow:2px 2px 6px rgba(0,0,0,.4);}
  #curtain .swag-l{left:0;}
  #curtain .swag-r{right:0;border-radius:0 0 0 40px;}
  /* 床(スポット) */
  #stage-floor{position:absolute;left:0;right:0;bottom:0;height:34%;
    background:linear-gradient(180deg,#7a4f2c,#5c3a1f);
    box-shadow:inset 0 3px 8px rgba(0,0,0,.3);}
  #spotlight{position:absolute;left:50%;bottom:8%;transform:translateX(-50%);
    width:74%;height:64%;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse 50% 60% at 50% 100%,rgba(255,244,210,.5),transparent 72%);}
  /* 出番/イベント表示 */
  #event-hint{position:absolute;top:38px;left:8px;z-index:6;
    font-size:10px;font-weight:900;color:#fff;
    background:rgba(10,17,48,.82);border:1.5px solid rgba(255,255,255,.7);border-radius:999px;
    padding:3px 11px;box-shadow:0 2px 5px rgba(0,0,0,.35);}
  #event-hint b{color:var(--pop-yellow);font-size:13px;}
  /* MENUタブ */
  #menu-tab{position:absolute;top:37px;right:8px;z-index:7;
    font-size:12px;font-weight:900;color:var(--ink);
    background:linear-gradient(180deg,#ffe27a,var(--pop-yellow));
    border:2.5px solid var(--ink);border-radius:11px;padding:5px 13px;
    box-shadow:0 3px 0 var(--ink);cursor:pointer;letter-spacing:.05em;}
  #menu-tab:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
  /* キャラ立ち絵 */
  #duo{position:absolute;left:0;right:0;bottom:3px;z-index:3;
    display:flex;align-items:flex-end;justify-content:center;gap:2px;}
  .char-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
  .char{height:clamp(150px,25dvh,224px);width:auto;display:block;
    filter:drop-shadow(0 5px 5px rgba(0,0,0,.4));transform-origin:50% 100%;}
  #hero{margin-right:-6px;} #partner{margin-left:-6px;}
  /* 矢田はデフォルト非表示。ネタ合わせ時にスライドインで登場 */
  #partner-wrap{display:none;}
  #partner-wrap.enter{animation:partnerIn .42s ease;}
  @keyframes partnerIn{0%{opacity:0;transform:translateX(48px) scale(.85);}60%{opacity:1;}100%{opacity:1;transform:none;}}
  .char.bounce{animation:charBounce .45s ease;}
  @keyframes charBounce{30%{transform:translateY(-15px) rotate(-3deg);}55%{transform:translateY(-3px);}}
  .name-tag{margin-top:1px;font-size:9px;font-weight:900;color:#fff;
    border:1.5px solid #fff;border-radius:999px;padding:0 8px;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .nt-hero{background:var(--pop-red);} .nt-partner{background:var(--pop-blue);}
  #mic{align-self:flex-end;width:5px;height:56px;background:linear-gradient(90deg,#b8c0d8,#6a7392);
    border:1.5px solid var(--ink);border-radius:3px;margin:0 3px 4px;position:relative;z-index:2;}
  #mic::before{content:"";position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e8edff,#9aa3c2);border:2px solid var(--ink);}

  /* ============ メッセージ窓 ============ */
  #msgbox{
    flex:none;display:flex;align-items:flex-start;gap:10px;
    padding:7px 13px 8px;min-height:54px;
    background:linear-gradient(180deg,#fffdf4,#fff1cf);
    border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);
    box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:5;
  }
  #msgbox .mb-mark{
    flex:none;width:32px;height:32px;border-radius:10px;margin-top:2px;
    background:linear-gradient(160deg,#ff8a7a,var(--pop-red));
    border:2.5px solid var(--ink);box-shadow:0 2px 0 var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  #msgbox .mb-body{flex:1;min-width:0;}
  #msgbox .mb-name{
    display:inline-block;font-size:11px;font-weight:900;color:#fff;
    background:var(--pop-red);border:2px solid var(--ink);border-radius:7px;
    padding:0 8px;margin-bottom:3px;box-shadow:0 1.5px 0 var(--ink);
  }
  #msgbox .mb-txt{
    font-size:13px;line-height:1.45;color:var(--ink);font-weight:800;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  #msgbox .mb-txt .lg{color:#1f9e54;font-weight:900;}
  #msgbox .mb-txt .ll{color:var(--pop-red);font-weight:900;}
  #msgbox .mb-txt .lh{color:#8e4fd0;font-weight:900;}

  /* ============ 下段: コマンドドック ============ */
  #dock{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#1f3270,#16234f);
    padding:0 0 calc(6px + env(safe-area-inset-bottom));}
  #dock-head{flex:none;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:7px 0 8px;}
  #dock-head .dh-line{height:3px;width:30px;background:var(--pop-yellow);border-radius:2px;opacity:.85;}
  #dock-head .dh-txt{font-size:13px;font-weight:900;color:#fff;letter-spacing:.12em;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  #dock-body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:flex-start;min-height:0;}
  #dock-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px 2px;padding:4px 8px 10px;}
  .ico-btn{font-family:inherit;cursor:pointer;border:none;background:none;
    display:flex;flex-direction:column;align-items:center;gap:6px;}
  .ico-c{position:relative;width:56px;height:56px;border-radius:14px;overflow:hidden;
    border:3px solid var(--ink);
    box-shadow:0 5px 0 var(--ink),0 6px 6px rgba(0,0,0,.32);
    display:flex;align-items:center;justify-content:center;font-size:25px;
    transition:transform .08s, box-shadow .08s;}
  /* アイコン画像(images/icons/*.png があれば自動使用、無ければ絵文字) */
  .ico-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}
  .ico-emoji{position:relative;z-index:1;}
  .ico-btn:active .ico-c{transform:translateY(5px);box-shadow:0 0 0 var(--ink),0 1px 3px rgba(0,0,0,.4);}
  .ico-l{font-size:10px;font-weight:900;color:#fff;
    background:rgba(10,17,48,.55);border-radius:999px;padding:1px 6px;letter-spacing:0;white-space:nowrap;
    box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .ico-btn:disabled{opacity:.4;cursor:not-allowed;}
  .ico-btn:disabled .ico-c{box-shadow:0 5px 0 var(--ink);transform:none;}
  .c-neta .ico-c{background:#ff5252;}
  .c-awase .ico-c{background:#ff9a3c;}
  .c-input .ico-c{background:#b06bff;}
  .c-train .ico-c{background:#34a6ff;}
  .c-baito .ico-c{background:#3ccf6e;}
  .c-asobi .ico-c{background:#f5b400;}
  .c-rest  .ico-c{background:#7884bd;}
  .c-status .ico-c{background:#3a4a92;}
  .c-kousei .ico-c{background:#1fb6c9;}
  .c-mixer .ico-c{background:#e0608f;}

  /* ============ モーダル ============ */
  #overlay{position:fixed;inset:0;z-index:40;background:rgba(8,12,34,.74);
    display:none;align-items:center;justify-content:center;padding:20px;}
  #overlay.show{display:flex;}
  .modal{width:100%;max-width:360px;max-height:88dvh;overflow-y:auto;
    background:var(--panel);border:5px solid var(--ink);border-radius:22px;
    box-shadow:0 8px 0 var(--ink),0 12px 22px rgba(0,0,0,.45);padding:18px 16px 16px;text-align:center;
    animation:modalPop .3s ease;}
  @keyframes modalPop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .modal h2{font-size:21px;color:var(--pop-red);margin-bottom:5px;}
  .modal .m-emoji{font-size:44px;line-height:1;margin-bottom:5px;}
  .modal p{font-size:13.5px;line-height:1.65;color:var(--ink);margin-bottom:5px;}
  .modal .m-big{font-size:29px;font-weight:900;color:var(--pop-red);margin:4px 0;}
  .modal .m-detail{font-size:13px;text-align:left;background:#fff;border:3px solid var(--ink);
    border-radius:12px;padding:9px 12px;margin:9px 0;line-height:1.85;}
  .modal-btn{font-family:inherit;font-weight:900;font-size:17px;color:#fff;
    background:linear-gradient(180deg,#ff8a7a,var(--pop-red));border:4px solid var(--ink);border-radius:999px;
    padding:10px 34px;margin-top:7px;box-shadow:0 5px 0 var(--ink);cursor:pointer;
    text-shadow:1px 1px 0 rgba(0,0,0,.22);letter-spacing:.06em;}
  .modal-btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  .modal-btn.alt{background:linear-gradient(180deg,#6fc6ff,var(--pop-blue));font-size:15px;padding:9px 22px;}
  .modal-btn.ghost{background:#fff;color:var(--ink);font-size:14px;padding:8px 20px;box-shadow:0 3px 0 var(--ink);}
  /* 名前入力(P1-03): 本文用の可読フォント。会話同様ドット文字は使わない。 */
  .name-input{width:100%;box-sizing:border-box;font-family:inherit;font-size:17px;font-weight:700;
    color:var(--ink);text-align:center;background:#fff;border:3px solid var(--ink);border-radius:12px;
    padding:9px 12px;margin:8px 0 4px;box-shadow:inset 0 2px 0 rgba(0,0,0,.08);}
  .name-input:focus{outline:none;border-color:var(--pop-blue);}
  .train-list{display:flex;flex-direction:column;gap:8px;margin:10px 0 4px;}
  .train-opt{font-family:inherit;font-weight:900;font-size:15px;color:var(--ink);
    background:#fff;border:3px solid var(--ink);border-radius:12px;padding:9px 12px;
    box-shadow:0 3px 0 var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .train-opt:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
  .train-opt:disabled{opacity:.45;cursor:not-allowed;}
  .train-opt .to-up{color:var(--pop-blue);font-size:12px;}
  .train-opt .to-cost{color:var(--pop-red);font-size:11px;font-weight:900;}
  .stat-sec-title{font-size:11px;font-weight:900;color:#fff;background:var(--pop-orange);
    border:2.5px solid var(--ink);border-radius:999px;padding:2px 0;margin:12px auto 7px;width:150px;box-shadow:0 2px 0 var(--ink);}
  .st-pop{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:2px;}
  .st-pop .pn{font-size:30px;font-weight:900;color:var(--pop-red);}
  .st-pop .ps{font-size:17px;color:var(--pop-yellow);-webkit-text-stroke:1px var(--ink);letter-spacing:1px;}
  .abil-row{display:flex;align-items:center;gap:8px;padding:3px 2px;}
  .abil-name{flex:none;width:54px;font-size:13px;font-weight:900;color:var(--ink);text-align:left;}
  .abil-bar{flex:1;height:13px;border-radius:7px;background:#eef2ff;border:2.5px solid var(--ink);overflow:hidden;}
  .abil-bar > i{display:block;height:100%;background:linear-gradient(90deg,#9fd6ff,var(--pop-blue));}
  .abil-grade{flex:none;width:28px;text-align:center;font-size:20px;font-weight:900;line-height:1;}
  .abil-val{flex:none;width:26px;text-align:right;font-size:11px;color:#5a6aa8;font-weight:900;}
  .g-S{color:#f3b500;} .g-A{color:#ff5e9c;} .g-B{color:#ff2d2d;}
  .g-C{color:#ff8a1f;} .g-D{color:#ffd60a;} .g-E{color:#3ccf6e;}
  .g-F{color:#39c5e0;} .g-G{color:#8a93a8;}
  .st-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 2px;font-weight:900;}
  .st-line span:last-child{color:var(--ink);}
  .combo-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px;}
  .combo-tag{font-size:10px;font-weight:900;color:var(--ink);background:linear-gradient(180deg,#ffe98a,var(--pop-yellow));
    border:2px solid var(--ink);border-radius:999px;padding:1px 9px;}
  #reset-link{display:block;margin:12px auto 0;font-size:11px;color:#8a93c0;font-weight:900;text-decoration:underline;cursor:pointer;}

  #float-layer{position:fixed;inset:0;z-index:30;pointer-events:none;overflow:hidden;}
  .float-pop{position:absolute;font-weight:900;font-size:21px;
    -webkit-text-stroke:3px var(--ink);paint-order:stroke fill;color:#fff;
    animation:floatUp 1s ease forwards;white-space:nowrap;}
  @keyframes floatUp{0%{transform:translateY(8px) scale(.6);opacity:0;}25%{transform:translateY(0) scale(1.1);opacity:1;}100%{transform:translateY(-46px) scale(1);opacity:0;}}

  /* ============ シナリオエンジン(紙芝居)オーバーレイ: P1-02 ============ */
  /* 参照: ARCHITECTURE.md §4.1。全画面・最上位z-index・画面全体がタップ判定(選択肢表示中はボタンのみ)。 */
  #scenario-overlay{position:fixed;inset:0;z-index:60;display:none;
    background:#0a1130;flex-direction:column;overflow:hidden;}
  #scenario-overlay.show{display:flex;}
  #sc-bg{position:absolute;inset:0;background:#0a1130 center/cover no-repeat;transition:background-color .25s;}
  /* 立ち絵レイヤーの下端=台詞帯の上端(--sc-msg-topはplayScenarioが本編#msgboxの実座標から設定) */
  #sc-chara-layer{position:absolute;left:0;right:0;top:0;bottom:calc(100dvh - var(--sc-msg-top,58dvh));
    display:flex;align-items:flex-end;pointer-events:none;}
  /* 立ち絵サイズは本編の.char(clamp(150px,25dvh,224px))と同一に揃える。
     元画像は横長透過余白付きのため、配置は中央基準+transformでずらす(L/R端に寄せると余白分だけ視覚位置がずれる) */
  .sc-chara{position:absolute;bottom:0;height:clamp(150px,25dvh,224px);width:auto;left:50%;
    filter:drop-shadow(0 5px 5px rgba(0,0,0,.4));transition:opacity .15s;}
  .sc-chara.pos-L,.sc-sil-shape.pos-L{transform:translateX(-72%);}
  .sc-chara.pos-C,.sc-sil-shape.pos-C{transform:translateX(-50%);}
  .sc-chara.pos-R,.sc-sil-shape.pos-R{transform:translateX(-28%);}
  .sc-chara.sil{background:#0d1533;border-radius:18px 18px 0 0;width:28%;
    -webkit-mask-image:none;box-shadow:inset 0 0 0 3px rgba(255,255,255,.06);}
  /* シルエットキャラ(立ち絵未作成)は単色の簡易シルエットで表現する */
  .sc-sil-shape{position:absolute;bottom:0;left:50%;width:26%;display:flex;flex-direction:column;align-items:center;}
  .sc-sil-shape .sil-head{width:46%;aspect-ratio:1/1;border-radius:50%;background:#0d1533;border:3px solid var(--ink);margin-bottom:-6%;}
  .sc-sil-shape .sil-body{width:100%;height:20dvh;max-height:150px;border-radius:26px 26px 0 0;background:#0d1533;border:3px solid var(--ink);}
  /* 台詞帯: 本編のメッセージ窓(#msgbox)と同じ位置・同じ見た目に固定する(テキスト位置が変わると目が滑るため) */
  #sc-msgbox{position:absolute;left:0;right:0;top:var(--sc-msg-top,58dvh);margin:0;
    background:linear-gradient(180deg,#fffdf4,#fff1cf);
    border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);border-radius:0;
    box-shadow:0 2px 6px rgba(0,0,0,.3);
    padding:7px 13px 8px;min-height:54px;z-index:2;}
  #sc-name-tab{display:inline-block;font-size:11px;font-weight:900;color:#fff;
    background:var(--pop-red);border:2px solid var(--ink);border-radius:7px;
    padding:0 8px;margin:0 0 3px;box-shadow:0 1.5px 0 var(--ink);}
  #sc-text{font-family:'Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;
    font-weight:800;font-size:13px;line-height:1.45;color:var(--ink);min-height:2.9em;}
  #sc-tapcue{position:absolute;right:12px;bottom:6px;font-size:11px;color:#8a93c0;
    animation:scTapCue 1.1s ease infinite;}
  @keyframes scTapCue{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}
  /* 出番日の「タップで舞台へ」バナー(2026-07-11: 出番への自動遷移をやめタップ起動に) */
  #honban-tap{position:fixed;left:50%;transform:translateX(-50%);

    font-family:inherit;font-weight:900;font-size:15px;color:#fff;

    animation:honbanTapCue 1.1s ease infinite;white-space:nowrap;}
  @keyframes honbanTapCue{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-6px);}}
  /* タップ受け用の全画面シールド(disabledボタン上でもタップを拾う) */
  #honban-shield{position:fixed;inset:0;z-index:59;background:transparent;}
  /* ミキサー: 消費パーツの手動選択UI(2026-07-11) */
  .mix-pool{display:flex;flex-wrap:wrap;gap:6px;max-height:36vh;overflow-y:auto;

  .mix-chip{font-family:inherit;font-weight:800;font-size:12px;color:var(--ink);
    background:#fff;border:2px solid var(--ink);border-radius:8px;padding:5px 8px;

  .mix-chip .mc-tag{color:#8a93c0;font-size:10px;margin-left:2px;}
  .mix-chip.sel{background:var(--pop-yellow);outline:2.5px solid var(--pop-red);}
  .train-opt{user-select:none;touch-action:manipulation;}
  /* 選択肢は台詞帯の下(本編ではコマンドドックの領域)に出す */
  #sc-choices{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;gap:9px;

  .sc-choice-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}

<script src="js/scenario.js"></script>
<script>
/* =========================================================================
   パワフル漫才 ─ サクセス(育成) / 漫才ステージUI版
   仕様: 01_SUCCESS.md / 03_NETA.md / 00_OVERVIEW.md。
   上=HUD / 中上=漫才ステージ(主人公=赤・相方=青の立ち絵) / 下=コマンドドック。
   人気・基礎能力・信頼度はメイン非表示 → MENU/ステータスで確認。
   ========================================================================= */
const TOTAL_TURNS=156;
const ABILS=["ボケ","ツッコミ","大喜利","トーク","演技"];
const TAGS={
  ツカミ:["自己紹介","ギャグ"], フリ:["日常","説明","持論","妄想"],
  ボケ:["あるある","誇張","裏切り","動き","ひねり"],
  ツッコミ:["直球","例え","ノリ","説明","スカシ"], オチ:["回収","裏切り"],
};
const KIND_KEYS=Object.keys(TAGS);

let S;
// 初期能力: 100点を5能力に乱数分配(個別上限40)。E(40)が1つ出れば当たりスタート
function rollInitAbil(){
  const a={ボケ:0,ツッコミ:0,大喜利:0,トーク:0,演技:0};
  let pts=100;
  while(pts>0){
    const avail=ABILS.filter(k=>a[k]<40);
    if(!avail.length) break;
    const k=avail[rint(0,avail.length-1)];
    const add=Math.min(rint(1,5), 40-a[k], pts);
    a[k]+=add; pts-=add;
  }
  return a;
}
// 初期装備ネタ(全パーツ威力1〜2の弱いネタ)。開幕から劇場/漫才が成立する最低限の一本。
const STARTER_NETA=[
  {pos:1,kind:"ツカミ",tag:"自己紹介",pow:1},
  {pos:2,kind:"フリ",tag:"日常",pow:1},
  {pos:3,kind:"ボケ",tag:"あるある",pow:2},
  {pos:4,kind:"ツッコミ",tag:"直球",pow:1},
  {pos:5,kind:"ボケ",tag:"動き",pow:2},
  {pos:6,kind:"フリ",tag:"説明",pow:1},
  {pos:7,kind:"ボケ",tag:"誇張",pow:2},
  {pos:8,kind:"ツッコミ",tag:"ノリ",pow:1},
  {pos:9,kind:"オチ",tag:"回収",pow:2},
];
function saveStarterLineup(){
  const slots={}, parts=[];
  STARTER_NETA.forEach(p=>{ slots[p.pos]={kind:p.kind,tag:p.tag,pow:p.pow}; parts.push({kind:p.kind,tag:p.tag,pow:p.pow}); });
  try{ localStorage.setItem("pm_lineup", JSON.stringify({slots,parts})); }catch(e){}
}
function newGame(){
  S={ v:SAVE_V, turn:1, hp:100, hpMax:100, idea:20, money:5000, pop:10, trust:30, m1Alive:0, m1Best:-1,
    abil:rollInitAbil(),
    parts:STARTER_NETA.map(p=>({kind:p.kind,tag:p.tag,pow:p.pow})), combos:[], tokusyu:[],
    lastMsg:"芸歴7年目、1月開幕。年末のM-1決勝へ ─ 今週どうする?", speaker:"主人公", busy:false, partnerVisible:false };
  saveStarterLineup();
  FLAGS={ seen:{}, vars:{} }; saveFlags();
  META.runs=(META.runs||0)+1; saveMeta();
}
// ===== セーブ/ロード(localStorage) = 3画面連携の土台 =====
// スキーマ版数。フィールドを追加したらここを上げ、migrate()に順送りの変換stepを足す(ARCHITECTURE §3.3)。
const SAVE_V = 2;
function migrate(save){
  // v無し(旧v1)は暫定でv1扱いにしてから順送りする。壊れたデータはnullを返し、呼び出し側で新規扱いにする。
  if(!save || typeof save!=="object") return null;
  if(save.v===undefined) save.v=1;
  while(save.v<SAVE_V){
    switch(save.v){
      case 1:
        // v1→v2: tokusyu(特殊能力)配列を新設。欠損フィールドにデフォルト値を付与するだけの後方互換。
        if(!save.tokusyu) save.tokusyu=[];
        save.v=2;
        break;
      default:
        // 未知の版数はこれ以上進めない(無限ループ防止)
        save.v=SAVE_V;
        break;
    }
  }
  return save;
}
function saveGame(){ try{ localStorage.setItem("pm_save", JSON.stringify(S)); }catch(e){} }
// loadGame(): 既存セーブがあればそれを読んで継続(名前入力・OPは発生しない)。
// 既存セーブが無い場合だけ true を返し、呼び出し側(起動シーケンス)で
// 名前入力→S-00再生の新規開始フローに回す(P1-03)。
function loadGame(){
  try{
    const raw=localStorage.getItem("pm_save");
    if(raw){
      const o=migrate(JSON.parse(raw));
      if(o&&o.turn){ S=o; S.busy=false; if(!S.parts)S.parts=[]; if(!S.combos)S.combos=[]; if(S.m1Alive===undefined)S.m1Alive=0; if(S.m1Best===undefined)S.m1Best=-1; return false; }
    }
  }catch(e){}
  return true; // 新規開始が必要
}
function clearSave(){ try{ localStorage.removeItem("pm_save"); localStorage.removeItem("pm_lineup"); localStorage.removeItem("pm_parts"); }catch(e){} }
// ===== 周回内フラグ(pm_flags)/周回をまたぐ図鑑(pm_meta) =====
// pm_flags: シナリオ・イベントの発火記録。周回で消えてよいもの(newGame()でリセット)。
function loadFlags(){ try{ const raw=localStorage.getItem("pm_flags"); if(raw){ const o=JSON.parse(raw); if(o) return { seen:o.seen||{}, vars:o.vars||{} }; } }catch(e){} return { seen:{}, vars:{} }; }
function saveFlags(){ try{ localStorage.setItem("pm_flags", JSON.stringify(FLAGS)); }catch(e){} }
// pm_meta: 周回をまたいで永続する図鑑類。clearSave()では絶対に消さない。
function loadMeta(){ try{ const raw=localStorage.getItem("pm_meta"); if(raw){ const o=JSON.parse(raw); if(o) return { endings:o.endings||{}, combos:o.combos||{}, runs:o.runs||0 }; } }catch(e){} return { endings:{}, combos:{}, runs:0 }; }
function saveMeta(){ try{ localStorage.setItem("pm_meta", JSON.stringify(META)); }catch(e){} }
let FLAGS=loadFlags();
let META=loadMeta();
// ネタ構成画面へ: 所持パーツを渡し、進行をセーブして遷移
function enterKousei(){ try{ localStorage.setItem("pm_parts", JSON.stringify(S.parts)); }catch(e){} saveGame(); location.href="neta-builder.html"; }
// デバッグ起動: ?newgame=1 で全セーブ(pm_*)を消し、完全新規状態から始める。
// スマホでサイトデータを消さずに名前入力→オープニングを毎回確認するための開発用パラメータ。
if(new URLSearchParams(location.search).get("newgame")==="1"){
  ["pm_save","pm_lineup","pm_parts","pm_flags","pm_honban","pm_result","pm_meta"].forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
  FLAGS=loadFlags(); META=loadMeta(); // メモリ上のFLAGS/METAも空へ戻す
}
// 起動判定(P1-03): 既存セーブがあれば即読込(名前入力・OPは発生しない)。
// 無ければ_needsNewGame=trueを立てて、下部の起動シーケンス(SCRIPTS_DATA読込後)で
// 名前入力モーダル→S-00再生の新規開始フローを回す。
const _needsNewGame = loadGame();

function yearOf(t){ return Math.min(3, Math.floor((t-1)/52)+1); }
function weekInYear(t){ return ((t-1)%52)+1; }
// 1月1週目スタート。実カレンダー(各月の実日数)で月・週を算出。1年=52週(364日)+1日 ≒ 365日。パワプロ準拠。
const MONTH_CUM=[31,59,90,120,151,181,212,243,273,304,334,365]; // 各月末までの通算日(非閏)
function dayOfYear(t){ return (weekInYear(t)-1)*7+1; }           // その週の初日(1〜358)
function monthOf(t){ const d=dayOfYear(t); for(let m=0;m<12;m++){ if(d<=MONTH_CUM[m]) return m+1; } return 12; }
function weekOfMonth(t){ const d=dayOfYear(t); const m=monthOf(t); const prev=m>1?MONTH_CUM[m-2]:0; return Math.floor((d-prev-1)/7)+1; }
function seasonOf(t){ const m=monthOf(t);
  if(m>=3&&m<=5)return{name:"春",cls:"se-spring"};
  if(m>=6&&m<=8)return{name:"夏",cls:"se-summer"};
  if(m>=9&&m<=11)return{name:"秋",cls:"se-autumn"};
  return{name:"冬",cls:"se-winter"}; }
// 賞レース決勝は各年の12月最終週(週52 = ターン52/104/156)。M-1各ラウンドは本番ループ実装時に配置。
// M-1グランプリ: 各年の秋〜冬に6ラウンド(週39=1回戦…週52=決勝)。前ラウンド突破者のみ次へ。
const M1_ROUNDS=[
  {name:"1回戦",   week:39, thr:25, lose:"1回戦敗退…まだまだこれから。"},
  {name:"2回戦",   week:42, thr:33, lose:"2回戦で力尽きた。来年こそ。"},
  {name:"3回戦",   week:45, thr:41, lose:"3回戦の壁。悔しさをバネに。"},
  {name:"準々決勝", week:47, thr:49, lose:"準々で敗退。あと一歩だった。"},
  {name:"準決勝",   week:49, thr:60, lose:"準決勝、惜しくも届かず。"},
  {name:"決勝",     week:52, thr:72, lose:"決勝の大舞台、夢は叶わなかった…"},
];
// M-1予選突破の人気ボーナス(2026-07-11ユーザー決定・※値は仮P5-01)。1年目の人気源として機能させる。
// 上位ラウンドほど増加。付与は自己ベスト(3年間通しの記録=S.m1Best)を更新した時のみ
// (例: 1年目に2回戦まで到達→2・3年目は1回戦突破ではもらえず、2回戦突破から再びもらえる)
const M1_POP_BONUS=[5,7,10,13,16,20]; // idx=0(1回戦突破)〜5(決勝突破)
function m1RoundAt(t){ const w=weekInYear(t);
  for(let i=0;i<M1_ROUNDS.length;i++){ if(M1_ROUNDS[i].week===w){ const r=M1_ROUNDS[i]; return {year:yearOf(t), idx:i, name:r.name, thr:r.thr, lose:r.lose}; } }
  return null; }
// M-1に出場するラウンドか(1回戦=無条件、以降はその年の勝ち残りのみ)。敗退済み・非ラウンド週はnull
function m1ParticipationAt(t){ const r=m1RoundAt(t); if(!r) return null; return (r.idx===0 || S.m1Alive===r.year) ? r : null; }
// その年のM-1を敗退で終えたか(1回戦週より後で勝ち残っていない)
function m1OutThisYear(t){ return weekInYear(t)>M1_ROUNDS[0].week && S.m1Alive!==yearOf(t); }
// 劇場出番: 8週毎。M-1勝ち残り中は休止、敗退した年は通常出番が復活する(2026-07-11ユーザー決定)
function isTheaterTurn(t){ return t%8===0 && !m1ParticipationAt(t) && (weekInYear(t)<M1_ROUNDS[0].week || m1OutThisYear(t)); }
// このターンの本番。出番/M-1はターンを消費しない=当該週の行動後にタップで開始(2026-07-11ユーザー決定)
function honbanAt(t){ const r=m1ParticipationAt(t); if(r) return {kind:"award", extra:{round:r}}; if(isTheaterTurn(t)) return {kind:"theater", extra:null}; return null; }
function nextEventIn(t){ for(let k=1;k<=16;k++){const tt=t+k; if(tt>TOTAL_TURNS)return null;
  const r=m1ParticipationAt(tt); if(r)return{kind:"賞",in:k,name:r.name}; if(isTheaterTurn(tt))return{kind:"出番",in:k};} return null; }
function gradeOf(v){ if(v>=90)return"S";if(v>=80)return"A";if(v>=70)return"B";if(v>=60)return"C";if(v>=50)return"D";if(v>=40)return"E";if(v>=20)return"F";return"G"; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function rint(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function popStars(p){ const n=Math.round(p/20); return "★".repeat(n)+"☆".repeat(5-n); }

// 文字送りSE(パワプロ風の電子音)。AudioContextはユーザー操作で起動する。
let actx=null;
function ensureAudio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
  if(actx && actx.state==="suspended") actx.resume();
}
let _blipN=0;
function blip(){
  if(!actx || actx.state!=="running") return;
  _blipN++; if(_blipN%2) return; // 2文字に1回(うるさくしない)
  const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type="square"; o.frequency.value=1050+Math.random()*350;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(0.035,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.028);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+0.035);
}

// パワプロ風タイプライター: HTMLタグは即時・文字は1文字ずつ表示(速め)＋送りSE
const TYPE_MS=18;
let _typer=null;
function typeText(el, html){
  if(_typer){ clearInterval(_typer); _typer=null; }
  const toks=[]; let i=0;
  while(i<html.length){
    if(html[i]==="<"){ const j=html.indexOf(">",i);
      if(j<0){ toks.push({t:"ch",v:html[i]}); i++; }
      else { toks.push({t:"tag",v:html.slice(i,j+1)}); i=j+1; }
    } else { toks.push({t:"ch",v:html[i]}); i++; }
  }
  let out="", k=0;
  el.innerHTML="";
  const step=()=>{
    while(k<toks.length && toks[k].t==="tag"){ out+=toks[k].v; k++; }   // 先行タグは即時
    if(k<toks.length){ const ch=toks[k].v; out+=ch; k++; if(ch.trim()) blip(); } // 1文字＋送りSE
    while(k<toks.length && toks[k].t==="tag"){ out+=toks[k].v; k++; }   // 直後の閉じタグも即時
    el.innerHTML=out;
    if(k>=toks.length){ clearInterval(_typer); _typer=null; }
  };
  step();
  _typer=setInterval(step, TYPE_MS);
}

const CMD_HP_NEED={neta:0,awase:15,input:10,train:0,baito:25,asobi:0,rest:0};
function doCommand(cmd){
  if(cmd==="status"){ openStatus(); return; }
  if(cmd==="kousei"){ enterKousei(); return; }   // ネタ構成へ(即時・週を消費しない)
  if(S.busy) return;
  if(S.hp<(CMD_HP_NEED[cmd]||0)){ floatPop("体力不足!", "#ff5252"); setMsg('<span class="ll">体力が足りない…休もう。</span>'); reactHero("hero","suberi"); render(); return; }
  if(cmd==="train"){ openGrow(); return; }   // 腕を磨く(即時・週を消費しない)
  if(cmd==="mixer"){ openMixer(); return; }  // ミキサー(即時・発想力不要・パーツ消費)
  if(cmd==="neta"){                           // ネタ作り=ガチャ(即時・週を消費しない)
    S.partnerVisible=false;
    if(S.idea<GACHA_COST){ floatPop("発想力不足!", "#b06bff"); setMsg(`<span class="lh">発想力が足りない(必要${GACHA_COST})。稽古や本番で稼ごう。</span>`); reactHero("hero","suberi"); render(); return; }
    S.idea-=GACHA_COST; const part=rollPart(); S.parts.push(part);
    setMsg(`新ネタ! <span class="lh">${part.kind}【${part.pow}】(${part.tag})</span> を思いついた!(発想力-${GACHA_COST})`);
    floatPop("パーツGET!", "#b06bff"); reactHero("hero","warai"); render(); showPartModal(part); return;
  }
  S.partnerVisible = (cmd==="awase"); // ネタ合わせ時のみ矢田が登場
  switch(cmd){
    case "awase":{ // 信頼度が主。発想力はオマケ(振れ幅大)。コンボはイベント/本番発見(§3.6)でのみ習得
      S.hp-=15; S.trust=clamp(S.trust+rint(5,8),0,100);
      const g = Math.random()<0.25 ? rint(15,32) : rint(0,8); S.idea+=g; // 基本オマケ・25%で大当たり
      const a=ABILS[rint(0,1)]; const up=rint(1,2); S.abil[a]=clamp(S.abil[a]+up,0,100);
      setMsg(`相方と稽古。<span class="lg">信頼UP / ${a}+${up}${g>0?` / 発想力+${g}`:""}</span>`);
      floatPop("信頼度UP↑", "#ff9a3c"); reactHero("both","warai"); break;
    }
    case "input":{ // 発想力の種供給(主力・唯一の安定源)
      S.hp-=10; const g=rint(28,40); S.idea+=g;
      let extra=""; if(Math.random()<0.3){ S.abil["大喜利"]=clamp(S.abil["大喜利"]+1,0,100); extra=` <span class="lg">大喜利+1</span>`; }
      setMsg(`映画や読書でインプット。発想力の種を仕入れた。<span class="lg">発想力+${g}</span>${extra}`);
      floatPop("発想力+"+g, "#b06bff"); reactHero("hero","warai"); break;
    }
    case "baito":{ // バイト(固定の金策)
      S.hp-=25; const pay=Math.round(rint(2000,3200)*(1+S.pop/120)); S.money+=pay;
      setMsg(`バイトで生活費を稼いだ。<span class="lg">¥${pay.toLocaleString()}</span>`);
      floatPop("¥"+pay.toLocaleString(), "#3ccf6e"); reactHero("hero"); break;
    }
    case "asobi":{ // 専有産出なし=出かけると何かランダムで起きる(本実装はEVENTS.mdの遊び系を抽選)
      S.hp=clamp(S.hp+15,0,S.hpMax);
      const r=rint(0,4); let extra="";
      if(r===0){ const g=rint(4,9); S.idea+=g; extra=` / 発想力+${g}`; }
      else if(r===1){ S.abil["トーク"]=clamp(S.abil["トーク"]+1,0,100); extra=` / トーク+1`; }
      else if(r===2){ S.trust=clamp(S.trust+rint(2,4),0,100); extra=` / 信頼度UP`; }
      else if(r===3){ const m=rint(500,1500); S.money+=m; extra=` / 臨時収入¥${m.toLocaleString()}`; }
      setMsg(`出かけて気分転換。<span class="lg">体力+15${extra}</span>${r===4?"　…今日は特に何もなかった。":""}`);
      floatPop("おでかけ♪", "#f5b400"); reactHero("both","warai"); break;
    }
    case "rest":{
      S.hp=clamp(S.hp+50,0,S.hpMax);
      setMsg(`ゆっくり休んだ。<span class="lg">体力+50</span>`); floatPop("体力+50", "#3ccf6e"); break;
    }
  }
  // 出番日はターンを消費しない: 行動の結果を読ませてから、タップで同ターン内の舞台へ(2026-07-11)
  const hb=honbanAt(S.turn);
  if(hb){ S.honbanPending=true; beginHonbanWait(hb); } else { advanceTurn(); }
}
// ガチャ: 威力分布は能力合計が駆動(能力↑で高威力が出やすい)。cMin1.5/cMax7.6/σ1.6
const GACHA_COST=25, GACHA_CMIN=1.5, GACHA_CMAX=7.6, GACHA_SIGMA=1.6;
function abilTotal(){ return ABILS.reduce((s,a)=>s+S.abil[a],0); }
function rollPow(){
  const a=clamp((abilTotal()-100)/400,0,1);
  const c=GACHA_CMIN+(GACHA_CMAX-GACHA_CMIN)*a;
  const w=[]; let sum=0;
  for(let p=1;p<=9;p++){ const x=Math.exp(-((p-c)*(p-c))/(2*GACHA_SIGMA*GACHA_SIGMA)); w.push(x); sum+=x; }
  let r=Math.random()*sum, acc=0;
  for(let p=1;p<=9;p++){ acc+=w[p-1]; if(r<=acc) return p; }
  return 9;
}
function rollPart(){
  const kind=KIND_KEYS[rint(0,KIND_KEYS.length-1)];
  const tag=TAGS[kind][rint(0,TAGS[kind].length-1)];
  return {kind,tag,pow:rollPow()};
}

    FLAGS.vars.playerName=name; saveFlags();

const GROW_TIER={S:30,A:22,B:17,C:13,D:10,E:8,F:6,G:5};
function ptCostFor(lv){ return GROW_TIER[gradeOf(lv)]||5; }
// 能力+1を1回ぶん実行(成功でtrue)。長押し連打のtickから呼ばれる
function growOne(a){
  const v=Math.round(S.abil[a]); const cost=ptCostFor(v);
  if(S.idea<cost || v>=100) return false;
  S.idea-=cost; S.abil[a]=clamp(S.abil[a]+1,0,100);
  floatPop(a+"+1","#34a6ff"); setMsg(`稽古で掴んだ感覚を技に。<span class="lg">${a} +1</span>(発想力-${cost})`);
  reactHero("hero","tsukkomi"); render();
  return true;
}
function openGrow(){
  const btnHtml=(a)=>{ const v=Math.round(S.abil[a]),g=gradeOf(v),cost=ptCostFor(v);
    return `<span>${a} <b class="g-${g}" style="font-size:15px">${g}</b> <span class="to-up">Lv${v}</span></span>
      <span class="to-cost">${v>=100?"MAX":"発想力 "+cost+"/+1"}</span>`; };
  const rows=ABILS.map(a=>{ const v=Math.round(S.abil[a]); const can=S.idea>=ptCostFor(v) && v<100;
    return `<button class="train-opt" data-ab="${a}" ${can?"":"disabled"}>${btnHtml(a)}</button>`;}).join("");
  openModal(`<h2>💪 腕を磨く</h2><p style="font-size:12px;color:#5a6aa8">発想力を注いで基礎能力を+1(即時・週を消費しない)。<b>長押しで連続</b>。高グレードほど高コスト。<br>所持発想力 <b id="grow-idea">${Math.round(S.idea)}</b></p>
    <div class="train-list">${rows}</div><button class="modal-btn ghost" id="grow-close">とじる</button>`);
  // モーダルを作り直さずその場で表示更新(長押し中にボタンが消えないように)
  const refresh=()=>{ document.getElementById("grow-idea").textContent=Math.round(S.idea);
    document.querySelectorAll(".train-opt").forEach(b=>{ const a=b.dataset.ab; const v=Math.round(S.abil[a]);
      b.innerHTML=btnHtml(a); b.disabled=!(S.idea>=ptCostFor(v) && v<100); }); };
  // 長押しで連打(2026-07-11ユーザー指示): 押した瞬間+1→400ms後から110ms間隔で連続+1
  document.querySelectorAll(".train-opt").forEach(b=>{
    let t1=null,t2=null;
    const stop=()=>{ if(t1){clearTimeout(t1);t1=null;} if(t2){clearInterval(t2);t2=null;} };
    b.addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(b.disabled) return;
      if(!growOne(b.dataset.ab)){ refresh(); return; }
      refresh();
      t1=setTimeout(()=>{ t2=setInterval(()=>{ if(!growOne(b.dataset.ab)) stop(); refresh(); },110); },400);
    });
    ["pointerup","pointerleave","pointercancel"].forEach(ev=>b.addEventListener(ev,stop));
  });
  document.getElementById("grow-close").addEventListener("click",()=>{ closeModal(); render(); });
}

// ===== ミキサー: ボツパーツ3枚(手動選択)→ランダム新パーツ1枚(発想力不要・出目は能力合計駆動) =====
// 2026-07-11ユーザー決定: ①打線(pm_lineup)採用中のパーツは投入不可 ②消費する3枚はプレイヤーが選ぶ
// ③出来上がりはランダム(種別・タグともrollPart、威力は能力駆動rollPow)
const MIX_N=3;
// 打線に採用中のパーツを(同一kind/tag/powは1枚ずつ)除いた「ボツパーツ」一覧。S.parts上のindex付き
function benchParts(){
  let slots={}; try{ const o=JSON.parse(localStorage.getItem("pm_lineup")||"null"); if(o&&o.slots) slots=o.slots; }catch(e){}
  const used=Object.values(slots).filter(Boolean).map(p=>p.kind+"|"+p.tag+"|"+p.pow);
  const bench=[];
  S.parts.forEach((p,i)=>{ const key=p.kind+"|"+p.tag+"|"+p.pow;
    const j=used.indexOf(key); if(j>=0){ used.splice(j,1); return; }
    bench.push({p,i}); });
  return bench;
}
function openMixer(){
  const bench=benchParts();
  const can=bench.length>=MIX_N;
  const chips=bench.map((b,ix)=>`<button class="mix-chip" data-ix="${ix}">${b.p.kind}【${b.p.pow}】<span class="mc-tag">${b.p.tag}</span></button>`).join("");
  openModal(`<h2>🔀 ミキサー</h2><p style="font-size:12px;color:#5a6aa8">ボツパーツから<b>${MIX_N}枚を選んで</b>練り直し、新しい1枚をランダムに作る(発想力は不要)。打線に採用中のパーツは投入できない。</p>
    ${can?`<div class="mix-pool">${chips}</div>`:`<p style="font-size:12px;color:#8a93c0">ボツパーツが${MIX_N}枚に足りない(打線採用分は使えない)。</p>`}
    ${can?`<button class="modal-btn" id="mix-go" disabled>${MIX_N}枚選んでね(0/${MIX_N})</button>`:""}
    <button class="modal-btn ghost" id="mix-close">とじる</button>`);
  const sel=new Set(); const goBtn=document.getElementById("mix-go");
  document.querySelectorAll(".mix-chip").forEach(c=>{
    c.addEventListener("click",()=>{
      const ix=+c.dataset.ix;
      if(sel.has(ix)){ sel.delete(ix); c.classList.remove("sel"); }
      else if(sel.size<MIX_N){ sel.add(ix); c.classList.add("sel"); }
      goBtn.disabled = sel.size!==MIX_N;
      goBtn.textContent = sel.size===MIX_N ? "この3枚を練り直す!" : `${MIX_N}枚選んでね(${sel.size}/${MIX_N})`;
    });
  });
  if(goBtn) goBtn.addEventListener("click",()=>{ if(sel.size!==MIX_N)return; doMix([...sel].map(ix=>bench[ix].i)); });
  document.getElementById("mix-close").addEventListener("click",()=>{ closeModal(); render(); });
}
function doMix(indices){
  if(!indices || indices.length!==MIX_N) return;
  const used=indices.map(i=>S.parts[i]).filter(Boolean); if(used.length!==MIX_N) return;
  indices.slice().sort((a,b)=>b-a).forEach(i=>S.parts.splice(i,1)); // 後ろから消してindexズレを防ぐ
  const np=rollPart();
  S.parts.push(np);
  floatPop("ミキサー!","#e0608f"); reactHero("hero","warai");
  setMsg(`${used.map(p=>p.kind+"【"+p.pow+"】").join("・")} を練り直し… <span class="lh">${np.kind}【${np.pow}】(${np.tag})</span> が完成!`);
  render();
  openModal(`<div class="m-emoji">🔀</div><h2>ミキサー完成!</h2>
    <div class="m-big" style="color:#e0608f">${np.kind}【${np.pow}】</div><p>(${np.tag})</p>
    <p style="font-size:12px;color:#5a6aa8">${used.map(p=>p.kind+"【"+p.pow+"】").join("・")} の${MIX_N}枚を消費。</p>
    <button class="modal-btn alt" id="mix-again">続けてミキサー</button>
    <button class="modal-btn" id="mix-ok">よし!</button>`);
  document.getElementById("mix-ok").addEventListener("click",()=>{ closeModal(); render(); });
  document.getElementById("mix-again").addEventListener("click",openMixer);
}

function abilAvg(){ return ABILS.reduce((s,a)=>s+S.abil[a],0)/ABILS.length; }
function startHonban(kind, extra){
  // 本番(劇場/M-1)を発注して漫才プレイへ。打線(pm_lineup)で勝負し、結果を持ち帰る。
  // 客入り(人気)で開始温度が変わる(02_MANZAI_PLAY §4.4・P2-01残タスク)。※値は仮、P5-01で最終調整。
  const startTemp=Math.round(S.pop*0.25);
  const ctx={kind, turn:S.turn, startTemp}; if(extra) Object.assign(ctx, extra);
  try{ localStorage.setItem("pm_honban", JSON.stringify(ctx)); }catch(e){}
  saveGame();
  location.href="manzai-play.html";
}
// 出番日の行動後: 結果テキストを読ませ、プレイヤーのタップで舞台(漫才プレイ)へ切り替える。
// 自動遷移だとコマンド結果の文字が読めないため、必ずタップ起動にする(2026-07-11ユーザー指示)。
// この待ち状態は S.honbanPending として保存され、リロード/離脱しても起動時に再開する。
function beginHonbanWait(hb){
  S.busy=true; render();   // コマンドを封鎖(結果テキストはゆっくり読める)
  if(document.getElementById("honban-tap")) return;
  const label = hb.kind==="award" ? `M-1「${hb.extra.round.name}」` : "劇場出番";
  // 全画面の透明シールドでタップを受ける(2026-07-11): disabledボタンの上はポインタイベントが
  // 発生せずdocumentリスナーでは拾えないため、最前面の要素で「画面のどこでも」を保証する
  const shield=document.createElement("div"); shield.id="honban-shield";
  document.body.appendChild(shield);
  const b=document.createElement("div"); b.id="honban-tap";
  b.textContent=`▼ タップして ${label} へ ▼`;
  document.body.appendChild(b);
  // 直前の操作のタップを誤って拾わないよう少し待ってから受付開始
  setTimeout(()=>{ shield.addEventListener("pointerdown", ()=>{ ensureAudio(); startHonban(hb.kind, hb.extra); }, {once:true}); }, 350);
}
// 本番の出来(0〜100) = リズム精度 × 威力(打線) × 実力(能力)。設計の「威力×リズム×能力」を反映
// 内訳(各係数)も返し、結果モーダルで「何が足を引っ張ったか」を可視化する(2026-07-11)
function honbanPerfDetail(res){
  const acc = clamp(Math.round(res.acc||0),0,100);
  const powerNorm = clamp(((res.netaPow||0)-1)/7, 0, 1);  // 打線平均威力 1→0 / 8→1
  const abilNorm = clamp(abilAvg()/100, 0, 1);
  const fPow = 0.35 + 0.65*powerNorm;   // ネタ係数 0.35〜1.0
  const fAbil = 0.55 + 0.45*abilNorm;   // 実力係数 0.55〜1.0(初期能力だと〜0.64が天井)
  return { acc, fPow, fAbil, perf: Math.round(100 * (acc/100) * fPow * fAbil) };
}
function honbanPerf(res){ return honbanPerfDetail(res).perf; }
// 漫才プレイから返ってきた劇場出番の結果を育成に反映
function applyTheaterResult(res){
  const acc = clamp(Math.round(res.acc||0), 0, 100);
  const detail = honbanPerfDetail(res);        // 威力×リズム×能力(+内訳)
  const base = detail.perf;
  // 人気=客入り→ウケ量の上限。人気が低い(客が少ない・温まらない)とさらに頭打ち
  const popCap = Math.round(50 + S.pop*0.5);   // 人気0→上限50 / 100→上限100
  const perf = Math.min(base, popCap);
  const capped = base > perf;
  const popAtShow = S.pop;                     // 客入り計算に使った人気(増減反映前の値を表示に使う)
  let r,popDelta,emoji,color;
  if(perf>=82){r="大ウケ!!";popDelta=rint(3,5);emoji="🤣";color="#ff5252";}
  else if(perf>=62){r="ウケた";popDelta=rint(1,2);emoji="😆";color="#ff9a3c";}
  else if(perf>=42){r="まずまず";popDelta=rint(0,1);emoji="🙂";color="#3ccf6e";}
  else{r="スべった…";popDelta=-rint(2,4);emoji="😨";color="#5a6aa8";}
  S.pop=clamp(S.pop+popDelta,0,100);
  const score = abilAvg()*0.6 + perf*0.4;
  const pay=Math.round(800*(1+S.pop/60)*(perf>=80?1.4:1)); S.money+=pay;
  const ideaGain=Math.round(8 + Math.max(0,score)*0.5); S.idea+=ideaGain;
  // コンボ習得はランダム発見ではなく、イベント習得 or 自力組み立て(名称マスク)→本番披露で開示、が正(03_NETA §3.6)。
  // 開示処理は P1-09(コンボ発見・図鑑)で pm_result.combos(成立コンボ名)を使って実装する。
  let bonus="";
  setMsg(`劇場出番【${r}】(出来${perf}%) 人気${popDelta>=0?'+':''}${popDelta} / 発想力+${ideaGain}`);
  reactHero("both", perf>=62?"warai":(perf<42?"suberi":"base")); S.busy=true; render();
  openModal(`<div class="m-emoji">${emoji}</div><h2>劇場出番 結果</h2><p>出来 <b>${perf}%</b>（演技${acc}% × ネタ${Math.round(detail.fPow*100)}% × 実力${Math.round(detail.fAbil*100)}%）${res.score?` / 得点 ${Number(res.score).toLocaleString()}`:""}</p>${capped?`<p style="font-size:11px;color:#8a93c0;margin:-4px 0 0">ネタ自体は<b>${base}%</b>の出来だった。だが人気${popAtShow}で客入りが悪く、ウケは${perf}%止まり…。人気を上げよう。</p>`:(detail.fAbil<0.75&&acc>=80?`<p style="font-size:11px;color:#8a93c0;margin:-4px 0 0">演技もネタも良いのに、地力(基礎能力)がまだ足りない。稽古で能力を伸ばそう。</p>`:"")}
    <div class="m-big" style="color:${color}">${r}</div>
    <div class="m-detail">人気 <b style="color:${popDelta>=0?'#1f9e54':'#ff5252'}">${popDelta>=0?'+':''}${popDelta}</b>(→ ${S.pop})<br>
      発想力 <b style="color:#8e4fd0">+${ideaGain}</b><br>
      出演料 <b style="color:#1f9e54">¥${pay.toLocaleString()}</b>${bonus?`<br><span style="color:#8e4fd0">${bonus}</span>`:""}</div>
    <button class="modal-btn" id="th-ok">次の週へ</button>`);
  document.getElementById("th-ok").addEventListener("click",()=>{ closeModal(); S.busy=false; advanceTurn(); });
}
// 起動時: 本番から戻ってきた結果があれば反映
function maybeApplyHonbanResult(){
  let res=null; try{ res=JSON.parse(localStorage.getItem("pm_result")||"null"); }catch(e){}
  try{ localStorage.removeItem("pm_result"); localStorage.removeItem("pm_honban"); }catch(e){}
  if(!res) return;
  S.honbanPending=false;   // 出番を消化した(タップ待ち状態の解除)
  if(res.kind==="theater") applyTheaterResult(res);
  else if(res.kind==="award") applyAwardResult(res);
}

// 漫才プレイから返ってきたM-1ラウンドの結果を反映(実得点で勝敗判定・勝ち上がり)
function applyAwardResult(res){
  const r=res.round||{year:1,idx:0,name:"1回戦",thr:40,lose:""};
  const year=r.year;
  const acc=clamp(Math.round(res.acc||0),0,100);
  // M-1は出来(リズム)×実力(能力)を主軸に、人気は声援程度の補正。客入り上限は無し(満員の本選)
  const score=honbanPerf(res);   // 威力×リズム×能力(M-1は客入り上限なし=満員の本選)
  const pass=score>=r.thr;
  const isFinal = (r.idx===M1_ROUNDS.length-1 && year>=3); // 3年目の決勝=エンディング
  S.busy=true;
  if(isFinal){ closeModal(); openEnding(score, pass); return; }
  if(pass){
    S.m1Alive=year;                              // 勝ち上がり(この年はまだ生存)
    // 人気ボーナスは自己ベスト更新時のみ(3年間通しの記録=S.m1Best。01_SUCCESS §6.1)
    const prevBest=(typeof S.m1Best==="number")?S.m1Best:-1;
    let popLine;
    if(r.idx>prevBest){
      const bn=M1_POP_BONUS[r.idx]||5;
      S.pop=clamp(S.pop+bn,0,100); S.m1Best=r.idx;
      popLine=`人気 <b style="color:#1f9e54">+${bn}</b>(→ ${S.pop})<span style="color:#caa400"> 自己ベスト更新!</span>`;
    }else{
      popLine=`<span style="color:#8a93c0">人気ボーナスなし(${M1_ROUNDS[prevBest]?M1_ROUNDS[prevBest].name+"突破":"ここ"}まで到達済み)</span>`;
    }
    const last=(r.idx===M1_ROUNDS.length-1);
    setMsg(`<span class="lg">M-1「${r.name}」突破!</span>`);
    reactHero("both","warai"); render();
    openModal(`<div class="m-emoji">🎉</div><h2>${year}年目 M-1「${r.name}」</h2>
      <div class="m-big" style="color:#1f9e54">突破!</div>
      <div class="m-detail">得点 <b>${score}</b>(演技${acc}%) / 突破ライン ${r.thr}<br>${popLine}<br>${last?"決勝の大舞台に立った！":"次のラウンドへ駒を進めた!"}</div>
      <button class="modal-btn" id="aw-ok">続ける</button>`);
    document.getElementById("aw-ok").addEventListener("click",()=>{ closeModal(); S.busy=false; advanceTurn(); });
  }else{
    S.m1Alive=0;                                 // 敗退=この年のM-1は終戦
    setMsg(`<span class="ll">M-1「${r.name}」敗退…</span>`);
    reactHero("both","suberi"); render();
    openModal(`<div class="m-emoji">😢</div><h2>${year}年目 M-1「${r.name}」</h2>
      <div class="m-big" style="color:#ff5252">敗退</div>
      <div class="m-detail">得点 <b>${score}</b>(演技${acc}%) / 突破ライン ${r.thr}<br>${r.lose}</div>
      <p style="font-size:12px;color:#5a6aa8">今年のM-1は終戦。来年に向けて育てよう。</p>
      <button class="modal-btn" id="aw-ok">続ける</button>`);
    document.getElementById("aw-ok").addEventListener("click",()=>{ closeModal(); S.busy=false; advanceTurn(); });
  }
}

/* =========================================================================
   シナリオエンジン組込み(P1-02): js/scenario.js の ScenarioEngine を呼ぶ薄い連携層。
   エンジン本体はlocalStorage/S/FLAGSに触れない設計なので、ここでctxを組み立てて渡す。
   参照: ARCHITECTURE §4.1、PLAYBOOK P1-02
   ========================================================================= */
let SCRIPTS_DATA=null, CHARAS_DATA=null;
// 起動時にdata/scripts.json・data/charas.jsonをfetch。失敗してもゲーム本体は動かす(防御的)。
Promise.all([
  fetch("data/scripts.json").then(r=>r.ok?r.json():null).catch(()=>null),
  fetch("data/charas.json").then(r=>r.ok?r.json():null).catch(()=>null),
]).then(([scripts,charas])=>{
  SCRIPTS_DATA=scripts||{}; CHARAS_DATA=charas||{};
  if(!scripts) console.warn("[scenario] data/scripts.json の読込に失敗(シナリオ再生は無効)");
  if(!charas) console.warn("[scenario] data/charas.json の読込に失敗(立ち絵はフォールバック表示)");
  // デバッグ起動: ?script=ID があれば通常の起動フロー完了後に自動再生(新規開始フローより優先)
  const qs=new URLSearchParams(location.search);
  const dbgScript=qs.get("script");
  if(dbgScript){
    if(_needsNewGame){ newGame(); render(); } // Sが未初期化のセーブ無し状態でも?script=を動かせるように保険
    playScenario(dbgScript);
  }
  else if(_needsNewGame){ startNewGameSequence(); } // 名前入力→S-00→通常開始(P1-03)
}).catch(e=>{ console.warn("[scenario] data読込中に例外", e); SCRIPTS_DATA=SCRIPTS_DATA||{}; CHARAS_DATA=CHARAS_DATA||{}; });

let _scHandle=null;

// eff適用: pm_saveのフィールド名と一致させる規約(ARCHITECTURE §4.1)。hp/idea/money/pop/trust とabil.<能力名>をサポート。
function scenarioApplyEff(effObj){
  if(!effObj) return;
  const clampFields={ hp:[0,S.hpMax], idea:[0,999999], money:[-999999999,999999999], pop:[0,100], trust:[0,100] };
  Object.keys(effObj).forEach(key=>{
    const delta=effObj[key];
    if(key==="abil" && typeof delta==="object"){
      Object.keys(delta).forEach(a=>{ if(S.abil[a]!==undefined) S.abil[a]=clamp(S.abil[a]+delta[a],0,100); });
      return;
    }
    if(key.indexOf("abil.")===0){ // "abil.ボケ"形式も許容
      const a=key.slice(5); if(S.abil[a]!==undefined) S.abil[a]=clamp(S.abil[a]+delta,0,100);
      return;
    }
    if(clampFields[key]!==undefined){
      const [lo,hi]=clampFields[key];
      S[key]=clamp((S[key]||0)+delta, lo, hi);
    } else if(typeof S[key]==="number"){
      S[key]=S[key]+delta; // 未知の数値フィールドはclampせず加算のみ
    }
  });
  saveGame(); render();
}
// unlock: 当面はpm_flags.varsへ記録するのみ(P1-03以降でコマンド解禁等に接続)。
function scenarioUnlock(key){ FLAGS.vars["unlock_"+key]=1; saveFlags(); }
// se: 既存の文字送りSE(blip)を流用。名前は将来の拡張用に受け取るだけで現状はblip固定。
function scenarioSe(name){ blip(); }

function playScenario(id, onEnd){
  if(!SCRIPTS_DATA){ console.warn("[scenario] SCRIPTS_DATA未読込のため再生できません:", id); return; }
  const ctx={ S, flags:FLAGS, applyEff:scenarioApplyEff, unlock:scenarioUnlock, se:scenarioSe };
  const overlay=document.getElementById("scenario-overlay");
  // 台詞帯を本編のメッセージ窓と同じ画面位置に固定(視線移動を無くす)
  const mb=document.getElementById("msgbox");
  if(mb){ const r=mb.getBoundingClientRect(); if(r.top>0) overlay.style.setProperty("--sc-msg-top", Math.round(r.top)+"px"); }
  overlay.classList.add("show");
  ensureAudio();
  const view=makeScenarioView();
  _scHandle=ScenarioEngine.playScript(id, SCRIPTS_DATA, ctx, ()=>{
    overlay.classList.remove("show");
    _scHandle=null;
    render();
    if(onEnd) onEnd();
  }, view);
}

// 立ち絵DOM管理(pos別に1枚まで保持。同posへの再描画は差替)
const _scCharaEls={};
function scCharaImgSrc(charaId, face){
  const def=(CHARAS_DATA&&CHARAS_DATA[charaId])||null;
  if(!def) return null;
  if(def.silhouette) return null; // シルエットはimgではなく専用DOM
  const images=def.images||{};
  return images[face]||images.base||null;
}
function makeScenarioView(){
  const bgEl=document.getElementById("sc-bg");
  const charaLayer=document.getElementById("sc-chara-layer");
  const nameTab=document.getElementById("sc-name-tab");
  const textEl=document.getElementById("sc-text");
  const tapCue=document.getElementById("sc-tapcue");
  const choicesEl=document.getElementById("sc-choices");
  // 背景IDと実際の色の対応(専用画像until用意がないため色替えで代用。bgが無ければ暗転のまま)。
  // S-00で使用: river_dusk(河川敷夕暮れ)/backstage(楽屋)/sepia_flashback(回想セピア)/black(暗転)。
  const BG_COLORS={
    street_night:"#0a1130",
    river_dusk:"#4a3a5c",
    backstage:"#241c30",
    sepia_flashback:"#6b5a3e",
    black:"#000000",
    default:"#0a1130",
  };
  let sayDoneCb=null;
  return {
    onBg(bgId){ bgEl.style.backgroundColor = BG_COLORS[bgId] || BG_COLORS.default; },
    onChara(charaId, face, pos){
      // 同じposに既にいるキャラを一旦除去してから差替(1pos=1体)
      if(_scCharaEls[pos]){ _scCharaEls[pos].remove(); delete _scCharaEls[pos]; }
      const def=(CHARAS_DATA&&CHARAS_DATA[charaId])||null;
      if(def && def.silhouette){
        const wrap=document.createElement("div");
        wrap.className="sc-sil-shape pos-"+pos;
        wrap.style.left = pos==="L"?"4%":(pos==="R"?"auto":"33%");
        wrap.style.right = pos==="R"?"4%":"auto";
        wrap.dataset.chara=charaId;
        wrap.innerHTML='<div class="sil-head"></div><div class="sil-body"></div>';
        charaLayer.appendChild(wrap);
        _scCharaEls[pos]=wrap;
      } else {
        const src=scCharaImgSrc(charaId, face);
        const img=document.createElement("img");
        img.className="sc-chara pos-"+pos;
        img.src = src || "images/hero.png";
        img.alt = (def&&def.name)||charaId;
        img.dataset.chara=charaId;
        charaLayer.appendChild(img);
        _scCharaEls[pos]=img;
      }
    },
    onHide(target){
      if(target==="all"){ Object.keys(_scCharaEls).forEach(p=>{ _scCharaEls[p].remove(); delete _scCharaEls[p]; }); return; }
      Object.keys(_scCharaEls).forEach(p=>{
        const el=_scCharaEls[p];
        if(el && (el.dataset && el.dataset.chara===target)) { el.remove(); delete _scCharaEls[p]; }
      });
    },
    onSay(speaker, text, face, done){
      sayDoneCb=done;
      if(speaker){ nameTab.textContent=speaker; nameTab.style.display="inline-block"; }
      else { nameTab.style.display="none"; }
      tapCue.style.visibility="hidden";
      scTypeText(textEl, text, ()=>{ tapCue.style.visibility="visible"; if(sayDoneCb){ const cb=sayDoneCb; sayDoneCb=null; cb(); } });
    },
    onSkip(){ scSkipTyping(); },
    onChoice(options, choose){
      // msgbox(台詞窓)はそのまま残し、選択肢ボタンを下に縦積み表示する
      choicesEl.style.display="flex";
      choicesEl.innerHTML="";
      options.forEach(opt=>{
        const b=document.createElement("button");
        b.className="sc-choice-btn"; b.textContent=opt.label;
        b.addEventListener("click",(e)=>{ e.stopPropagation(); ensureAudio(); choicesEl.style.display="none"; choicesEl.innerHTML=""; choose(opt.goto); });
        choicesEl.appendChild(b);
      });
    },
    onWait(ms, done){ setTimeout(done, ms); },
    onEnd(){
      Object.keys(_scCharaEls).forEach(p=>{ _scCharaEls[p].remove(); delete _scCharaEls[p]; });
      nameTab.style.display="none"; textEl.textContent=""; choicesEl.style.display="none"; choicesEl.innerHTML="";
    }
  };
}

// パワプロ風の文字送り(既存typeTextと同型・シナリオ専用に軽量実装。タグは含まない前提のプレーンテキスト向け)。
let _scTyper=null;
function scTypeText(el, text, onDone){
  if(_scTyper){ clearInterval(_scTyper); _scTyper=null; }
  el.textContent=""; let i=0;
  const step=()=>{
    if(i<text.length){ el.textContent+=text[i]; if(text[i].trim()) blip(); i++; }
    if(i>=text.length){ clearInterval(_scTyper); _scTyper=null; if(onDone) onDone(); }
  };
  step();
  _scTyper=setInterval(step, TYPE_MS);
  el._scFullText=text; el._scDone=onDone;
}
function scSkipTyping(){
  const el=document.getElementById("sc-text");
  if(_scTyper){ clearInterval(_scTyper); _scTyper=null; el.textContent=el._scFullText||el.textContent; if(el._scDone) el._scDone(); }
}

// オーバーレイ全体タップ = 進行トリガー(選択肢表示中はボタンのみ反応=ここではonTapを呼ばない)
document.getElementById("scenario-overlay").addEventListener("click",(e)=>{
  if(!_scHandle) return;
  if(_scHandle.isChoiceActive && _scHandle.isChoiceActive()) return; // 選択肢中は専用ボタンのみ
  ensureAudio();
  _scHandle.onTap();
});

document.querySelectorAll(".ico-btn[data-cmd]").forEach(b=>{ b.addEventListener("click",()=>{ ensureAudio(); doCommand(b.dataset.cmd); }); });
document.getElementById("menu-tab").addEventListener("click",()=>{ ensureAudio(); openStatus(); });
document.getElementById("abil-strip").addEventListener("click",()=>{ ensureAudio(); openStatus(); });
// 既存セーブ継続時はここで即描画。新規開始時(_needsNewGame)はSCRIPTS_DATA読込後の
// startNewGameSequence()完了時(finishBoot内のrender())に初めて描画される(P1-03)。
if(!_needsNewGame){
  render(); maybeApplyHonbanResult();
  // タップ待ちのまま離脱/リロードした場合(結果を持ち帰っていない)は、出番のタップ待ちを再開する
  if(S.honbanPending){ const _hb=honbanAt(S.turn); if(_hb) beginHonbanWait(_hb); else S.honbanPending=false; }
}
