<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>矢田 表情セット確認</title>
<style>
  :root{ --bg:#0e0b24; --panel:#1a1740; --line:#2c2a55; --ink:#cdd6f5; --accent:#9ad0ff; --yellow:#ffce2b; }
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif;}
  body{padding:14px 10px 60px;}
  h1{font-size:16px;color:var(--yellow);text-align:center;margin:6px 0 2px;font-weight:800;}
  p.note{font-size:11px;color:#8a93c0;text-align:center;margin:0 0 14px;line-height:1.6;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:560px;margin:0 auto;}
  .cell{background:var(--panel);border:2px solid var(--line);border-radius:14px;
    padding:8px 6px 4px;text-align:center;}
  .cell img{width:100%;height:auto;display:block;}
  .lbl{font-size:13px;font-weight:800;margin-top:4px;color:var(--accent);}
  .lbl small{display:block;font-size:10px;color:#8a93c0;font-weight:600;}
  .row2{display:flex;gap:8px;justify-content:center;align-items:flex-end;
    margin:18px auto 0;max-width:560px;background:#161233;border-radius:14px;padding:12px 8px;}
  .row2 .cell{flex:1;border:none;background:transparent;padding:0;}
  .cap{font-size:11px;color:#8a93c0;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<h1>矢田 表情セット（パーツ方式）</h1>
<p class="note">固定ベース＋顔のみ差し替え＝髪・輪郭・スーツは全コマ同一（ドリフト無し）。<br>スマホ実サイズで「別人化していないか」「表情が判別できるか」を見てください。</p>

<div class="grid">
  <div class="cell"><img src="images/partner.png?v=6" alt="基本"><div class="lbl">基本<small>base</small></div></div>
  <div class="cell"><img src="images/partner_warai.png?v=6" alt="笑い"><div class="lbl">笑い<small>warai</small></div></div>
  <div class="cell"><img src="images/partner_tsukkomi.png?v=6" alt="怒り"><div class="lbl">ツッコミ/怒り<small>tsukkomi</small></div></div>
  <div class="cell"><img src="images/partner_suberi.png?v=6" alt="困り"><div class="lbl">スベリ/困り<small>suberi</small></div></div>
</div>

<div class="row2">
  <div class="cell"><img src="images/partner.png?v=6"></div>
  <div class="cell"><img src="images/partner_warai.png?v=6"></div>
  <div class="cell"><img src="images/partner_tsukkomi.png?v=6"></div>
  <div class="cell"><img src="images/partner_suberi.png?v=6"></div>
</div>
<p class="cap">↑ ゲーム内表示に近い小サイズでの並び</p>
</body>
</html>
