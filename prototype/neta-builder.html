<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネタ構成 ─ パワフル漫才</title>
<style>
  :root{
    --bg:#f6f1dd; --bg2:#eee7c8;
    --frame:#3a8fd0; --frame-d:#2068a8;
    --num:#ff5a2c; --num-d:#d8341a;
    --ink:#4a2d12;
    --shab:#3a8fd0; --shab-d:#2068a8;
    --konto:#ff7a3c; --konto-d:#e85a1c;
    --pink:#f49ac1; --ok:#5bc24a;
    /* 種別カラー（パーツ本体の色分け） */
    --k-tsukami:#c77dde;  --k-tsukami-d:#a64fc4;   /* ツカミ=紫 */
    --k-furi:#5aa9e0;     --k-furi-d:#2f7fbd;      /* フリ=青 */
    --k-boke:#ffcf4a;     --k-boke-d:#e0a800;      /* ボケ=黄 */
    --k-tsukkomi:#ff7a5c; --k-tsukkomi-d:#e0492c;  /* ツッコミ=朱赤 */
    --k-ochi:#7bd06a;     --k-ochi-d:#4f9c3e;      /* オチ=緑 */
    /* 威力バッジの色（形式の識別: しゃべくり=青 / コント=オレンジ） */
    --pow-shab:#3a8fd0;   --pow-shab-d:#2068a8;
    --pow-konto:#ff7a2c;  --pow-konto-d:#e0531c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Yu Gothic UI",sans-serif;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 12% 88%, rgba(168,224,99,.25), transparent 30%),
      radial-gradient(circle at 88% 12%, rgba(244,154,193,.22), transparent 28%);
    color:var(--ink); height:100vh;overflow:hidden;
    display:flex;flex-direction:column; -webkit-user-select:none;user-select:none;
  }
  .topbar{
    flex:0 0 auto; background:linear-gradient(180deg,#bfe0f5,#8fc4ec);
    border-bottom:4px solid var(--frame); padding:8px 12px;
    display:flex;flex-direction:column;gap:6px; box-shadow:0 3px 0 rgba(32,104,168,.3); z-index:5;
  }
  .topbar-row1{display:flex;align-items:stretch;gap:10px;}
  .tegotae{
    flex:0 0 auto;display:flex;align-items:center;gap:8px; padding:4px 16px 4px 10px;
    background:linear-gradient(180deg,#fff,#ffe9b0); border:3px solid var(--num);border-radius:14px;
    box-shadow:0 3px 0 var(--num-d), inset 0 2px 0 #fff;
  }
  .tegotae .lbl{font-size:12px;font-weight:800;color:var(--num-d);writing-mode:vertical-rl;line-height:1.1;}
  .tegotae .val{
    font-family:"Yu Gothic UI",sans-serif;font-size:40px;font-weight:900; color:var(--num);line-height:.85;
    text-shadow:2px 2px 0 #fff, 3px 3px 0 var(--num-d); -webkit-text-stroke:1px var(--num-d);
  }
  .tegotae .unit{font-size:13px;font-weight:800;color:var(--num-d);align-self:flex-end;margin-bottom:5px;}
  .tegotae .approx{font-size:9px;color:#b08a3a;align-self:flex-start;margin-top:4px;}
  .form-toggle{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;}
  .form-toggle .ft-lbl{font-size:10px;font-weight:800;color:var(--frame-d);text-align:center;}
  /* スライドトグルスイッチ: しゃべくり⇔コント */
  .switch{
    position:relative;width:148px;height:40px;border-radius:21px;cursor:pointer;
    background:#fff;border:3px solid #c9bd92;box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
    display:flex;align-items:center;overflow:hidden;user-select:none;
    transition:border-color .15s;
  }
  .switch.is-konto{border-color:var(--konto-d);}
  .switch.is-shab{border-color:var(--shab-d);}
  /* 動くノブ */
  .switch .knob{
    position:absolute;top:2px;left:2px;width:70px;height:30px;border-radius:16px;
    transition:left .2s cubic-bezier(.4,1.4,.6,1), background .2s;
    box-shadow:0 2px 4px rgba(0,0,0,.25);z-index:1;
  }
  .switch.is-shab .knob{left:2px;background:linear-gradient(180deg,#5aa9e0,var(--shab));}
  .switch.is-konto .knob{left:74px;background:linear-gradient(180deg,#ff9a4c,var(--konto));}
  /* ラベル */
  .switch .opt{
    flex:1 1 50%;text-align:center;font-size:13px;font-weight:800;z-index:2;
    transition:color .2s;line-height:1;
  }
  .switch.is-shab .opt-shab{color:#fff;}
  .switch.is-shab .opt-konto{color:#b0a474;}
  .switch.is-konto .opt-shab{color:#b0a474;}
  .switch.is-konto .opt-konto{color:#fff;}
  /* コンボ帯: 横スクロール1行で見切れ防止 */
  .combos{display:flex;align-items:center;gap:8px;min-width:0;}
  .combos .chead{flex:0 0 auto;font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--frame-d);
    writing-mode:vertical-rl;line-height:1;white-space:nowrap;}
  .combo-chips{
    flex:1 1 auto;min-width:0;display:flex;gap:6px;align-items:center;
    overflow-x:auto;overflow-y:hidden;padding:3px 1px;-webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
  }
  .combo-chips::-webkit-scrollbar{height:5px;}
  .combo-chips::-webkit-scrollbar-thumb{background:rgba(47,127,189,.4);border-radius:3px;}
  .chip{
    flex:0 0 auto;
    font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap;
    border:2px solid;display:flex;align-items:center;gap:5px;
    box-shadow:0 2px 0 rgba(0,0,0,.12);animation:pop .22s ease-out;
  }
  .chip .r{font-size:9px;font-weight:900;padding:1px 4px;border-radius:6px;color:#fff;}
  .chip.small{background:#eaffd9;border-color:var(--k-ochi-d);color:#3d7a18;}
  .chip.small .r{background:var(--k-ochi-d);}
  .chip.medium{background:#fff3cf;border-color:var(--k-boke-d);color:#9a6a00;}
  .chip.medium .r{background:#e8a800;}
  .chip.yakuman{background:linear-gradient(135deg,#ffe680,#ff9a3c);border-color:#fff;color:#7a2d00;
    box-shadow:0 0 12px rgba(255,154,60,.8),0 2px 0 rgba(0,0,0,.15);}
  .chip.yakuman .r{background:#e85a1c;}
  .chip.none{background:rgba(255,255,255,.5);border-color:#c9bd92;color:#9a8c5e;box-shadow:none;}
  @keyframes pop{from{transform:scale(.5) rotate(-4deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
  .main{flex:1 1 auto;display:flex;gap:0;min-height:0;}
  .stage{
    flex:0 0 52%;max-width:52%; background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(238,231,200,.55));
    border-right:4px solid var(--frame); padding:12px 14px;display:flex;flex-direction:column;min-height:0;
  }
  .stage h2,.stock h2{
    font-family:"Yu Gothic UI",sans-serif;font-size:17px;font-weight:900;letter-spacing:.08em;
    margin-bottom:2px;display:flex;align-items:center;gap:8px; color:var(--frame-d);text-shadow:1px 1px 0 #fff;
  }
  .stage h2{color:var(--num-d);}
  .stage h2::before{content:"";width:6px;height:20px;background:var(--num);border-radius:2px;box-shadow:0 2px 0 var(--num-d);}
  .stock h2::before{content:"";width:6px;height:20px;background:var(--frame);border-radius:2px;box-shadow:0 2px 0 var(--frame-d);}
  .sub{font-size:11px;color:#9a8c5e;margin-bottom:8px;font-weight:600;}
  .lineup{flex:1 1 auto;overflow:hidden;min-height:0;display:grid;grid-template-rows:repeat(9,1fr);gap:5px;}
  .slot{
    min-height:0;border-radius:11px;
    background:rgba(255,255,255,.72);border:2px solid #d8cfa0;
    padding:4px 7px;transition:border-color .12s, background .12s, transform .08s;
  }
  /* 空きスロット: 番号+役割の上段 / ヒントの下段（2段組） */
  .slot.empty{display:grid;grid-template-rows:auto 1fr;gap:2px;}
  /* 配置済みスロット: 番号 + パーツ を横一列に一体化（パワプロ方式） */
  .slot.filled{display:flex;align-items:stretch;gap:7px;padding:4px 7px 4px 5px;}
  .slot.filled .batt{align-self:center;}
  .slot.filled .slot-drop{flex:1 1 auto;}
  .slot.drag-over{border-color:var(--num);background:#fff4dc;transform:scale(1.012);box-shadow:0 0 0 3px rgba(255,90,44,.25);}
  .slot.fixed{background:rgba(244,154,193,.14);border-color:var(--pink);}
  /* 上段: 番号 + 役割 */
  .slothead{display:flex;align-items:center;gap:6px;min-height:0;}
  .batt{
    flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-family:"Yu Gothic UI",sans-serif;font-weight:900;font-size:20px;font-style:italic;color:var(--num);
    text-shadow:1px 1px 0 #fff, 2px 2px 0 var(--num-d);line-height:1;width:24px;
  }
  .role{
    flex:0 0 auto;font-size:10px;font-weight:800;color:#fff;text-align:center;padding:2px 8px;border-radius:6px;line-height:1.1;
    background:linear-gradient(180deg,#ffa04c,var(--num));box-shadow:0 2px 0 var(--num-d);
  }
  .slot.fixed .role{background:linear-gradient(180deg,#f9b3d0,var(--pink));box-shadow:0 2px 0 #d96fa0;}
  /* 下段: パーツ */
  .slot-drop{min-width:0;min-height:0;display:flex;align-items:stretch;}
  .slot-drop .part{align-self:stretch;}
  /* 左スロット内ではグリップ省略（番号が左にあるのでタグ名にスペース） */
  .slot-drop .part .pgrip{display:none;}
  .part{
    width:100%;display:flex;align-items:center;gap:8px; padding:7px 9px;border-radius:9px;cursor:grab;position:relative;
    color:var(--ink);
    box-shadow:0 3px 0 rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.55); border:2px solid;transition:transform .07s, box-shadow .1s;
    touch-action:none; overflow:hidden;
  }
  /* 種別ごとのパーツ本体色 */
  .part.t-tsukami{background:linear-gradient(180deg,#e2b3f0,var(--k-tsukami));border-color:var(--k-tsukami-d);box-shadow:0 3px 0 var(--k-tsukami-d),inset 0 1px 0 rgba(255,255,255,.5);}
  .part.t-furi{background:linear-gradient(180deg,#a8d4f2,var(--k-furi));border-color:var(--k-furi-d);box-shadow:0 3px 0 var(--k-furi-d),inset 0 1px 0 rgba(255,255,255,.5);}
  .part.t-boke{background:linear-gradient(180deg,#ffe680,var(--k-boke));border-color:var(--k-boke-d);box-shadow:0 3px 0 var(--k-boke-d),inset 0 1px 0 rgba(255,255,255,.6);}
  .part.t-tsukkomi{background:linear-gradient(180deg,#ffb3a0,var(--k-tsukkomi));border-color:var(--k-tsukkomi-d);box-shadow:0 3px 0 var(--k-tsukkomi-d),inset 0 1px 0 rgba(255,255,255,.5);}
  .part.t-ochi{background:linear-gradient(180deg,#b3e8a8,var(--k-ochi));border-color:var(--k-ochi-d);box-shadow:0 3px 0 var(--k-ochi-d),inset 0 1px 0 rgba(255,255,255,.5);}
  .part .pmeta{flex:1 1 auto;min-width:0;display:flex;align-items:baseline;gap:5px;overflow:hidden;}
  .part .ptag{font-size:14px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .part .ptype{font-size:10px;color:rgba(40,30,15,.6);font-weight:700;white-space:nowrap;flex:0 0 auto;}
  .part:active{cursor:grabbing;transform:translateY(1px);}
  .part.dragging{opacity:.35;}
  .part .pw{
    flex:0 0 auto;width:28px;height:28px;border-radius:7px; display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;
    font-family:"Yu Gothic UI",sans-serif;color:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 1px 2px rgba(0,0,0,.2);
  }
  /* 威力バッジの色 = 形式の識別 */
  .part.f-shab .pw{background:linear-gradient(180deg,#5aa9e0,var(--pow-shab));text-shadow:0 1px 0 var(--pow-shab-d);}
  .part.f-konto .pw{background:linear-gradient(180deg,#ff9a4c,var(--pow-konto));text-shadow:0 1px 0 var(--pow-konto-d);}
  .part.f-both .pw{background:linear-gradient(180deg,#b8a0d8,#9a7ac0);text-shadow:0 1px 0 #7a5aa0;}
  .part .pgrip{flex:0 0 auto;color:rgba(74,45,18,.3);font-size:16px;letter-spacing:-3px;font-weight:900;}
  .slot-empty-hint{font-size:11px;color:rgba(120,96,40,.45);padding-left:6px;font-weight:600;}
  .stock{
    flex:1 1 auto;min-width:0; background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(238,231,200,.4));
    padding:12px 14px;display:flex;flex-direction:column;min-height:0;
  }
  .filters{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;}
  .filters button{
    font-family:inherit;font-size:12px;font-weight:700;padding:5px 12px;border-radius:16px;cursor:pointer;
    background:#fff;color:#9a8c5e;border:2px solid #d8cfa0;transition:.12s;box-shadow:0 2px 0 #d8cfa0;
  }
  .filters button.on{background:var(--frame);color:#fff;border-color:var(--frame-d);box-shadow:0 2px 0 var(--frame-d);}
  .stock-grid{
    flex:1 1 auto;overflow-y:auto;padding-right:6px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px;align-content:start;
  }
  .stock-grid::-webkit-scrollbar{width:8px;}
  .stock-grid::-webkit-scrollbar-thumb{background:var(--frame);border-radius:4px;border:2px solid var(--bg);}
  .stock-grid .part{cursor:grab;}
  .stock-grid .part.used{opacity:.3;filter:grayscale(.7);pointer-events:none;}
  /* ストック内ではタグ名を主役に。種別ラベル・グリップは省きスペース確保 */
  .stock-grid .part .ptype{display:none;}
  .stock-grid .part .pgrip{display:none;}
  .stock-grid .part .ptag{font-size:13px;}
  .seedlbl{
    grid-column:1/-1;font-size:11px;font-weight:800;color:#fff; margin:5px 0 1px;padding:3px 10px;border-radius:6px;
    background:linear-gradient(90deg,var(--frame),transparent);
  }
  .seedlbl:first-child{margin-top:0;}
  .part img{display:none;}
  /* ポインタードラッグ用のゴースト（カーソルに追従） */
  #dragGhost{
    position:fixed;left:0;top:0;z-index:9999;pointer-events:none;
    width:170px;opacity:.92;transform:translate(-50%,-50%) rotate(-3deg) scale(1.04);
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.35));display:none;
  }
  #dragGhost .part{margin:0;cursor:grabbing;}
  body.dragging-active{cursor:grabbing;}
  /* 左右分割を厳格に維持（画面が狭くても上下にしない）。横スクロールで対応 */
  @media (max-width:760px){
    .stage{flex:0 0 56%;max-width:56%;}
    .tegotae .val{font-size:38px;}
    .stock-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
  }
</style>
</head>
<body>

<!-- ===== 上部バー ===== -->
<div class="topbar">
  <div class="topbar-row1">
    <div class="tegotae">
      <span class="lbl">手応え</span>
      <span class="val" id="tegotaeVal">0</span>
      <span class="unit">点</span>
      <span class="approx">概算</span>
    </div>
    <div class="form-toggle">
      <span class="ft-lbl">ネタ形式</span>
      <div class="switch is-shab" id="formSwitch">
        <span class="knob"></span>
        <span class="opt opt-shab">しゃべくり</span>
        <span class="opt opt-konto">コント</span>
      </div>
    </div>
  </div>
  <div class="combos">
    <div class="chead">コンボ</div>
    <div class="combo-chips" id="comboChips">
      <span class="chip none">パーツを並べてコンボを狙え</span>
    </div>
  </div>
</div>

<!-- ===== メイン ===== -->
<div class="main">
  <!-- 左: ネタ構成 -->
  <section class="stage">
    <h2>ネタ構成</h2>
    <div class="sub">打順を組む ─ 1番ツカミ・9番オチは固定枠</div>
    <div class="lineup" id="lineup"></div>
  </section>

  <!-- 右: ストックパーツ -->
  <section class="stock">
    <h2>ストックパーツ</h2>
    <div class="filters" id="filters">
      <button data-f="all" class="on">すべて</button>
      <button data-f="ツカミ">ツカミ</button>
      <button data-f="フリ">フリ</button>
      <button data-f="ボケ">ボケ</button>
      <button data-f="ツッコミ">ツッコミ</button>
      <button data-f="オチ">オチ</button>
    </div>
    <div class="stock-grid" id="stockGrid"></div>
  </section>
</div>

<script>
/* ===========================================================
   データ定義（03_NETA / SCORING の設計に準拠）
   =========================================================== */
// 形式: shab=しゃべくり / konto=コント
let currentForm = "shab";

// スロット定義: 1番ツカミ固定, 9番オチ固定, 2-8自由
// kind: 配置可能な種別。固定枠は種別固定。
const SLOTS = [
  {pos:1, role:"ツカミ", fixed:true,  accept:["ツカミ"]},
  {pos:2, role:"フリ",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:3, role:"自由",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:4, role:"自由",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:5, role:"自由",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:6, role:"自由",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:7, role:"自由",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:8, role:"自由",   fixed:false, accept:["フリ","ボケ","ツッコミ"]},
  {pos:9, role:"オチ",   fixed:true,  accept:["オチ"]},
];

// パーツ図鑑（id, 種別kind, 質タグtag, 威力pow, 形式form: both=共有/shab/konto）
// ツカミ・オチは形式共有(both)。フリ・ボケ・ツッコミは形式ごと。
let PID = 0;
function mk(kind,tag,pow,form){return {id:"p"+(PID++),kind,tag,pow,form};}
const STOCK = [
  // ツカミ(形式共有)
  mk("ツカミ","自己紹介",5,"both"), mk("ツカミ","ギャグ",6,"both"),
  // オチ(形式共有)
  mk("オチ","回収",8,"both"), mk("オチ","裏切り",7,"both"),
  // ----- しゃべくり用 -----
  mk("フリ","日常",6,"shab"), mk("フリ","説明",5,"shab"), mk("フリ","持論",7,"shab"), mk("フリ","妄想",4,"shab"),
  mk("ボケ","あるある",6,"shab"), mk("ボケ","誇張",8,"shab"), mk("ボケ","裏切り",7,"shab"),
  mk("ボケ","動き",5,"shab"), mk("ボケ","ひねり",7,"shab"),
  mk("ツッコミ","直球",7,"shab"), mk("ツッコミ","例え",6,"shab"), mk("ツッコミ","ノリ",6,"shab"),
  mk("ツッコミ","説明",5,"shab"), mk("ツッコミ","スカシ",7,"shab"),
  mk("ボケ","あるある",4,"shab"), mk("ツッコミ","直球",5,"shab"),
  // ----- コント用 -----
  mk("フリ","日常",5,"konto"), mk("フリ","説明",7,"konto"), mk("フリ","持論",6,"konto"), mk("フリ","妄想",6,"konto"),
  mk("ボケ","あるある",6,"konto"), mk("ボケ","誇張",7,"konto"), mk("ボケ","裏切り",6,"konto"),
  mk("ボケ","動き",8,"konto"), mk("ボケ","ひねり",5,"konto"),
  mk("ツッコミ","直球",6,"konto"), mk("ツッコミ","例え",5,"konto"), mk("ツッコミ","ノリ",8,"konto"),
  mk("ツッコミ","説明",6,"konto"), mk("ツッコミ","スカシ",6,"konto"),
  mk("ボケ","動き",5,"konto"), mk("ツッコミ","ノリ",6,"konto"),
];

// 配置状態: slotPos -> partId (or null)
// 配置状態: 形式ごとに別々に保持（しゃべくり打線とコント打線を独立管理）
// placements = { shab:{1:pid,...}, konto:{1:pid,...} }
const placements = {shab:{}, konto:{}};
SLOTS.forEach(s=>{placements.shab[s.pos]=null; placements.konto[s.pos]=null;});
// 現在の形式の配置を返すプロキシ的アクセサ
function placementGet(pos){return placements[currentForm][pos];}
function placementSet(pos,val){placements[currentForm][pos]=val;}
// 互換用: placement[pos] の読み書きを現在形式に向ける
const placement = new Proxy({}, {
  get(_,prop){ if(prop==="__isProxy")return true; return placements[currentForm][prop]; },
  set(_,prop,val){ placements[currentForm][prop]=val; return true; },
  ownKeys(){ return Object.keys(placements[currentForm]); },
  getOwnPropertyDescriptor(){ return {enumerable:true,configurable:true}; }
});

/* ===========================================================
   コンボ定義（小14 / 中9 / 役満4）発動条件の判定
   =========================================================== */
// ネタを「位置順のパーツ配列」にして判定する
function getPlacedParts(){
  return SLOTS.map(s=>{
    const pid=placement[s.pos];
    if(!pid) return null;
    const p=STOCK.find(x=>x.id===pid);
    return p?{...p,pos:s.pos}:null;
  });
}
// 中間7枠(2-8)のパーツ
function midParts(arr){return arr.filter(p=>p&&p.pos>=2&&p.pos<=8);}

// 順序型ヘルパ: tagA(kindA)の直後にtagB(kindB)が来る箇所があるか（隣接）
function hasAdjPair(arr,kindA,tagA,kindB,tagB){
  for(let i=0;i<arr.length-1;i++){
    const a=arr[i],b=arr[i+1];
    if(a&&b&&a.kind===kindA&&a.tag===tagA&&b.kind===kindB&&b.tag===tagB)return true;
  }
  return false;
}
// 存在型: 条件を満たすパーツが存在するか
function hasPart(arr,kind,tag){return arr.some(p=>p&&p.kind===kind&&p.tag===tag);}
function countPart(arr,kind,tag){return arr.filter(p=>p&&p.kind===kind&&p.tag===tag).length;}
