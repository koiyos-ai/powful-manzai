<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16234f">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パワフル漫才">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<title>パワフル漫才 ─ 漫才プレイ</title>
<style>
  /* =====================================================================
     漫才プレイ v2 ─ リズム天国リスペクトの一枚絵ステージ
     フォントは全てドット(DotGothic16)。背景/観客は fal.ai 生成の一枚絵。
     ===================================================================== */
  :root{
    --ink:#16234f; --ink-deep:#0a1130;
    --cream:#fff8e6;
    --yellow:#ffce2b; --red:#ff5252; --blue:#34a6ff; --green:#3ccf6e; --orange:#ff9a3c; --purple:#b06bff;
    --k-tsukami:#b06bff; --k-furi:#34a6ff; --k-boke:#ffce2b; --k-tsukkomi:#ff7a5c; --k-ochi:#3ccf6e;
    --perfect:#ffce2b; --good:#3ccf6e; --bad:#34a6ff; --miss:#9aa3bd;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  html{background:#000;}
  body{
    font-family:'DotGothic16',sans-serif;font-weight:400;
    -webkit-font-smoothing:none;
    background:var(--ink-deep);
    color:#fff;height:100vh;height:100dvh;
    max-width:520px;margin:0 auto;position:relative;
    display:flex;flex-direction:column;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;
  }
  /* ドット文字の縁取りユーティリティ(白抜き+ink縁) */
  .stroke-ink{text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),2px 2px 0 var(--ink),-2px 2px 0 var(--ink),2px -2px 0 var(--ink),-2px -2px 0 var(--ink),0 4px 0 var(--ink);}

  /* ===== タイトル画面 ===== */
  #title{
    position:absolute;inset:0;z-index:50;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;
  }
  #title::before{content:"";position:absolute;inset:0;
    background:url("images/bg/stage_yose.png") center 30%/cover no-repeat;
    filter:brightness(.45) saturate(.9);}
  #title::after{content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse 90% 60% at 50% 42%, transparent 30%, rgba(10,17,48,.88) 100%);}
  #title>*{position:relative;z-index:2;}
  #title .logo-mic{font-size:44px;filter:drop-shadow(0 4px 0 rgba(0,0,0,.5));margin-bottom:-10px;}
  #title h1{
    font-size:44px;letter-spacing:.03em;text-align:center;color:var(--yellow);line-height:1.05;
    text-shadow:3px 0 0 var(--ink),-3px 0 0 var(--ink),0 3px 0 var(--ink),0 -3px 0 var(--ink),3px 3px 0 var(--ink),-3px 3px 0 var(--ink),3px -3px 0 var(--ink),-3px -3px 0 var(--ink),0 7px 0 var(--ink);
  }
  #title .tagline{font-size:13px;color:#ffe9a8;letter-spacing:.14em;text-shadow:0 2px 0 var(--ink);}
  .neta-chip{
    font-size:13px;background:var(--ink);color:var(--yellow);
    border:2px solid var(--yellow);border-radius:6px;padding:7px 16px;letter-spacing:.05em;
  }
  #mzBack{position:absolute;top:calc(12px + env(safe-area-inset-top));left:12px;z-index:60;
    font-family:inherit;font-size:13px;color:#fff;background:var(--ink);
    border:2px solid #fff;border-radius:6px;padding:8px 14px;cursor:pointer;letter-spacing:.05em;}
  #mzBack:active{transform:translateY(2px);}
  .song-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;}
  .song-btn{
    position:relative;padding:16px 18px 14px;border:4px solid var(--ink);border-radius:10px;cursor:pointer;text-align:left;
    display:flex;align-items:center;gap:14px;color:#fff;font-family:inherit;
    box-shadow:0 6px 0 var(--ink), 0 10px 18px rgba(0,0,0,.45);
  }
  .song-btn:active{transform:translateY(6px);box-shadow:0 0 0 var(--ink);}
  .song-btn.shab{background:linear-gradient(180deg,#ff7a7a 0%,#ff5252 55%,#e03a3a 100%);}
  .song-btn.konto{background:linear-gradient(180deg,#ffb35c 0%,#ff9a3c 55%,#e5822a 100%);}
  .song-btn .ico{font-size:30px;filter:drop-shadow(0 2px 0 rgba(0,0,0,.35));}
  .song-btn .txt b{font-weight:400;font-size:22px;display:block;letter-spacing:.06em;text-shadow:0 3px 0 rgba(22,35,79,.6);}
  .song-btn .txt span{font-size:11px;opacity:.95;letter-spacing:.02em;}
  .song-btn .go{margin-left:auto;font-size:20px;opacity:.9;}
  .offset-box{width:100%;max-width:340px;background:rgba(10,17,48,.82);border:2px solid #3a4a86;border-radius:10px;padding:10px 12px;}
  .offset-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#b8c2e8;justify-content:center;flex-wrap:wrap;}
  .offset-row button{min-width:44px;height:34px;padding:0 6px;border-radius:6px;border:2px solid #5a6aa8;
    background:var(--ink);color:#fff;font-family:inherit;font-size:13px;cursor:pointer;}
  .offset-row button:active{background:#233469;}
  .offset-row .val{min-width:64px;text-align:center;font-variant-numeric:tabular-nums;color:var(--yellow);}
  .offset-hint{font-size:10px;color:#7a84ac;text-align:center;line-height:1.6;margin-top:6px;}

  /* ===== プレイ画面 ===== */
  #game{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;position:relative;background:var(--ink-deep);}

  /* --- 上部: 劇場ステージ(fal.ai一枚絵) --- */
  .stage{
    flex:0 0 auto;height:39%;position:relative;overflow:hidden;
  }
  .stage .bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 62%;}
  .stage::after{content:"";position:absolute;left:0;right:0;bottom:0;height:5px;background:var(--ink);z-index:8;}
  /* 拍パルス(舞台照明が拍で息づく) */
  .stage .pulse{position:absolute;inset:0;background:radial-gradient(ellipse 62% 55% at 50% 30%, rgba(255,240,190,.28), transparent 70%);
    opacity:0;z-index:2;pointer-events:none;}
  /* 立ち絵: センターマイクを挟んで二人が並ぶ(漫才の立ち位置)。
     画像は透過余白をトリム済み(images/bg/perf_*.png)なのでheight=実表示高。
     height 70%×口元(下から58%) ≒ マイク頭の中心(下から45%)に一致する設計 */
  .performer{position:absolute;bottom:4%;height:70%;width:auto;object-fit:contain;
    filter:drop-shadow(0 5px 6px rgba(40,10,10,.5));transition:transform .08s;z-index:3;}
  .px-sprite{image-rendering:pixelated;} /* ドット絵はニアレスト拡大(2026-07-20) */
  .p-hero{right:52%;transform-origin:bottom center;}
  .p-partner{left:52%;transform-origin:bottom center;}
  /* センターマイク(fal.ai生成・二人の前) */
  .center-mic{position:absolute;left:50%;bottom:2%;transform:translateX(-50%);height:52%;width:auto;z-index:4;
    filter:drop-shadow(0 4px 4px rgba(40,10,10,.45));pointer-events:none;}
  @keyframes perfJump{30%{transform:translateY(-16px) rotate(-3deg);}60%{transform:translateY(-3px);}}
  @keyframes perfLunge{25%,55%{transform:translateX(-14px) rotate(-6deg);}}
  .performer.react-jump{animation:perfJump .42s ease;}
  .performer.react-lunge{animation:perfLunge .42s ease;}

  /* --- 会場温度(札レーン下部の空きスペースに常設表示) --- */
  .heat-wrap{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:7;
    display:flex;align-items:center;gap:8px;pointer-events:none;}
  .heat-tag{font-size:12px;color:#fff;background:var(--ink);border:2px solid #5a6aa8;border-radius:6px;padding:5px 9px;letter-spacing:.1em;white-space:nowrap;}
  .heat-meter{display:flex;gap:4px;background:var(--ink);border:2px solid #5a6aa8;border-radius:6px;padding:5px;}
  .heat-meter i{width:19px;height:16px;border-radius:2px;background:#233060;}
  .heat-meter i.on{background:var(--seg,#34a6ff);box-shadow:0 0 7px var(--seg,#34a6ff);}
  .heat-val{font-size:15px;color:#fff;min-width:34px;text-align:left;font-variant-numeric:tabular-nums;
    text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),0 3px 0 var(--ink);}
  .heat-wrap.pulse .heat-meter{animation:heatPulse .3s ease;}
  @keyframes heatPulse{40%{transform:scale(1.12);}}

  /* --- スコア --- */
  .hud{position:absolute;top:calc(8px + env(safe-area-inset-top));right:10px;text-align:right;z-index:9;}
  .hud .score{font-size:24px;color:#fff;line-height:1;font-variant-numeric:tabular-nums;
    text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),2px 2px 0 var(--ink),-2px 2px 0 var(--ink),0 4px 0 var(--ink);}
  .hud .pts{font-size:10px;color:#ffe9a8;text-shadow:0 2px 0 var(--ink);letter-spacing:.2em;}

  /* --- カウントイン(3・2・1・いくで!) --- */
  #countin{
    position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(.6);
    font-size:64px;color:#fff;z-index:22;opacity:0;pointer-events:none;letter-spacing:.02em;
    text-shadow:3px 0 0 var(--ink),-3px 0 0 var(--ink),0 3px 0 var(--ink),0 -3px 0 var(--ink),3px 3px 0 var(--ink),-3px 3px 0 var(--ink),0 7px 0 var(--ink);
  }
  #countin.go{color:var(--yellow);font-size:54px;}
  @keyframes countPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}25%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}70%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05);}}
  #countin.show{animation:countPop .62s ease-out;}

  /* --- 判定スタンプ --- */
  #judge{
    position:absolute;top:30%;left:50%;transform:translate(-50%,-50%) rotate(-7deg);
    font-size:46px;pointer-events:none;opacity:0;z-index:20;letter-spacing:.02em;white-space:nowrap;
    text-shadow:3px 0 0 var(--ink),-3px 0 0 var(--ink),0 3px 0 var(--ink),0 -3px 0 var(--ink),3px 3px 0 var(--ink),-3px 3px 0 var(--ink),3px -3px 0 var(--ink),-3px -3px 0 var(--ink),0 6px 0 var(--ink);
  }
  @keyframes judgeStamp{0%{opacity:0;transform:translate(-50%,-50%) rotate(-7deg) scale(1.9);}18%{opacity:1;transform:translate(-50%,-50%) rotate(-7deg) scale(.94);}30%{transform:translate(-50%,-50%) rotate(-7deg) scale(1.04);}75%{opacity:1;}100%{opacity:0;transform:translate(-50%,-56%) rotate(-7deg) scale(1);}}
  #judge.show{animation:judgeStamp .55s ease-out;}
  .j-perfect{color:var(--perfect);}
  .j-good{color:var(--good);}
  .j-bad{color:var(--bad);}
  .j-miss{color:var(--miss);font-size:34px;}
  /* Perfect時の放射バースト */
  #burst{position:absolute;top:30%;left:50%;width:10px;height:10px;z-index:19;pointer-events:none;}
  .ray{position:absolute;left:50%;top:50%;width:5px;height:0;background:var(--yellow);border-radius:3px;
    transform-origin:center top;opacity:0;}
  @keyframes rayShoot{0%{height:0;opacity:1;}60%{height:46px;opacity:1;}100%{height:52px;opacity:0;}}
  #burst.show .ray{animation:rayShoot .4s ease-out;}

  /* --- コンボ --- */
  #comboDisp{
    position:absolute;top:44%;left:50%;transform:translate(-50%,-50%) rotate(-4deg);
    font-size:19px;color:#fff;z-index:20;opacity:0;pointer-events:none;letter-spacing:.06em;
    text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),2px 2px 0 var(--ink),0 4px 0 var(--ink);
  }
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) rotate(-4deg) scale(.5);}30%{opacity:1;transform:translate(-50%,-50%) rotate(-4deg) scale(1.15);}80%{opacity:1;}100%{opacity:0;}}
  #comboDisp.show{animation:comboPop .8s ease-out;}

  /* --- ネタコンボ成立表示(札レーン上部の空きスペースに大きく) --- */
  #comboFly{position:absolute;left:0;right:0;top:0;height:36%;z-index:7;
    display:flex;align-items:center;justify-content:center;pointer-events:none;overflow:visible;}
  .combo-banner{
    display:flex;align-items:center;gap:8px;white-space:nowrap;
    font-size:21px;color:var(--yellow);letter-spacing:.04em;transform:rotate(-3deg);
    text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),2px 2px 0 var(--ink),-2px 2px 0 var(--ink),0 4px 0 var(--ink);
    animation:comboBanner 1.4s cubic-bezier(.2,1.4,.4,1) both;
  }
  .combo-banner .cb-tier{font-size:11px;color:var(--ink);background:var(--yellow);border-radius:6px;padding:3px 7px;letter-spacing:.1em;text-shadow:none;border:2px solid var(--ink);}
  .combo-banner.t-mid{color:#ffb060;}
  .combo-banner.t-mid .cb-tier{background:#ffb060;}
  .combo-banner.t-yaku{color:#ff8ac2;}
  .combo-banner.t-yaku .cb-tier{background:#ff8ac2;}
  @keyframes comboBanner{0%{opacity:0;transform:rotate(-3deg) scale(2);}15%{opacity:1;transform:rotate(-3deg) scale(1);}80%{opacity:1;}100%{opacity:0;transform:rotate(-3deg) translateY(-10px);}}

  /* --- 中間: リズムレーン --- */
  .lane-wrap{flex:1 1 auto;position:relative;min-height:0;overflow:hidden;
    background:
      repeating-linear-gradient(90deg, transparent 0, transparent 118px, rgba(255,255,255,.03) 118px, rgba(255,255,255,.03) 120px),
      linear-gradient(180deg,#101a44 0%, #0a1130 50%, #101a44 100%);
  }
  .lane{position:absolute;inset:0;}
  /* 走行帯 */
  .lane-band{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:126px;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.07), inset 0 -2px 0 rgba(255,255,255,.07);}
  /* 判定サークル「ココ!」(リズム天国の的) */
  .hit-target{
    position:absolute;left:64px;top:50%;transform:translate(-50%,-50%);
    width:104px;height:104px;border-radius:50%;z-index:2;
    border:5px solid var(--yellow);
    background:radial-gradient(circle, rgba(255,206,43,.16) 55%, rgba(255,206,43,.05) 72%, transparent 75%);
    box-shadow:0 0 18px rgba(255,206,43,.35), inset 0 0 14px rgba(255,206,43,.2);
    transition:transform .05s;
  }
  .hit-target::before{content:"";position:absolute;inset:9px;border:2px dashed rgba(255,206,43,.55);border-radius:50%;}
  .hit-target::after{content:"ココ!";position:absolute;left:50%;bottom:-30px;transform:translateX(-50%);
    font-size:14px;color:var(--yellow);letter-spacing:.12em;text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),0 3px 0 var(--ink);}
  .hit-target.flash{border-color:#fff;background:radial-gradient(circle, rgba(255,255,255,.4) 55%, transparent 75%);}

  /* --- ノーツ(漫才札) --- */
  .note{
    position:absolute;top:50%;border-radius:14px;z-index:4;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:var(--kc,#888);
    border:4px solid var(--ink);
    box-shadow:0 5px 0 var(--ink), inset 0 3px 0 rgba(255,255,255,.35), inset 0 -4px 0 rgba(0,0,0,.14);
    will-change:transform;overflow:visible;color:#fff;
  }
  .note .nkind{font-size:10px;line-height:1;opacity:.92;letter-spacing:.04em;white-space:nowrap;}
  .note .nlabel{font-size:15px;line-height:1.1;text-align:center;padding:0 2px;letter-spacing:0;white-space:nowrap;
    text-shadow:1px 0 0 var(--ink),-1px 0 0 var(--ink),0 1px 0 var(--ink),0 -1px 0 var(--ink),1px 1px 0 var(--ink),0 2px 0 var(--ink);}
  .note.sz-S .nlabel{font-size:12px;}
  .note.sz-L .nlabel{font-size:17px;}
  .note.t-tsukami{--kc:var(--k-tsukami);}
  .note.t-furi{--kc:var(--k-furi);}
  .note.t-boke{--kc:var(--k-boke);}
  .note.t-tsukkomi{--kc:var(--k-tsukkomi);}
  .note.t-ochi{--kc:var(--k-ochi);}
  .note.t-boke .nkind,.note.t-ochi .nkind{color:var(--ink);opacity:.75;}
  /* タップ種類スタンプ */
  .note .mark{position:absolute;top:-15px;right:-10px;z-index:2;
    font-size:10px;color:#fff;border-radius:6px;padding:3px 7px;letter-spacing:.06em;
    border:2px solid var(--ink);box-shadow:0 2px 0 var(--ink);}
  .note .mark.back{background:#9a4fd0;}
  .note .mark.roll{background:#e0531c;}
  .note .mark.hold{background:#2068a8;}
  .note .mark.rest{background:#5a648c;}
  .note.hit{opacity:0;transform:translateY(-50%) scale(1.45)!important;transition:opacity .18s, transform .18s;}
  .note.missed{opacity:.28;filter:grayscale(1);}
  .note.is-back{border-style:dashed;}
  .note.is-back.hit{transform:translateY(-82%) scale(1.45)!important;} /* 浮かせた裏拍札はヒット時も浮いたまま */
  .note.is-rest{background:#39406b;border-style:dotted;}
  .note.is-rest .nlabel{text-shadow:none;color:#c8cfe8;}
  .note.is-accent{box-shadow:0 5px 0 var(--ink), 0 0 20px rgba(255,206,43,.95), inset 0 3px 0 rgba(255,255,255,.35);}
  /* 操作指示バッジ(タグ表記と混ざらないよう、札に斜めがけの色付きバッジで示す) */
  .note .abadge{position:absolute;top:-17px;left:50%;transform:translateX(-50%) rotate(-7deg);z-index:3;
    font-size:13px;color:#fff;padding:3px 10px;border-radius:8px;white-space:nowrap;letter-spacing:.06em;
    border:3px solid var(--ink);box-shadow:0 3px 0 var(--ink);}
  .note.is-roll .abadge{background:#e0301c;animation:badgeShake .32s ease-in-out infinite;}
  @keyframes badgeShake{50%{transform:translateX(-50%) rotate(-2deg) scale(1.06);}}
  .note.is-hold .abadge{background:#1d5fa8;}
  /* 連打札: オレンジ+チェブロン(»»»)で「叩き続ける」を示す */
  .note.is-roll{background:#ff8c3a;}
  .note.is-roll .ntail{position:absolute;left:8px;right:8px;bottom:6px;height:14px;z-index:1;overflow:hidden;
    color:rgba(255,255,255,.85);font-size:14px;line-height:14px;letter-spacing:2px;white-space:nowrap;
    animation:chevFlow .5s linear infinite;}
  @keyframes chevFlow{from{transform:translateX(0);}to{transform:translateX(-16px);}}
  .note .rollcount{position:absolute;right:8px;top:6px;
    font-size:22px;color:#fff;z-index:2;font-variant-numeric:tabular-nums;
    text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),0 4px 0 var(--ink);transition:transform .08s;}
  /* 長押し札: 青いバー+終点キャップ。ゲージが端まで伸びたら離してOK */
  .note.is-hold{background:linear-gradient(180deg,#4aa8ec,#2f7fc8);}
  .note.is-hold::after{content:"";position:absolute;right:6px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;border-radius:50%;background:#fff;border:4px solid var(--ink);z-index:2;}
  .note .holdgauge{position:absolute;left:4px;right:4px;bottom:4px;height:9px;width:0;max-width:calc(100% - 8px);
    background:linear-gradient(90deg,#d8f0ff,#fff);border-radius:4px;box-shadow:0 0 10px rgba(255,255,255,.9);z-index:1;}
  /* 判定リング */
  .hit-ring{position:absolute;left:64px;top:50%;width:40px;height:40px;border:5px solid #fff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:6;animation:ringPop .32s ease-out forwards;}
  @keyframes ringPop{from{width:40px;height:40px;opacity:.95;}to{width:150px;height:150px;opacity:0;}}
  /* ヒットスパーク(◆が飛び散る) */
  .spark{position:absolute;left:64px;top:50%;width:9px;height:9px;background:var(--yellow);z-index:6;pointer-events:none;
    transform:translate(-50%,-50%) rotate(45deg);animation:sparkFly .38s ease-out forwards;}
  @keyframes sparkFly{to{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(45deg) scale(.2);opacity:0;}}

  /* --- 下部: 観客席(fal.ai一枚絵・温度でクロスフェード) --- */
  .audience{
    flex:0 0 auto;height:132px;position:relative;overflow:hidden;
    border-top:5px solid var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
    background:#0a0d24;
  }

<script>
/* =========================================================================
   パワフル漫才 ─ 漫才プレイ（リズムゲーム）
   核心: AudioContext.currentTime を唯一のマスタークロックとし、
        音の発音もノーツ判定もすべて「拍(beat)」で同期する。
   ========================================================================= */

// ---- 音名→周波数 ----
const NOTE={};
(function(){
  const names=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  // シャープ表記→フラット表記の異名同音マップ
  const flat={"C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb"};
  for(let o=1;o<=6;o++)names.forEach((n,i)=>{
    const m=(o+1)*12+i;
    const f=440*Math.pow(2,(m-69)/12);
    NOTE[n+o]=f;
    if(flat[n]) NOTE[flat[n]+o]=f; // フラット表記も同じ周波数で登録
  });
})();
function freq(n){return typeof n==="number"?n:NOTE[n];}

/* =========================================================================
   楽曲データ（manzai-music.html と同じ2曲）
   ========================================================================= */
const SONGS={
  shab:{ // しゃべくり: メロコアパンク(MP3) BPM150
    name:"しゃべくり",
    file:"racing_the_high_noon_1.mp3",
    bpm:150,
    introOffset:0.890, // 曲頭から1拍目まで(中盤キックから逆算した正確な値)
    totalBeats:52,     // 13小節×4拍(導入2小節+パーツ9小節+フィナーレ2小節)
    buffer:null,       // デコード済みAudioBufferを保持
  },
  konto:{ // コント: Fマイナーメロコア(2026-07-11ユーザー採用曲)。BPM実測150.04・頭は即バンドイン
    name:"コント",
    file:"against_the_curb.mp3",
    bpm:150,
    introOffset:0.492, // キック帯域グリッド解析: 表拍グリッド0.092+1拍(スネア2・4拍/キック最強の位相から小節頭を判定)
    totalBeats:52,     // 原曲30.8sを784フレーム(20.48s)にカット済み: フィナーレ(48拍)+余韻2拍で終端(2026-07-12ユーザー指摘で1小節短縮)
    buffer:null,
  }
};

/* =========================================================================
   譜面生成: 8拍目から、各拍にノーツを配置（タップ種類・パネルサイズ付き）
   第1段階では仮の譜面。9パーツ分のノーツをタグ割り当てに沿って並べる。
   ========================================================================= */
// タグ仮割り当て（タップ数・種類）
const TAG_RHYTHM={
  "自己紹介":{kind:"ツカミ",pat:["tap","tap","tap"]},
  "ギャグ":{kind:"ツカミ",pat:["tap","rest","tap"]},
  "日常":{kind:"フリ",pat:["rest","tap","tap"]},   // 間は先頭or真ん中(末尾だとタメの意味がない・2026-07-11)
  "あるある":{kind:"ボケ",pat:["tap","tap","tap"]},
  "誇張":{kind:"ボケ",pat:["tap","tap","tap","hold"]},
  "裏切り":{kind:"ボケ",pat:["tap","tap","back"]},
  "動き":{kind:"ボケ",pat:["tap","roll","tap"]},      // rollは長尺1本の連打
  "直球":{kind:"ツッコミ",pat:["tap","tap","tap"]},
  "ノリ":{kind:"ツッコミ",pat:["tap","roll","tap"]},   // rollは長尺1本の連打
  "スカシ":{kind:"ツッコミ",pat:["rest","back"]},  // タメてから裏拍でスカす(間は末尾禁止・2026-07-11)
  "回収":{kind:"オチ",pat:["tap","tap","tap","hold"]},
  "説明":{kind:"フリ",pat:["tap","rest","tap"]},   // 間は先頭or真ん中(末尾だとタメの意味がない・2026-07-11)
  "持論":{kind:"フリ",pat:["tap","tap","tap"]},
  "妄想":{kind:"フリ",pat:["tap","rest","tap"]},
  "ひねり":{kind:"ボケ",pat:["tap","back","tap"]},
  "例え":{kind:"ツッコミ",pat:["tap","tap","tap"]},
};
const KIND_CLASS={"ツカミ":"t-tsukami","フリ":"t-furi","ボケ":"t-boke","ツッコミ":"t-tsukkomi","オチ":"t-ochi"};
function sizeFromPower(p){ return p<=3?"L":(p<=6?"M":"S"); }
const SIZE_PX={L:90,M:78,S:64};

// 仮ネタ（9パーツ）: タグ + 威力。本番ではネタ構成画面から渡される。
const SAMPLE_NETA=[
  {tag:"自己紹介",pow:5},{tag:"日常",pow:6},{tag:"あるある",pow:6},{tag:"直球",pow:7},
  {tag:"誇張",pow:8},{tag:"直球",pow:5},{tag:"動き",pow:6},{tag:"ノリ",pow:6},{tag:"回収",pow:8},
];
// 育成のネタ構成(pm_lineup)があれば譜面に反映。無ければサンプル。
// v2={v:2,shab:{...},konto:{...}}は形式別の打線を返す。旧v1はしゃべくり打線とみなす(2026-07-12形式導入)
function getNeta(style){
  const st=(style==="konto")?"konto":"shab";
  try{ const raw=localStorage.getItem("pm_lineup"); if(raw){ const o=JSON.parse(raw);
    if(o&&o.v===2){ const l=o[st]; if(l&&l.parts&&l.parts.length) return l.parts; return SAMPLE_NETA; }
    if(o&&o.parts&&o.parts.length) return st==="shab"? o.parts : SAMPLE_NETA;
  } }catch(e){}
  return SAMPLE_NETA;
}
// 指定形式の打線が組まれているか(本番でのコント選択可否に使う)
function hasLineup(style){ return getNeta(style)!==SAMPLE_NETA; }
// 本番(劇場/M-1)から呼ばれた場合は pm_honban が入っている。結果を育成へ返す。
let HONBAN=null;
try{ HONBAN=JSON.parse(localStorage.getItem("pm_honban")||"null"); }catch(e){}
(function(){
  const back=document.getElementById("mzBack");
  if(HONBAN){ if(back) back.style.display="none"; }   // 本番は強制プレイ(戻る無効)
  else if(back) back.addEventListener("click",()=>{ if(history.length>1) history.back(); else location.href="index.html"; });
  const info=document.getElementById("netaInfo");
  if(info){
    if(HONBAN){
      if(HONBAN.kind==="award"){ info.innerHTML="🏆 M-1「"+((HONBAN.round&&HONBAN.round.name)||"本選")+"」─ 形式を選んで全力でいけ!"; }
      else { info.innerHTML="🎭 本番: 劇場出番 ─ 形式は自由。打線で勝負!"; }
    }
    else { const n=getNeta("shab"); if(n!==SAMPLE_NETA){ info.innerHTML="🃏 育成の打線で本番 ─ <b>"+n.length+"枚</b>"; } else { info.textContent="(サンプルネタで試遊)"; } }
  }
  // 本番でコント打線が未編成なら選べない(サンプルネタでの本番出場を防ぐ。2026-07-12形式導入)
  if(HONBAN && !hasLineup("konto")){
    const kb=document.querySelector(".song-btn.konto");
    if(kb){ kb.disabled=true; kb.style.opacity=".45"; kb.style.filter="grayscale(.6)";
      const t=kb.querySelector(".txt span"); if(t) t.textContent="コント打線が未編成"; }
  }
})();

/* 曲解析(確定値): 表拍(4分)が主リズム。手拍子は表拍に乗り、裏拍はアクセント時のみ。
   13小節構成、小節4・13が盛り上がり。→ 譜面は「1パーツ=1小節」を固定の骨格とし、
   そのパーツが何を叩かせるか(タップ種類・数)だけがネタ構成で変わる。
   小節1-2=導入(カウントイン、ノーツなし)、3-11=9パーツ(各1小節)、12-13=フィナーレ。 */
const MEASURE_BEATS=4;
const INTRO_MEASURES=2;      // 小節1-2: 導入
const FINALE_MEASURES=2;     // 小節12-13: フィナーレ(13が盛り上がり)

// 譜面を生成: パーツごとに1小節(4拍)を割り当て、パターンをその小節の拍に乗せる
function buildChart(neta){
  const notes=[];
  neta.forEach((part,pi)=>{
    const measureBeat = (INTRO_MEASURES+pi)*MEASURE_BEATS; // このパーツの小節の頭拍
    const measureNo = INTRO_MEASURES+pi+1; // 1-indexedの小節番号(盛り上がり小節=4の判定用)
    const accent = measureNo===4; // 曲解析で盛り上がる小節
    const r=TAG_RHYTHM[part.tag]||{kind:"ボケ",pat:["tap","tap","tap"]};
    const size=sizeFromPower(part.pow);
    let slot=0; // 0〜3: 小節内の拍位置(表拍グリッド)
    r.pat.forEach((type)=>{
      if(slot>=MEASURE_BEATS) return; // 小節を超えるパターンは末尾を捨てる(安全策)
      const beat=measureBeat+slot;
      if(type==="rest"){
        // 間: その拍は休符(タメ)として表示。次の拍からまた叩ける
        notes.push({beat, type:"rest", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent});
        slot+=1;
      }else if(type==="roll"){
        // 連打: 小節内に収まる長さ(最大2拍)
        const rollBeats=Math.min(2, MEASURE_BEATS-slot);
        notes.push({beat, type:"roll", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent,
                    rollBeats, rollNeed:6, rollCount:0});
        slot+=rollBeats;
      }else if(type==="hold"){
        // 長押し: 1拍ぶん押し続ける
        notes.push({beat, type:"hold", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent, holdBeats:1});
        slot+=1;
      }else if(type==="back"){
        // 裏拍アクセント: 表拍の半拍後ろにずらして配置(曲のリズムでは裏拍はここだけ)
        notes.push({beat:beat+0.5, type:"tap", isBack:true, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent});
        slot+=1;
      }else{
        // 単純タップ: 表拍そのまま
        notes.push({beat, type:"tap", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent});
        slot+=1;
      }
    });
  });
  // フィナーレ: 小節13(盛り上がり)に、ネタとは独立した締めの一撃を配置
  const finaleMeasureBeat=(INTRO_MEASURES+neta.length)*MEASURE_BEATS + MEASURE_BEATS; // 小節13の頭拍
  notes.push({beat:finaleMeasureBeat, type:"tap", isBack:false, kind:"オチ", size:"L", tag:"フィナーレ!", pow:9, partIdx:-1, accent:true});
  return notes;
}

/* =========================================================================
   ネタコンボ検出(03_NETA.md §3.5 / SCORING.md §6)
   配置からコンボ候補を割り出し、リズム成功(関与パーツにBad/Missなし)で成立。
   倍率: 小×1.10 / 中×1.25 / 役満×1.15(全体・小中と重ねがけ)。小中は最上位のみ。
   ※能力条件付き役満(本格しゃべくり等)はP1-07/08の能力接続後に追加。
   ========================================================================= */
function analyzeCombos(neta, songKey){
  const n=neta.length;
  const T=i=>neta[i].tag;
  const K=i=>(TAG_RHYTHM[neta[i].tag]||{}).kind||"";
  const P=i=>neta[i].pow||0;
  const idxAll=t=>{const a=[];for(let i=0;i<n;i++)if(T(i)===t)a.push(i);return a;};
  const out=[];
  // --- 小コンボ(隣接ペア型) ---
  const pairs=[
    ["日常","あるある","あるあるネタ"],["持論","誇張","熱弁"],["説明","裏切り","肩透かし"],
    ["あるある","直球","ど真ん中"],["誇張","直球","一刀両断"],["裏切り","スカシ","柳に風"],
    ["誇張","例え","言い得て妙"],["あるある","ノリ","あるあるノリ"],["動き","ノリ","悪乗り"],
  ];
  pairs.forEach(([a,b,name])=>{
    for(let i=0;i<n-1;i++) if(T(i)===a&&T(i+1)===b){ out.push({name,tier:"小",mult:1.10,parts:[i,i+1]}); break; }
  });
  // 天丼: 同威力・同タグのボケ2つ(存在)
  outer: for(let i=0;i<n;i++) for(let j=i+1;j<n;j++)
    if(K(i)==="ボケ"&&K(j)==="ボケ"&&T(i)===T(j)&&P(i)===P(j)){ out.push({name:"天丼",tier:"小",mult:1.10,parts:[i,j]}); break outer; }
  // 先手必勝: 1番ギャグツカミ+2番ボケ
  if(n>=2 && T(0)==="ギャグ" && K(1)==="ボケ") out.push({name:"先手必勝",tier:"小",mult:1.10,parts:[0,1]});
  // 伏線回収: 説明フリ+回収オチ(存在)
  { const s=idxAll("説明"), o=idxAll("回収"); if(s.length&&o.length) out.push({name:"伏線回収",tier:"小",mult:1.10,parts:[s[0],o[0]]}); }
  // 緩急: 隣接フリ→ボケの威力差5以上
  for(let i=0;i<n-1;i++) if(K(i)==="フリ"&&K(i+1)==="ボケ"&&Math.abs(P(i+1)-P(i))>=5){ out.push({name:"緩急",tier:"小",mult:1.10,parts:[i,i+1]}); break; }
  // --- 中コンボ ---
  for(let i=0;i<n-2;i++) if(T(i)==="日常"&&T(i+1)==="あるある"&&T(i+2)==="直球"){ out.push({name:"教科書",tier:"中",mult:1.25,parts:[i,i+1,i+2]}); break; }
  // 起承転結: 説明→(任意ボケ)→裏切り→回収 の順序4
  { let a=-1,b=-1,c=-1,d=-1;
    for(let i=0;i<n;i++){
      if(a<0){ if(T(i)==="説明")a=i; }
      else if(b<0){ if(K(i)==="ボケ"&&T(i)!=="裏切り")b=i; }
      else if(c<0){ if(T(i)==="裏切り")c=i; }
      else if(d<0){ if(T(i)==="回収")d=i; }
    }
    if(d>=0) out.push({name:"起承転結",tier:"中",mult:1.25,parts:[a,b,c,d]});
  }
  // 波状攻撃: 誇張→直球ペア×2組
  { const ps=[]; for(let i=0;i<n-1;i++) if(T(i)==="誇張"&&T(i+1)==="直球") ps.push([i,i+1]);
    if(ps.length>=2) out.push({name:"波状攻撃",tier:"中",mult:1.25,parts:[...ps[0],...ps[1]]}); }
  // マシンガン: ボケ4連続
  for(let i=0;i<=n-4;i++) if(K(i)==="ボケ"&&K(i+1)==="ボケ"&&K(i+2)==="ボケ"&&K(i+3)==="ボケ"){ out.push({name:"マシンガン",tier:"中",mult:1.25,parts:[i,i+1,i+2,i+3]}); break; }
  // 熱演(コント): 動きボケ2+ノリツッコミ2
  if(songKey==="konto"){ const d=idxAll("動き"), r=idxAll("ノリ"); if(d.length>=2&&r.length>=2) out.push({name:"熱演",tier:"中",mult:1.25,parts:[d[0],d[1],r[0],r[1]]}); }
  // 名人芸(しゃべくり): 例えツッコミ1+スカシツッコミ1
  if(songKey==="shab"){ const e=idxAll("例え"), s=idxAll("スカシ"); if(e.length&&s.length) out.push({name:"名人芸",tier:"中",mult:1.25,parts:[e[0],s[0]]}); }
  // 伏線過多: 説明2+回収
  { const s=idxAll("説明"), o=idxAll("回収"); if(s.length>=2&&o.length) out.push({name:"伏線過多",tier:"中",mult:1.25,parts:[s[0],s[1],o[0]]}); }
  // 掛け合い: ボケ/ツッコミが交互に4連続
  for(let i=0;i<=n-4;i++){
    const k=[K(i),K(i+1),K(i+2),K(i+3)];
    if(k.every(x=>x==="ボケ"||x==="ツッコミ")&&k[0]!==k[1]&&k[1]!==k[2]&&k[2]!==k[3]){ out.push({name:"掛け合い",tier:"中",mult:1.25,parts:[i,i+1,i+2,i+3]}); break; }
  }
  // 七変化: 異なるボケタグ4種以上
  { const bs=new Set(); const bi=[]; for(let i=0;i<n;i++) if(K(i)==="ボケ"){bs.add(T(i));bi.push(i);}
    if(bs.size>=4) out.push({name:"七変化",tier:"中",mult:1.25,parts:bi}); }
  // --- 役満: 尻上がり(9枠が完全右肩上がり) ---
  { let inc=(n>=9); for(let i=0;i<n-1&&inc;i++) if(!(P(i)<P(i+1))) inc=false;
    if(inc) out.push({name:"尻上がり",tier:"役満",mult:1.15,parts:Array.from({length:n},(_,i)=>i)}); }
  return out;
}

/* =========================================================================
   オーディオエンジン
   ========================================================================= */
let actx=null, masterGain=null;
function initAudio(){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();
  masterGain.gain.value=0.9;
  masterGain.connect(actx.destination);
}
// MP3を読み込んでAudioBufferにデコード（キャッシュ）
async function loadSongBuffer(song){
  if(song.buffer) return song.buffer;
  const res=await fetch(song.file);
  if(!res.ok) throw new Error("音源ファイルが見つかりません: "+song.file);
  const arr=await res.arrayBuffer();
  song.buffer=await actx.decodeAudioData(arr);
  return song.buffer;
}

/* --- 効果音(リズム天国風: 手拍子・ウッドブロック・素朴で太い打撃音) --- */
// 共通: ノイズバースト(手拍子の芯)
function _clapBurst(t, fc, q, vol, dur){
  const bs=actx.sampleRate*dur,buf=actx.createBuffer(1,bs,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,2.2);
  const s=actx.createBufferSource();s.buffer=buf;
  const f=actx.createBiquadFilter();f.type="bandpass";f.frequency.value=fc;f.Q.value=q;
  const g=actx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);s.stop(t+dur+.01);
}
// 共通: 短い木質トーン(ウッドブロック/ポン)
function _woodTone(t, f0, f1, vol, dur){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type="sine";o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(f1,t+dur*.7);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.02);
}
// タップ予告音: ウッドブロックの「コッ」(拍の位置を耳で教える)
function pStab(t){
  _woodTone(t, 1500, 900, .10, .05);
  _clapBurst(t, 3200, 2.5, .05, .03);
}
// タップ音: リズム天国の手拍子系。perfect=パァン! / good=パン / bad=ペチ
function sfxTap(quality){
  if(!actx)return;
  const t=actx.currentTime;
  if(quality==="perfect"){
    _clapBurst(t, 1500, .9, .5, .07);          // 手拍子の芯
    _clapBurst(t+.004, 2600, 1.4, .3, .05);    // 高域のパチ
    _woodTone(t, 880, 1320, .22, .09);         // 明るいポン(上昇)
    _woodTone(t+.015, 1760, 2200, .10, .12);   // きらめき
  }else if(quality==="good"){
    _clapBurst(t, 1200, 1.0, .38, .06);
    _woodTone(t, 660, 820, .16, .08);
  }else{ // bad
    _clapBurst(t, 700, 1.2, .26, .05);
    _woodTone(t, 300, 240, .16, .09);
  }
}
function sfxMiss(){
  if(!actx)return;const t=actx.currentTime;
  // 「ドテッ」: 低いトーンが沈む+こもったノイズ
  const o=actx.createOscillator(),g=actx.createGain();
  o.type="triangle";o.frequency.setValueAtTime(240,t);o.frequency.exponentialRampToValueAtTime(70,t+.28);
  g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.0001,t+.3);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.32);
  _clapBurst(t, 300, 1.5, .18, .12);
}
// 客の笑い声(Perfect時)。中低域ノイズを「ハッハッハッ」と刻む
function sfxLaugh(strength){
  if(!actx)return;
  const t0=actx.currentTime+0.02;
  const bursts = strength>=70 ? 5 : strength>=45 ? 4 : 3;
  for(let b=0;b<bursts;b++){
    const t=t0+b*0.09;
    const bs=actx.sampleRate*.08,buf=actx.createBuffer(1,bs,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,1.6);
    const s=actx.createBufferSource();s.buffer=buf;
    const f=actx.createBiquadFilter();f.type="bandpass";
    f.frequency.value=650+Math.random()*450+b*60; f.Q.value=0.9;
    const lp=actx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=2400;
    const g=actx.createGain();
    const vol=(0.12+Math.min(0.14, strength/650))*(1-b*0.13);
    g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(vol,t+.015);g.gain.exponentialRampToValueAtTime(.0001,t+.09);
    s.connect(f);f.connect(lp);lp.connect(g);g.connect(masterGain);s.start(t);s.stop(t+.1);
  }
}

/* =========================================================================
   ゲーム状態 & スケジューラ
   ========================================================================= */
let G=null; // ゲーム状態
const LANE_TRAVEL_BEATS=3.5; // ノーツが流れてくる拍数(4→3.5: 札間隔を広げ重なり軽減+速度アップ 2026-07-11)
let userOffsetMs=0;

function startGame(songKey){
  if(!actx) initAudio();
  if(actx.state==="suspended") actx.resume();

  const song=SONGS[songKey];
  const spb=60/song.bpm;
  const neta=getNeta(songKey); // songKey=形式("shab"/"konto")。形式ごとの打線で譜面を組む
  const chart=buildChart(neta);
  const _startTemp=(HONBAN&&typeof HONBAN.startTemp==="number")?Math.max(0,Math.min(100,HONBAN.startTemp)):0;
  // パーツごとのノーツ数(コンボ成立=パーツ完了の検出に使う)
  const partNotes={};
  chart.forEach(c=>{ if(c.partIdx>=0) partNotes[c.partIdx]=(partNotes[c.partIdx]||0)+1; });

  // 画面切替（ロード中表示）
  document.getElementById("title").style.display="none";
  document.getElementById("game").style.display="flex";
  document.getElementById("result").style.display="none";
  document.getElementById("lane").querySelectorAll(".note").forEach(n=>n.remove());
  document.getElementById("scoreDisp").textContent="0";

  // MP3をロードしてから再生開始
  loadSongBuffer(song).then(buffer=>{
    const playStart=actx.currentTime+0.25; // 再生開始までの余裕
    // 曲の1拍目(introOffset)を、譜面の拍0に合わせる
    const t0 = playStart + song.introOffset;

    // MP3再生（AudioBufferSourceをマスタークロックでスケジュール）
    const src=actx.createBufferSource();
    src.buffer=buffer;
    src.connect(masterGain);
    src.start(playStart);

    G={
      songKey, song, spb, t0,
      chart, src, playStart,
      songDuration: buffer.duration,
      notes: chart.map((c,i)=>({...c, id:i, dom:null, judged:false, rollCount:0, holding:false})),
      score:0, combo:0, maxCombo:0,
      counts:{perfect:0,good:0,bad:0,miss:0},
      totalNotes: chart.length,
      finished:false,
      // 会場温度。基本0(ユーザー決定・ツカミで温める設計)だが、本番は客入り(人気)で開始温度が変わる(pm_honban.startTemp, P2-01)
      temp:_startTemp, tsukamiHit:false, maxTemp:_startTemp,
      // 温度の1枚あたり単位: ネタ構成で総ノーツ数が変わっても
      // 「全ピタッ!で110%相当(MAX100で頭打ち)」が常に成り立つよう自動スケール(2026-07-11傾斜変更)
      tempUnit: 110/chart.length,
      countShown:{},
      // ネタコンボ(03_NETA §3.5): 候補・パーツ進行・成立記録
      comboCands: analyzeCombos(neta, songKey),
      partNotes, partJudged:{}, partAlive:{}, partEarned:{}, partMult:{},
      firedCombos:[],
    };
    renderHeat();
    document.getElementById("comboFly").innerHTML="";

    // スケジューラ開始（タップ予告音のみ）と描画ループ
    G.schedulerId=setInterval(scheduler, 25);
    requestAnimationFrame(renderLoop);
  }).catch(err=>{
    alert("音源ファイルの読み込みに失敗しました。\n"+song.file+" が同じ場所にあるか確認してください。\n"+err.message);
    document.getElementById("game").style.display="none";
    document.getElementById("title").style.display="flex";
  });
}

// スケジューラ: MP3は既に再生中なので、タップ予告音(スタブ)と終了判定のみ
function scheduler(){
  if(!G||G.finished) return;
  const now=actx.currentTime;
  const ahead=0.12;
  // タップ予告音(スタブ): まだ鳴らしていないノーツの拍が近づいたら予約
  G.notes.forEach(nt=>{
    if(nt.stabbed) return;
    const noteTime=G.t0+nt.beat*G.spb;
    if(noteTime <= now+ahead){
      pStab(noteTime);
      nt.stabbed=true;
    }
  });
  // 曲終了判定（MP3の長さで判定）
  const endTime=G.playStart + G.songDuration;
  if(now > endTime+0.2 && !G.finished){ finishGame(); }
}

/* =========================================================================
   描画ループ（ノーツの位置更新）── 判定には使わない
   ========================================================================= */
const lane=document.getElementById("lane");
const HIT_X=64; // 判定サークルのx座標(px)
// 判定窓: 2026-07-11ユーザー指示でシビア化(旧85/150/220ms)。※値は仮(P5-01で最終調整)
const WIN={perfect:0.065, good:0.120, bad:0.180}; // 秒(基準=M札)
// サイズ別判定窓倍率: 強パーツ(威力7-8=S札)ほどシビア、弱パーツ(威力1-3=L札)は緩め。
// 02 §4.3「判定窓倍率」のサイズ軸を先行実装(タグ別倍率はP2-02)。※値は仮
const WIN_SIZE_MULT={S:0.8, M:1.0, L:1.15};
function noteWin(nt){
  const m=WIN_SIZE_MULT[nt.size]||1;
  return {perfect:WIN.perfect*m, good:WIN.good*m, bad:WIN.bad*m};
}
// 1拍あたりの画面上のピクセル長（ノーツの流れる速度から算出）
// レイアウト未確定(clientWidth=0)の瞬間に呼ばれても壊れないよう下限を敷く
function laneWidth(){ return Math.max(lane.clientWidth, 320); }
function beatPxLen(){
  const laneW=laneWidth();
  const startX=laneW+40;
  return (startX-HIT_X)/LANE_TRAVEL_BEATS;
}
function renderLoop(){
  if(!G||G.finished) return;
  const now=actx.currentTime;
  const curBeat=(now-G.t0)/G.spb;
  const laneW=laneWidth();

  G.notes.forEach(nt=>{
    // ノーツが見える範囲(判定の数拍前〜過ぎ)
    const appearBeat=nt.beat-LANE_TRAVEL_BEATS;
    // 判定済み: hit/missアニメ(0.3秒)の後、DOMを確実に削除
    if(nt.judged){
      if(nt.dom){
        if(nt.judgedAt===undefined) nt.judgedAt=now;
        if(now - nt.judgedAt > 0.32){ nt.dom.remove(); nt.dom=null; }
      }
      return;
    }
    // まだ見えない／通り過ぎた（未判定でMiss確定前）
    if(curBeat<appearBeat){
      if(nt.dom){ nt.dom.remove(); nt.dom=null; }
      return;
    }
    // DOM生成
    if(!nt.dom){
      const el=document.createElement("div");
      el.className="note "+(KIND_CLASS[nt.kind]||"")+" sz-"+nt.size
        +(nt.type==="roll"?" is-roll":"")+(nt.type==="hold"?" is-hold":"")+(nt.type==="rest"?" is-rest":"")
        +(nt.accent?" is-accent":"")+(nt.isBack?" is-back":"");
      const sz=SIZE_PX[nt.size];
      el.style.height=sz+"px";
      // 連打・長押しは横長の札（拍の長さぶん）。
      // 重なり防止(2026-07-11): 尻尾は次の札の左端の6px手前で止める(見た目のみ。判定タイミングは不変)
      let bodyW=sz;
      const nxt=G.notes[nt.id+1];
      if(nt.type==="roll"||nt.type==="hold"){
        const lenBeats=(nt.type==="roll"?nt.rollBeats:nt.holdBeats);
        bodyW=sz + lenBeats*beatPxLen();
        if(nxt){
          const maxW=sz/2 + (nxt.beat-nt.beat)*beatPxLen() - SIZE_PX[nxt.size]/2 - 6;
          bodyW=Math.max(sz, Math.min(bodyW, maxW));
        }
      }else{
        // 通常札: 前後の札との拍間隔を上限に幅を制限(高さは据え置き)。
        // 半拍差の裏拍ペア(スカシ/ひねり)でも札同士が接触しない。
        const prv=G.notes[nt.id-1];
        const gapPrev=prv? (nt.beat-prv.beat)*beatPxLen() : 1e9;
        const gapNext=nxt? (nxt.beat-nt.beat)*beatPxLen() : 1e9;
        bodyW=Math.max(40, Math.min(sz, Math.min(gapPrev,gapNext)-8, beatPxLen()-8));
      }
      el.style.width=bodyW+"px";
      let markHtml="";
      if(nt.type==="rest") markHtml='<span class="mark rest">間</span>';
      else if(nt.isBack) markHtml='<span class="mark back">裏</span>';
      // 札の中身=タグ(ネタの内容)。操作指示は札に重ねる色付き斜めバッジで分離表現
      let extra="";
      if(nt.type==="roll"){
        extra=`<span class="abadge">👏連打!!</span><span class="ntail">»»»»»»»»»»»»»»»»»»»»»»»»»»»»»»»»</span><span class="rollcount" data-id="${nt.id}">0/${nt.rollNeed}</span>`;
      }else if(nt.type==="hold"){
        extra='<span class="abadge">⬇押しっぱなし</span><span class="holdgauge"></span>';
      }
      el.innerHTML=`${markHtml}<span class="nkind">${nt.kind}</span><span class="nlabel">${nt.tag}</span>${extra}`;
      lane.appendChild(el);
      // 文字が札からはみ出さないよう、文字数に応じてフォントを自動縮小(常に1行)
      const fitText=(span, avail, baseFs, minFs)=>{
        if(!span) return;
        const len=Math.max(1, span.textContent.length);
        span.style.fontSize=Math.max(minFs, Math.min(baseFs, Math.floor(avail/len)))+"px";
      };
      fitText(el.querySelector(".nlabel"), bodyW-8, {S:12,M:15,L:17}[nt.size], 9);
      fitText(el.querySelector(".nkind"),  bodyW-8, 10, 7);
      nt.dom=el;
      nt.bodyW=bodyW;
    }
    // 位置計算: nt.beat で札の「頭(右端でなく判定側の左端)」が判定ライン(HIT_X)に来る
    const progress=(curBeat-appearBeat)/LANE_TRAVEL_BEATS; // 0→1
    const startX=laneW+40;
    if(nt.type==="roll"||nt.type==="hold"){
      // 長尺札: 札の左端が判定ラインに「開始拍」で到達。札は右へ伸びる
      const headCenterX=startX + (HIT_X-startX)*progress;
      const sz=SIZE_PX[nt.size];
      nt.dom.style.left=(headCenterX - sz/2)+"px";
      nt.dom.style.transform="translateY(-50%)";
      // 連打中は震えるアニメ
      if(nt.type==="roll" && nt.rollActivated && !nt.judged){
        const shake=(Math.random()-0.5)*4;
        nt.dom.style.transform=`translateY(calc(-50% + ${shake}px))`;
      }
    }else{
      const centerX=startX + (HIT_X-startX)*progress;
      const halfW=(nt.bodyW||SIZE_PX[nt.size])/2;
      nt.dom.style.left=(centerX-halfW)+"px";
      // 裏拍札は半拍ずれで隣と接近するため、少し上に浮かせて重なりを避ける(判定は不変)
      nt.dom.style.transform=nt.isBack?"translateY(-82%)":"translateY(-50%)";
      // 間(rest)は判定ライン手前で「タメ」の予告（点滅）
      if(nt.type==="rest" && !nt.judged){
        const noteTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
        const toHit=noteTime-now;
        if(toHit<0.4 && toHit>0){ nt.dom.style.opacity=0.5+0.5*Math.abs(Math.sin(now*18)); }
        else nt.dom.style.opacity=1;
      }
    }
  });

  // カウントイン(§4.7): イントロ4〜7拍目に「3・2・1・いくで!」をビートぴったりに表示
  const cb=Math.floor(curBeat);
  if(cb>=4 && cb<=7 && !G.countShown[cb]){
    G.countShown[cb]=true;
    const ci=document.getElementById("countin");
    const txt={4:"3",5:"2",6:"1",7:"いくで!"}[cb];
    ci.textContent=txt;
    ci.classList.toggle("go", cb===7);
    ci.classList.remove("show"); void ci.offsetWidth; ci.classList.add("show");
  }

  // ステージ脈動(拍に合わせて立ち絵がボブ、判定サークルとライトが明滅)
  const phase=curBeat-Math.floor(curBeat);
  const bob=1-phase*0.12;
  const pb=document.getElementById("perfBoke"), pt=document.getElementById("perfTsu");
  if(pb) pb.style.transform=`scaleY(${bob})`;
  if(pt) pt.style.transform=`scaleY(${bob})`;
  document.getElementById("hitTarget").style.transform=`translate(-50%,-50%) scale(${1+ (1-phase)*0.08})`;
  document.getElementById("stagePulse").style.opacity=Math.max(0, .9-phase*2.2);
  // 観客も拍でスウェイ
  swayAudience(curBeat);

  // 各種終了判定
  G.notes.forEach(nt=>{
    if(nt.judged) return;
    const noteTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
    if(nt.type==="roll"){
      // 連打の終了: 末尾が判定ラインを抜けたら、回数で判定
      const endTime=G.t0+(nt.beat+nt.rollBeats)*G.spb + userOffsetMs/1000;
      if(now > endTime){
        const c=nt.rollCount||0;
        let j = c>=nt.rollNeed?"perfect" : c>=Math.ceil(nt.rollNeed/2)?"good" : c>0?"bad":"miss";
        judgeNote(nt, j);
      }
    }else if(nt.type==="hold"){
      // 長押しの終了: holdBeats拍ぶん押し続けたら成功。離すのが早い/遅いで判定
      const endTime=G.t0+(nt.beat+nt.holdBeats)*G.spb + userOffsetMs/1000;
      if(nt.holding){
        // ゲージ更新
        const gauge=nt.dom?nt.dom.querySelector(".holdgauge"):null;
        if(gauge){const p=Math.min(1,(now-noteTime)/(nt.holdBeats*G.spb));gauge.style.width=(p*100)+"%";}
        if(now>=endTime){ judgeNote(nt, nt.holdStartJudge||"good"); }
      }else if(now>noteTime+noteWin(nt).bad && !nt.holding){
        judgeNote(nt,"miss"); // 押し始めなかった
      }
    }else{
      if(now > noteTime + noteWin(nt).bad){ judgeNote(nt, "miss"); }
    }
    // 連打カウント表示更新
    if(nt.type==="roll" && nt.dom){
      const rc=nt.dom.querySelector(".rollcount");
      if(rc) rc.textContent=(nt.rollCount||0)+"/"+nt.rollNeed;
    }
  });

  requestAnimationFrame(renderLoop);
}

/* =========================================================================
   判定（タップ入力）── マスタークロックで時刻比較
   ========================================================================= */
function handleTap(){
  if(!G||G.finished) return;
  const now=actx.currentTime;

  // (A) 連打ノーツが判定範囲内にあれば、連打カウント（最優先）
  let rollActive=null;
  G.notes.forEach(nt=>{
    if(nt.type!=="roll" || nt.judged) return;
    const startTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
    const endTime=G.t0+(nt.beat+nt.rollBeats)*G.spb + userOffsetMs/1000;
    // 連打受付: 開始の少し前〜終了まで
    const rw=noteWin(nt).bad;
    if(now>=startTime-rw && now<=endTime+rw){ rollActive=nt; }
  });
  if(rollActive){
    rollActive.rollCount=(rollActive.rollCount||0)+1;
    rollActive.rollActivated=true;
    sfxTap(rollActive.rollCount>=rollActive.rollNeed?"perfect":"good");
    flashTarget();
    bounceAudience(1);
    rollHitEffect(rollActive); // 連打アニメーション
    return;
  }

  // (B) 通常ノーツ（tap/back/rest/hold）: 判定時刻が最も近いもの
  let target=null, bestDiff=Infinity;
  G.notes.forEach(nt=>{
    if(nt.judged || nt.type==="roll") return;
    const noteTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
    const diff=Math.abs(now-noteTime);
    if(diff<bestDiff){ bestDiff=diff; target=nt; }
  });
  if(!target) return;
  const tw=noteWin(target); // サイズ別判定窓(S=シビア/L=緩め)
  if(bestDiff>tw.bad+0.05){ return; } // 空打ち

  // 長押し: 押し始めの判定（離しは renderLoop で処理）
  if(target.type==="hold"){
    let j;
    if(bestDiff<=tw.perfect) j="perfect";
    else if(bestDiff<=tw.good) j="good";
    else if(bestDiff<=tw.bad) j="bad";
    else return;
    target.holdStartJudge=j;
    target.holding=true;
    sfxTap(j);
    flashTarget();
    holdStartEffect(target);
    return;
  }

  // 単純/裏拍/間: 即判定
  let j;
  if(bestDiff<=tw.perfect) j="perfect";
  else if(bestDiff<=tw.good) j="good";
  else if(bestDiff<=tw.bad) j="bad";
  else return;
  judgeNote(target, j);
}

function judgeNote(nt, j){
  if(nt.judged) return;
  nt.judged=true;
  nt.judgedAt = actx.currentTime; // 削除タイミングの基準
  G.counts[j]++;
  updateTemp(nt, j); // 会場温度(02_MANZAI_PLAY §4.4)
  let gain=0;
  if(j==="miss"){
    G.combo=0;
    sfxMiss();
    if(nt.dom) nt.dom.classList.add("missed");
    showJudge("…シーン","j-miss");
  }else{
    // ウケ量(SCORING.md §0 / 02 §4.5): 威力×10 × 判定倍率 × 温度倍率。オチは温度フィナーレ補正。
    // ※基礎能力倍率はP1-07/08(能力フック接続)後に乗せる。タグ笑い倍率はタグ表確定後(P2-02)。
    gain=nt.pow*10*({perfect:1,good:0.6,bad:0.25}[j])*(0.5+G.temp/100);
    if(nt.kind==="オチ") gain*=(1+G.temp/200);
    gain=Math.round(gain);
    G.score+=gain;
    G.combo++;
    if(G.combo>G.maxCombo)G.maxCombo=G.combo;
    // 連打・長押しは判定確定前に既に音を鳴らしているので、ここでは鳴らさない
    if(nt.type!=="roll" && nt.type!=="hold") sfxTap(j);
    if(nt.dom) nt.dom.classList.add("hit");
    flashTarget();
    if(j==="perfect") spawnSparks();
    bounceAudience(j==="perfect"?2:1);
    actBoke(nt.kind);
    showJudge({perfect:"ピタッ!",good:"まずまず",bad:"ズレた"}[j], "j-"+j);
    if(j==="perfect"){ showBurst(); sfxLaugh(G.temp); spawnLaughPops(); }
    if(G.combo>1){ showCombo(G.combo); }
  }
  trackPart(nt, j, gain);
  document.getElementById("scoreDisp").textContent=G.score.toLocaleString();
}

/* =========================================================================
   ネタコンボの進行管理(SCORING.md §6)
   パーツ完了時に候補を照合。関与パーツにBad/Missが出たコンボは消滅。
   成立したら倍率ぶんのウケ量を加点し、コンボゾーンにバナーを流す。
   小・中は各パーツ最上位のみ / 役満は全体に重ねがけ。
   ========================================================================= */
function trackPart(nt, j, gain){
  if(nt.partIdx<0 || !G.partNotes) return;
  const p=nt.partIdx;
  G.partEarned[p]=(G.partEarned[p]||0)+gain;
  if(j==="bad"||j==="miss") G.partAlive[p]=false; // Bad消滅
  G.partJudged[p]=(G.partJudged[p]||0)+1;
  if(G.partJudged[p]>=G.partNotes[p]) checkCombos();
}
function checkCombos(){
  G.comboCands.forEach(c=>{
    if(c.fired||c.dead) return;
    if(c.parts.some(p=>G.partAlive[p]===false)){ c.dead=true; return; }
    if(!c.parts.every(p=>(G.partJudged[p]||0)>=(G.partNotes[p]||1))) return;
    c.fired=true;
    let bonus=0;
    if(c.tier==="役満"){
      // 役満は全関与パーツに重ねがけ(小中と両立)
      c.parts.forEach(p=>{ bonus+=Math.round((G.partEarned[p]||0)*(c.mult-1)); });
    }else{
      // 小・中は各パーツ最上位のみ(差分だけ加点)
      c.parts.forEach(p=>{
        const cur=G.partMult[p]||1;
        if(c.mult>cur){ bonus+=Math.round((G.partEarned[p]||0)*(c.mult-cur)); G.partMult[p]=c.mult; }
      });
    }
    G.score+=bonus;
    G.firedCombos.push({name:c.name,tier:c.tier,mult:c.mult,bonus});
    showComboBanner(c,bonus);
    document.getElementById("scoreDisp").textContent=G.score.toLocaleString();
  });
}
// バナーは1枚ずつ順番に流す(同時成立で横に並べると見切れるため)
const _bannerQ=[];
let _bannerBusy=false;
function showComboBanner(c,bonus){
  _bannerQ.push({c,bonus});
  _pumpBanner();
}
function _pumpBanner(){
  if(_bannerBusy||!_bannerQ.length) return;
  _bannerBusy=true;
  const {c}=_bannerQ.shift();
  const zone=document.getElementById("comboFly");
  zone.innerHTML="";
  const s=document.createElement("span");
  s.className="combo-banner"+(c.tier==="中"?" t-mid":c.tier==="役満"?" t-yaku":"");
  const tierLabel=c.tier==="役満"?"役満":c.tier+"コンボ";
  // 倍率・加点値は開示しない(ユーザー決定)。技名だけをドンと見せる
  s.innerHTML=`<span class="cb-tier">${tierLabel}</span>「${c.name}」`;
  zone.appendChild(s);
  setTimeout(()=>{ if(s.parentNode) s.remove(); _bannerBusy=false; _pumpBanner(); }, 1450);
}

/* =========================================================================
   会場温度(§4.4): 正規化単位u方式。詳細は updateTemp 内コメント参照。
   温度でウケメーターの色と客席のクロスフェードが変わる。
   ========================================================================= */
function updateTemp(nt, j){
  // 温度カーブ(2026-07-11ユーザー決定で傾斜強化・※値は仮でP5-01最終調整):
  //   初期0 / ピタッ!+1u / まずまず+0.5u / ズレた-1u(減点) / シーン-4u / ツカミ成功+6
  //   u=110/総ノーツ数。全ピタッ!で110%相当(MAX100)=1割の貯金しかなく、シーン1回で満点圏から脱落する。
  //   (例: 30枚構成なら u≈3.7 → ピタッ!+3.7 / ズレた-3.7 / シーン-14.7)
  const u=G.tempUnit||4;
  const delta={perfect:u, good:u*0.5, bad:-u, miss:-u*4}[j]||0;
  let d=delta;
  if(!G.tsukamiHit && nt.kind==="ツカミ" && j!=="miss"){ d+=6; G.tsukamiHit=true; } // ツカミボーナス
  G.temp=Math.max(0,Math.min(100,G.temp+d));
  if(G.temp>G.maxTemp)G.maxTemp=G.temp;
  renderHeat(true);
}
function heatColor(t){
  if(t<30) return "#34a6ff";   // 冷え(青)
  if(t<55) return "#ffce2b";   // ぬるい(黄)
  if(t<75) return "#ff9a3c";   // 温まる(橙)
  return "#ff5252";            // 大盛り上がり(赤)
}
function renderHeat(pulse){
  if(!G) return;
  const c=heatColor(G.temp);
  const meter=document.getElementById("heatMeter");
  const segs=meter.querySelectorAll("i");
  const on=Math.round(G.temp/10);
  segs.forEach((s,i)=>{ s.classList.toggle("on", i<on); s.style.setProperty("--seg", c); });
  const v=document.getElementById("heatVal"); if(v) v.textContent=Math.round(G.temp);
  const wrap=document.getElementById("heatWrap");
  if(pulse){ wrap.classList.remove("pulse"); void wrap.offsetWidth; wrap.classList.add("pulse"); }
  // 観客のクロスフェード: 45℃から総立ちが混ざり始め、80℃で完全に総立ち
  const hot=Math.max(0, Math.min(1, (G.temp-45)/35));
  document.getElementById("audHot").style.opacity=hot;
  document.getElementById("audCalm").style.opacity=1-hot*0.85;
}

/* =========================================================================
   演出
   ========================================================================= */
const judgeEl=document.getElementById("judge");
function showJudge(txt,cls){
  judgeEl.textContent=txt;
  judgeEl.className="";judgeEl.classList.add(cls);
  void judgeEl.offsetWidth;
  judgeEl.classList.add("show");
}
function showCombo(n){
  // リズムの連続成功(ネタコンボと紛れないよう「れんぞく」表記)
  const cd=document.getElementById("comboDisp");
  cd.textContent=n+" れんぞく!";
  cd.classList.remove("show"); void cd.offsetWidth; cd.classList.add("show");
}
// Perfect時の放射バースト(判定スタンプの背後に黄色いレイ)
function showBurst(){
  const b=document.getElementById("burst");
  if(!b.childElementCount){
    for(let i=0;i<8;i++){
      const r=document.createElement("i");
      r.className="ray";
      r.style.transform=`rotate(${i*45}deg)`;
      b.appendChild(r);
    }
  }
  b.classList.remove("show"); void b.offsetWidth; b.classList.add("show");
}
function flashTarget(){
  const t=document.getElementById("hitTarget");
  t.classList.add("flash");
  setTimeout(()=>t.classList.remove("flash"),100);
  spawnRing();
}
// 判定サークルで弾けるリング（タップの手応え）
function spawnRing(){
  const laneEl=document.getElementById("lane");
  const r=document.createElement("div");
  r.className="hit-ring";
  laneEl.appendChild(r);
  setTimeout(()=>r.remove(),340);
}
// Perfect時、判定サークルから◆スパークが飛び散る
function spawnSparks(){
  const laneEl=document.getElementById("lane");
  for(let i=0;i<7;i++){
    const s=document.createElement("i");
    s.className="spark";
    const ang=Math.random()*Math.PI*2, dist=46+Math.random()*40;
    s.style.setProperty("--dx", (Math.cos(ang)*dist)+"px");
    s.style.setProperty("--dy", (Math.sin(ang)*dist)+"px");
    laneEl.appendChild(s);
    setTimeout(()=>s.remove(),400);
  }
}
// Perfect時、客席から「ワハハ」が立ちのぼる
function spawnLaughPops(){
  const aud=document.getElementById("audience");
  const words=["ワハハ","アハハ","ハハッ","ｷｬﾊﾊ"];
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    const s=document.createElement("span");
    s.className="laugh-pop";
    s.textContent=words[Math.floor(Math.random()*words.length)];
    s.style.left=(8+Math.random()*80)+"%";
    s.style.bottom=(34+Math.random()*44)+"px";
    s.style.setProperty("--rot",(Math.random()*16-8)+"deg");
    aud.appendChild(s);
    setTimeout(()=>s.remove(),860);
  }
}
// 連打ヒット時: 札が弾けて回数ポップ
function rollHitEffect(nt){
  if(!nt.dom) return;
  nt.dom.style.filter="brightness(1.5)";
  setTimeout(()=>{ if(nt.dom)nt.dom.style.filter=""; },60);
  const rc=nt.dom.querySelector(".rollcount");
  if(rc){ rc.style.transform="translateY(-50%) scale(1.5)"; setTimeout(()=>{if(rc)rc.style.transform="translateY(-50%)";},80); }
}
// 長押し開始時
function holdStartEffect(nt){
  if(!nt.dom) return;
  nt.dom.style.filter="brightness(1.4)";
}
// 主人公のドット絵ポーズ(2026-07-20組込み): 確定3ポーズ(ベース/挙手L/挙手R)。
// ヒット時に挙手ポーズへ差し替え→420msで戻す。左右はコンボ偶奇で交互(動きに変化を出す)。
// 3枚は同一クロップ枠(tools/px_export_game.ps1)で書き出してあるため差し替えでズレない。
const HERO_PX={base:"images/px/hero_base.png", upL:"images/px/hero_upL.png", upR:"images/px/hero_upR.png"};
let _heroPoseTimer=null;
function heroPose(pose){
  const pb=document.getElementById("perfBoke");
  if(!pb) return;
  pb.src=HERO_PX[pose]||HERO_PX.base;
  if(_heroPoseTimer){ clearTimeout(_heroPoseTimer); _heroPoseTimer=null; }
  if(pose!=="base"){ _heroPoseTimer=setTimeout(()=>{ pb.src=HERO_PX.base; _heroPoseTimer=null; },420); }
}
function actBoke(kind){
  const pb=document.getElementById("perfBoke"),pt=document.getElementById("perfTsu");
  const who = (kind==="ツッコミ") ? pt : pb;            // ツッコミ=矢田(右) / それ以外=主人公(左)
  const cls = (kind==="ツッコミ") ? "react-lunge" : "react-jump";
  if(who){ who.classList.remove(cls); void who.offsetWidth; who.classList.add(cls); setTimeout(()=>{who.classList.remove(cls);},420); }
  if(who===pb){ heroPose((G && G.combo%2===0) ? "upR" : "upL"); }  // 主人公の番だけ挙手
}

/* =========================================================================
   観客席の反応(一枚絵をスウェイ/バウンス)
   ========================================================================= */
function swayAudience(curBeat){
  const amp = !G ? 1 : (G.temp>=75?2.4 : G.temp>=45?1.6 : .8);
  const ph=Math.sin(curBeat*Math.PI); // 2拍で1往復
  const el=document.getElementById("audSway");
  if(el) el.style.transform=`translateX(${ph*amp*3}px)`;
}
function bounceAudience(strength){
  const el=document.getElementById("audSway");
  if(!el) return;
  const h=strength>=2?7:4;
  el.style.transform+=` translateY(-${h}px)`;
  setTimeout(()=>{ /* 次のswayAudienceで自然に戻る */ },0);
}

/* =========================================================================
   終了処理
   ========================================================================= */
function finishGame(){
  if(G.finished) return;
  G.finished=true;
  clearInterval(G.schedulerId);
  const c=G.counts;
  const acc=G.totalNotes>0 ? Math.round((c.perfect+c.good*0.6+c.bad*0.25)/G.totalNotes*100):0;
  // リズム天国風のランク判定(表示のみ。保存データには影響しない)
  // ※文言は「演技の手応え」=内心評価に限定する。「ウケた/スベった」等の客の反応の断定は書かない。
  //   ウケの確定評価(出来%・人気増減)は育成側 applyTheaterResult が唯一の採点箇所(ARCHITECTURE §4.3の方針)。
  //   acc高×弱ネタ・低人気で育成側が「スべった…」になっても矛盾しない表現にする(2026-07-11ユーザー指示)。
  const stamp=document.getElementById("rankStamp");
  let rank, rcls;
  if(acc>=85){ rank="カンペキや!"; rcls="r-top"; }
  else if(acc>=65){ rank="ええ感じ!"; rcls="r-mid"; }
  else if(acc>=40){ rank="ビミョー…"; rcls="r-low"; }
  else { rank="ガタガタや…"; rcls="r-bad"; }
  stamp.textContent=rank;
  stamp.className="rank-stamp "+rcls;
  document.getElementById("resultScore").textContent=G.score.toLocaleString();
  document.getElementById("resultCounts").innerHTML=
    `<span class="rc-chip perfect">ピタッ! <b>${c.perfect}</b></span>`+
    `<span class="rc-chip good">まずまず <b>${c.good}</b></span>`+
    `<span class="rc-chip bad">ズレた <b>${c.bad}</b></span>`+
    `<span class="rc-chip miss">シーン <b>${c.miss}</b></span>`;
  document.getElementById("resultCombos").innerHTML =
    G.firedCombos.length
      ? G.firedCombos.map(c=>`<span class="rc-chip cmb">${c.tier==="役満"?"👑":"💥"}${c.name} ×${c.mult}</span>`).join("")
      : `<span class="rc-chip cmb-none">コンボ成立なし</span>`;
  document.getElementById("resultCombo").textContent=`最大 ${G.maxCombo} れんぞく ・ 達成度 ${acc}%`;
  const t=G.temp;
  // 客の反応も断定しない(内心評価)。確定結果は育成側で発表するため、ここでは手応え止まり。
  document.getElementById("resultHeat").textContent=(
    t>=75?"🔥 めっちゃ沸いてた……と思う! 手応えバッチリや!":
    t>=55?"😄 ええ空気やった……はずや!":
    t>=30?"🙂 まずまず……いや、どうやったんやろな。":
    "🥶 ……あかん、空気重かった気ぃする……。"
  )+(HONBAN?" ※結果発表は戻ってから!":"");
  // 本番なら結果を育成へ返す
  if(HONBAN){
    const _neta=getNeta(G.songKey); const _np=_neta.length? _neta.reduce((s,p)=>s+(p.pow||0),0)/_neta.length : 0;
    // style=使った形式(採点の能力重みに使う) / netaFp=ネタの指紋(M-1ネタバレ減点の判定に使う。01_SUCCESS §6.1)
    const _fp=G.songKey+"|"+_neta.map(p=>p.tag+":"+(p.pow||0)).join(",");
    // combos=このプレイで成立披露したコンボ名。P1-09の「マスク→披露で開示・図鑑登録」の入力になる
    try{ localStorage.setItem("pm_result", JSON.stringify({kind:HONBAN.kind, turn:HONBAN.turn, round:HONBAN.round, style:G.songKey, netaFp:_fp, acc, netaPow:_np, score:G.score, counts:c, maxCombo:G.maxCombo, combos:G.firedCombos.map(x=>x.name)})); }catch(e){}
    try{ localStorage.removeItem("pm_honban"); }catch(e){}
    const bb=document.getElementById("backBtn"); if(bb) bb.textContent="育成へ戻る";
  }
  setTimeout(()=>{document.getElementById("game").style.display="none";document.getElementById("result").style.display="flex";},600);
}

/* =========================================================================
   入力イベント
   ========================================================================= */
const tapZone=document.getElementById("tapZone");
tapZone.addEventListener("pointerdown",e=>{e.preventDefault();handleTap();});
tapZone.addEventListener("pointerup",e=>{e.preventDefault();handleRelease();});
tapZone.addEventListener("pointercancel",e=>{handleRelease();});
// 長押しを離したときの処理
function handleRelease(){
  if(!G||G.finished) return;
  const now=actx.currentTime;
  G.notes.forEach(nt=>{
    if(nt.type==="hold" && nt.holding && !nt.judged){
      const endTime=G.t0+(nt.beat+nt.holdBeats)*G.spb + userOffsetMs/1000;
      if(now < endTime - 0.10){
        // 早く離した: 判定を下げる
        nt.holding=false;
        judgeNote(nt, "bad");
      }
      // 十分押していたら renderLoop 側で成功判定される
    }
  });
}

document.querySelectorAll(".song-btn").forEach(b=>{
  b.addEventListener("click",()=>startGame(b.dataset.song));
});
document.getElementById("backBtn").addEventListener("click",()=>{
  if(HONBAN){ location.href="success-play.html"; return; }   // 本番結果を持って育成へ
  document.getElementById("result").style.display="none";
  document.getElementById("title").style.display="flex";
});

function updateOffsetDisp(){document.getElementById("offVal").textContent=(userOffsetMs>0?"+":"")+userOffsetMs+" ms";}
document.getElementById("offMinus50").addEventListener("click",()=>{userOffsetMs-=50;updateOffsetDisp();});
document.getElementById("offMinus").addEventListener("click",()=>{userOffsetMs-=10;updateOffsetDisp();});
document.getElementById("offPlus").addEventListener("click",()=>{userOffsetMs+=10;updateOffsetDisp();});
document.getElementById("offPlus50").addEventListener("click",()=>{userOffsetMs+=50;updateOffsetDisp();});
