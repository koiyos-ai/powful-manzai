<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16234f">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パワフル漫才">
<link rel="apple-touch-icon" href="icon-192.png">
<title>パワフル漫才 ─ 漫才プレイ</title>
<style>
  :root{
    --bg:#1a1530; --bg2:#0f0c20;
    --shab:#3a8fd0; --shab-d:#2068a8;
    --konto:#c2603a; --konto-d:#a04020;
    --perfect:#ffd23f; --good:#6fc62e; --bad:#5aa9e0; --miss:#888;
    --line:#ff5a8c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  html{background:#0f0c20;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Yu Gothic UI","BIZ UDGothic",sans-serif;
    background:radial-gradient(ellipse at 50% 0%, #2a2050, var(--bg) 60%, var(--bg2));
    color:#fff;height:100vh;height:100dvh;
    max-width:520px;margin:0 auto;position:relative;
    display:flex;flex-direction:column;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;
  }

  /* ===== タイトル画面 ===== */
  #title{
    position:absolute;inset:0;z-index:50;
    background:radial-gradient(ellipse at 50% 30%, #2a2050, var(--bg) 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;
  }
  #title h1{font-size:30px;font-weight:900;text-shadow:0 2px 0 #000,0 0 24px rgba(255,90,140,.5);letter-spacing:.05em;text-align:center;}
  #title .tagline{font-size:13px;color:#b0a8d0;margin-top:-16px;}
  #title .neta-info{font-size:13px;font-weight:800;margin-top:2px;}
  #mzBack{position:absolute;top:14px;left:14px;z-index:60;font-family:inherit;font-size:13px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.5);border-radius:10px;padding:7px 12px;cursor:pointer;}
  #mzBack:active{transform:translateY(2px);}
  .song-select{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;}
  .song-btn{
    padding:18px 20px;border-radius:16px;border:3px solid;cursor:pointer;text-align:left;
    background:rgba(255,255,255,.06);transition:transform .1s, background .15s;
    display:flex;align-items:center;gap:14px;
  }
  .song-btn:active{transform:scale(.97);}
  .song-btn.shab{border-color:var(--shab);}
  .song-btn.shab:active{background:rgba(58,143,208,.2);}
  .song-btn.konto{border-color:var(--konto);}
  .song-btn.konto:active{background:rgba(194,96,58,.2);}
  .song-btn .ico{font-size:30px;}
  .song-btn .txt b{font-size:18px;font-weight:900;display:block;}
  .song-btn .txt span{font-size:12px;color:#b0a8d0;}
  .offset-row{display:flex;align-items:center;gap:7px;font-size:13px;color:#b0a8d0;margin-top:8px;justify-content:center;flex-wrap:wrap;}
  .offset-row button{min-width:42px;height:36px;padding:0 6px;border-radius:8px;border:2px solid #555;background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
  .offset-row button:active{background:rgba(255,255,255,.2);}
  .offset-row .val{min-width:64px;text-align:center;font-variant-numeric:tabular-nums;font-weight:800;color:#fff;}
  .offset-hint{font-size:11px;color:#8a82a8;text-align:center;margin-top:6px;line-height:1.5;}

  /* ===== プレイ画面 ===== */
  #game{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;position:relative;}

  /* 上部: ステージ（拍で脈打つ） */
  .stage{
    flex:0 0 auto;height:30%;position:relative;
    background:linear-gradient(180deg, rgba(120,60,140,.3), rgba(60,30,90,.15));
    border-bottom:2px solid rgba(255,255,255,.1);
    display:flex;align-items:center;justify-content:center;gap:40px;overflow:hidden;
  }
  .performer{
    width:80px;height:80px;border-radius:50%;position:relative;
    transition:transform .08s;
  }
  .performer.boke{background:radial-gradient(circle at 38% 32%,#ff8a7a,#d8442c);}
  .performer.tsukkomi{background:radial-gradient(circle at 38% 32%,#7ab0e8,#2f6fb0);}
  .performer::before,.performer::after{content:"";position:absolute;width:9px;height:9px;background:#1a1010;border-radius:50%;top:34px;}
  .performer::before{left:24px;}.performer::after{right:24px;}
  .performer .mouth{position:absolute;width:16px;height:6px;background:#1a1010;border-radius:0 0 8px 8px;bottom:24px;left:50%;transform:translateX(-50%);}
  .perf-label{position:absolute;bottom:6px;font-size:10px;color:#fff;width:100%;text-align:center;}

  /* 拍インジケータ */
  .beat-indicator{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
  .beat-pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);transition:transform .05s,background .05s;}
  .beat-pip.on{background:var(--perfect);transform:scale(1.6);}

  /* スコア表示 */
  .hud{position:absolute;top:8px;right:12px;text-align:right;z-index:5;}
  .hud .combo{font-size:13px;color:#ffd23f;font-weight:800;}
  .hud .score{font-size:24px;font-weight:900;color:#fff;text-shadow:0 1px 0 #000;line-height:1;}

  /* 判定表示 */
  #judge{
    position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
    font-size:40px;font-weight:900;pointer-events:none;opacity:0;z-index:20;
    text-shadow:0 2px 0 #000,0 0 20px currentColor;
  }
  @keyframes judgePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}20%{opacity:1;transform:translate(-50%,-60%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-90%) scale(1);}}
  #judge.show{animation:judgePop .6s ease-out;}
  .j-perfect{color:var(--perfect);}.j-good{color:var(--good);}.j-bad{color:var(--bad);}.j-miss{color:var(--miss);}

  /* 中間: リズムレーン */
  .lane-wrap{flex:1 1 auto;position:relative;min-height:0;overflow:hidden;}
  .lane{position:absolute;inset:0;}
  /* 判定ライン（ココ！） */
  .hit-line{
    position:absolute;left:60px;top:0;bottom:0;width:4px;
    background:linear-gradient(180deg,transparent,var(--line),transparent);
    box-shadow:0 0 16px var(--line);z-index:3;
  }
  .hit-target{
    position:absolute;left:60px;top:50%;transform:translate(-50%,-50%);
    width:90px;height:90px;border:3px dashed rgba(255,90,140,.7);border-radius:14px;z-index:2;
    display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,90,140,.9);font-weight:800;
    transition:transform .05s;
  }
  /* ノーツ（流れる札） */
  .note{
    position:absolute;top:50%;border-radius:12px;z-index:4;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-weight:900;color:#1a1010;
    box-shadow:0 3px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.5);
    border:2px solid rgba(0,0,0,.15);will-change:transform;
  }
  .note .nlabel{font-size:11px;line-height:1.1;}
  .note .ntype{font-size:9px;opacity:.7;}
  /* 種別色（ネタ構成画面と統一） */
  .note.t-tsukami{background:linear-gradient(180deg,#e2b3f0,#b06bff);}
  .note.t-furi{background:linear-gradient(180deg,#a8d4f2,#34a6ff);}
  .note.t-boke{background:linear-gradient(180deg,#ffe680,#ffce2b);}
  .note.t-tsukkomi{background:linear-gradient(180deg,#ffb3a0,#ff7a5c);}
  .note.t-ochi{background:linear-gradient(180deg,#b3e8a8,#3ccf6e);}
  /* タップ種類マーク */
  .note .mark{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .note .mark.back{background:#9a4fd0;}
  .note .mark.roll{background:#e0531c;}
  .note .mark.hold{background:#2068a8;}
  .note .mark.rest{background:#666;}
  .note.hit{opacity:0;transform:translateY(-50%) scale(1.4)!important;transition:opacity .2s, transform .2s;}
  .note.missed{opacity:.3;filter:grayscale(1);}
  /* 裏拍ノーツは枠線を変える */
  .note.is-back{border-style:dashed;border-color:#9a4fd0;}
  /* 曲の盛り上がり小節(解析で確定)のノーツは光って強調 */
  .note.is-accent{box-shadow:0 3px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.5),0 0 14px rgba(255,210,63,.9);}
  /* 連打札（長尺・横長） */
  .note.is-roll{justify-content:flex-start;padding-left:8px;background:repeating-linear-gradient(45deg,#ffcf4a,#ffcf4a 10px,#ffe680 10px,#ffe680 20px);border-color:#e0531c;}
  .note.is-roll .mark.roll{position:static;width:auto;height:auto;border-radius:10px;padding:2px 8px;margin-right:6px;background:#e0531c;}
  .note .rollcount{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:22px;font-weight:900;color:#e0531c;text-shadow:0 1px 0 #fff;transition:transform .08s;}
  /* 長押し札（長尺） */
  .note.is-hold{justify-content:flex-start;padding-left:8px;background:linear-gradient(90deg,#a8d4f2,#5aa9e0);border-color:#2068a8;}
  .note.is-hold .mark.hold{position:static;width:auto;height:auto;border-radius:10px;padding:2px 8px;margin-right:6px;background:#2068a8;}
  .note .holdgauge{position:absolute;left:0;bottom:0;height:5px;width:0;background:#fff;border-radius:3px;box-shadow:0 0 8px #fff;}
  /* 判定ラインで弾けるリング */
  .hit-ring{position:absolute;left:60px;top:50%;width:40px;height:40px;border:4px solid #fff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:6;animation:ringPop .35s ease-out forwards;}
  @keyframes ringPop{from{width:30px;height:30px;opacity:.9;}to{width:120px;height:120px;opacity:0;}}

  /* 下部: 観客席 + タップ受付 */
  .audience{
    flex:0 0 auto;height:64px;background:linear-gradient(180deg,rgba(40,20,60,.4),rgba(20,10,30,.6));
    display:flex;align-items:flex-end;justify-content:center;gap:4px;padding-bottom:6px;border-top:2px solid rgba(255,255,255,.08);
  }
  .aud-dot{width:14px;height:14px;border-radius:50% 50% 40% 40%;background:#4a3a6a;transition:transform .1s;}

  /* タップ受付オーバーレイ（全画面） */
  #tapZone{position:absolute;inset:0;z-index:10;}

  /* 結果画面 */
  #result{
    position:absolute;inset:0;z-index:60;background:rgba(15,12,32,.96);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;
  }
  #result h2{font-size:26px;font-weight:900;color:var(--perfect);}
  .result-stats{font-size:16px;line-height:2;text-align:center;}
  .result-stats .big{font-size:40px;font-weight:900;color:#fff;}
  #result button{margin-top:12px;padding:14px 32px;border-radius:12px;border:none;background:linear-gradient(180deg,#5aa9e0,#2068a8);color:#fff;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #15457a;}
  #result button:active{transform:translateY(2px);box-shadow:0 2px 0 #15457a;}
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="title">
  <button id="mzBack" title="メニューへ戻る">‹ 戻る</button>
  <h1>パワフル漫才</h1>
  <p class="tagline">― 漫才プレイ（リズムゲーム）試作 ―</p>
  <p class="neta-info" id="netaInfo"></p>
  <div class="song-select">
    <button class="song-btn shab" data-song="shab">
      <span class="ico">🎤</span>
      <span class="txt"><b>しゃべくり</b><span>メロコアパンク / BPM150 / 疾走</span></span>
    </button>
    <button class="song-btn konto" data-song="konto">
      <span class="ico">🎭</span>
      <span class="txt"><b>コント</b><span>メロコアパンク / BPM150 / 疾走</span></span>
    </button>
    <div class="offset-row">
      <span>音ズレ調整:</span>
      <button id="offMinus50">−50</button>
      <button id="offMinus">−10</button>
      <span class="val" id="offVal">0 ms</span>
      <button id="offPlus">＋10</button>
      <button id="offPlus50">＋50</button>
    </div>
    <div class="offset-hint">タップが「早い」と感じたら＋、「遅い」と感じたら−<br>(有線イヤホン推奨。Bluetoothは遅延が大きい)</div>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="game" style="display:none;">
  <div class="stage">
    <div class="beat-indicator" id="beatInd">
      <div class="beat-pip"></div><div class="beat-pip"></div><div class="beat-pip"></div><div class="beat-pip"></div>
    </div>
    <div class="hud"><div class="combo" id="comboDisp"></div><div class="score" id="scoreDisp">0</div></div>
    <div class="performer boke" id="perfBoke"><div class="mouth"></div><div class="perf-label">ボケ</div></div>
    <div class="performer tsukkomi" id="perfTsu"><div class="mouth"></div><div class="perf-label">ツッコミ</div></div>
    <div id="judge"></div>
  </div>
  <div class="lane-wrap">
    <div class="lane" id="lane">
      <div class="hit-line"></div>
      <div class="hit-target" id="hitTarget">ココ!</div>
    </div>
  </div>
  <div class="audience" id="audience"></div>
  <div id="tapZone"></div>
</div>

<!-- 結果画面 -->
<div id="result">
  <h2>漫才終了！</h2>
  <div class="result-stats" id="resultStats"></div>
  <button id="backBtn">タイトルへ戻る</button>
</div>

<script>
/* =========================================================================
   パワフル漫才 ─ 漫才プレイ（リズムゲーム）第1段階
   核心: AudioContext.currentTime を唯一のマスタークロックとし、
        音の発音もノーツ判定もすべて「拍(beat)」で同期する。
   ========================================================================= */

// ---- 音名→周波数 ----
const NOTE={};
(function(){
  const names=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  // シャープ表記→フラット表記の異名同音マップ
  const flat={"C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb"};
  for(let o=1;o<=6;o++)names.forEach((n,i)=>{
    const m=(o+1)*12+i;
    const f=440*Math.pow(2,(m-69)/12);
    NOTE[n+o]=f;
    if(flat[n]) NOTE[flat[n]+o]=f; // フラット表記も同じ周波数で登録
  });
})();
function freq(n){return typeof n==="number"?n:NOTE[n];}

/* =========================================================================
   楽曲データ（manzai-music.html と同じ2曲）
   ========================================================================= */
const SONGS={
  shab:{ // しゃべくり: メロコアパンク(MP3) BPM150
    name:"しゃべくり",
    file:"racing_the_high_noon_1.mp3",
    bpm:150,
    introOffset:0.890, // 曲頭から1拍目まで(中盤キックから逆算した正確な値)
    totalBeats:52,     // 13小節×4拍(導入2小節+パーツ9小節+フィナーレ2小節)
    buffer:null,       // デコード済みAudioBufferを保持
  },
  konto:{ // コント: 同曲を仮使用(コント専用MP3が来たら差し替え)
    name:"コント",
    file:"racing_the_high_noon_1.mp3",
    bpm:150,
    introOffset:0.890,
    totalBeats:52,
    buffer:null,
  }
};

/* =========================================================================
   譜面生成: 8拍目から、各拍にノーツを配置（タップ種類・パネルサイズ付き）
   第1段階では仮の譜面。9パーツ分のノーツをタグ割り当てに沿って並べる。
   ========================================================================= */
// タグ仮割り当て（タップ数・種類）
const TAG_RHYTHM={
  "自己紹介":{kind:"ツカミ",pat:["tap","tap","tap"]},
  "ギャグ":{kind:"ツカミ",pat:["tap","rest","tap"]},
  "日常":{kind:"フリ",pat:["tap","tap","rest"]},
  "あるある":{kind:"ボケ",pat:["tap","tap","tap"]},
  "誇張":{kind:"ボケ",pat:["tap","tap","tap","hold"]},
  "裏切り":{kind:"ボケ",pat:["tap","tap","back"]},
  "動き":{kind:"ボケ",pat:["tap","roll","tap"]},      // rollは長尺1本の連打
  "直球":{kind:"ツッコミ",pat:["tap","tap","tap"]},
  "ノリ":{kind:"ツッコミ",pat:["tap","roll","tap"]},   // rollは長尺1本の連打
  "スカシ":{kind:"ツッコミ",pat:["back","rest"]},
  "回収":{kind:"オチ",pat:["tap","tap","tap","hold"]},
  "説明":{kind:"フリ",pat:["tap","tap","rest"]},
  "持論":{kind:"フリ",pat:["tap","tap","tap"]},
  "妄想":{kind:"フリ",pat:["tap","rest","tap"]},
  "ひねり":{kind:"ボケ",pat:["tap","back","tap"]},
  "例え":{kind:"ツッコミ",pat:["tap","tap","tap"]},
};
const KIND_CLASS={"ツカミ":"t-tsukami","フリ":"t-furi","ボケ":"t-boke","ツッコミ":"t-tsukkomi","オチ":"t-ochi"};
function sizeFromPower(p){ return p<=3?"L":(p<=6?"M":"S"); }
const SIZE_PX={L:90,M:78,S:64};

// 仮ネタ（9パーツ）: タグ + 威力。本番ではネタ構成画面から渡される。
const SAMPLE_NETA=[
  {tag:"自己紹介",pow:5},{tag:"日常",pow:6},{tag:"あるある",pow:6},{tag:"直球",pow:7},
  {tag:"誇張",pow:8},{tag:"直球",pow:5},{tag:"動き",pow:6},{tag:"ノリ",pow:6},{tag:"回収",pow:8},
];
// 育成のネタ構成(pm_lineup)があれば譜面に反映。無ければサンプル。
function getNeta(){
  try{ const raw=localStorage.getItem("pm_lineup"); if(raw){ const o=JSON.parse(raw); if(o&&o.parts&&o.parts.length) return o.parts; } }catch(e){}
  return SAMPLE_NETA;
}
// 本番(劇場/M-1)から呼ばれた場合は pm_honban が入っている。結果を育成へ返す。
let HONBAN=null;
try{ HONBAN=JSON.parse(localStorage.getItem("pm_honban")||"null"); }catch(e){}
(function(){
  const back=document.getElementById("mzBack");
  if(HONBAN){ if(back) back.style.display="none"; }   // 本番は強制プレイ(戻る無効)
  else if(back) back.addEventListener("click",()=>{ if(history.length>1) history.back(); else location.href="index.html"; });
  const info=document.getElementById("netaInfo");
  if(info){
    if(HONBAN){
      if(HONBAN.kind==="award"){ info.innerHTML="🏆 M-1「"+((HONBAN.round&&HONBAN.round.name)||"本選")+"」─ 全力でいけ！"; info.style.color="#ffd23f"; }
      else { info.innerHTML="🎭 本番：劇場出番 ─ 育成の打線で勝負！"; info.style.color="#ff7a9c"; }
    }
    else { const n=getNeta(); if(n!==SAMPLE_NETA){ info.innerHTML="🃏 育成の打線で本番 ─ <b>"+n.length+"枚</b>"; info.style.color="#ffd23f"; } else { info.textContent="（サンプルネタで試遊）"; info.style.color="#8a93c0"; } }
  }
})();

/* 曲解析(確定値): 表拍(4分)が主リズム。手拍子は表拍に乗り、裏拍はアクセント時のみ。
   13小節構成、小節4・13が盛り上がり。→ 譜面は「1パーツ=1小節」を固定の骨格とし、
   そのパーツが何を叩かせるか(タップ種類・数)だけがネタ構成で変わる。
   小節1-2=導入(カウントイン、ノーツなし)、3-11=9パーツ(各1小節)、12-13=フィナーレ。 */
const MEASURE_BEATS=4;
const INTRO_MEASURES=2;      // 小節1-2: 導入
const FINALE_MEASURES=2;     // 小節12-13: フィナーレ(13が盛り上がり)

// 譜面を生成: パーツごとに1小節(4拍)を割り当て、パターンをその小節の拍に乗せる
function buildChart(neta){
  const notes=[];
  neta.forEach((part,pi)=>{
    const measureBeat = (INTRO_MEASURES+pi)*MEASURE_BEATS; // このパーツの小節の頭拍
    const measureNo = INTRO_MEASURES+pi+1; // 1-indexedの小節番号(盛り上がり小節=4の判定用)
    const accent = measureNo===4; // 曲解析で盛り上がる小節
    const r=TAG_RHYTHM[part.tag]||{kind:"ボケ",pat:["tap","tap","tap"]};
    const size=sizeFromPower(part.pow);
    let slot=0; // 0〜3: 小節内の拍位置(表拍グリッド)
    r.pat.forEach((type)=>{
      if(slot>=MEASURE_BEATS) return; // 小節を超えるパターンは末尾を捨てる(安全策)
      const beat=measureBeat+slot;
      if(type==="rest"){
        // 間: その拍は休符(タメ)として表示。次の拍からまた叩ける
        notes.push({beat, type:"rest", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent});
        slot+=1;
      }else if(type==="roll"){
        // 連打: 小節内に収まる長さ(最大2拍)
        const rollBeats=Math.min(2, MEASURE_BEATS-slot);
        notes.push({beat, type:"roll", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent,
                    rollBeats, rollNeed:6, rollCount:0});
        slot+=rollBeats;
      }else if(type==="hold"){
        // 長押し: 1拍ぶん押し続ける
        notes.push({beat, type:"hold", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent, holdBeats:1});
        slot+=1;
      }else if(type==="back"){
        // 裏拍アクセント: 表拍の半拍後ろにずらして配置(曲のリズムでは裏拍はここだけ)
        notes.push({beat:beat+0.5, type:"tap", isBack:true, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent});
        slot+=1;
      }else{
        // 単純タップ: 表拍そのまま
        notes.push({beat, type:"tap", isBack:false, kind:r.kind, size, tag:part.tag, pow:part.pow, partIdx:pi, accent});
        slot+=1;
      }
    });
  });
  // フィナーレ: 小節13(盛り上がり)に、ネタとは独立した締めの一撃を配置
  const finaleMeasureBeat=(INTRO_MEASURES+neta.length)*MEASURE_BEATS + MEASURE_BEATS; // 小節13の頭拍
  notes.push({beat:finaleMeasureBeat, type:"tap", isBack:false, kind:"オチ", size:"L", tag:"フィナーレ!", pow:9, partIdx:-1, accent:true});
  return notes;
}

/* =========================================================================
   オーディオエンジン
   ========================================================================= */
let actx=null, masterGain=null;
function initAudio(){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();
  masterGain.gain.value=0.9;
  masterGain.connect(actx.destination);
  distCurve=makeDistCurve(8);
  leadDistCurve=makeDistCurve(2);
}
// MP3を読み込んでAudioBufferにデコード（キャッシュ）
async function loadSongBuffer(song){
  if(song.buffer) return song.buffer;
  const res=await fetch(song.file);
  if(!res.ok) throw new Error("音源ファイルが見つかりません: "+song.file);
  const arr=await res.arrayBuffer();
  song.buffer=await actx.decodeAudioData(arr);
  return song.buffer;
}
function makeDistCurve(amount){
  const n=44100, curve=new Float32Array(n), deg=Math.PI/180;
  for(let i=0;i<n;i++){const x=i*2/n-1;curve[i]=(3+amount)*x*20*deg/(Math.PI+amount*Math.abs(x));}
  return curve;
}
let distCurve=null, leadDistCurve=null;

// --- 音色（メロコアパンク） ---
function pLead(t,n,dur,wave,gain){const o=actx.createOscillator(),g=actx.createGain(),ws=actx.createWaveShaper();o.type="square";o.frequency.value=freq(n);ws.curve=leadDistCurve;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(gain,t+.01);g.gain.setValueAtTime(gain,t+dur*.6);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(ws);ws.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.05);}
function pBass(t,n,dur){const o=actx.createOscillator(),g=actx.createGain();o.type="triangle";o.frequency.value=freq(n);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.28,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+dur*.95);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.03);}
// パワーコード(ルート+5度+オクターブ・歪み)
function pChord(t,root,dur){const rf=freq(root);const intervals=[1,1.4983,2];
  intervals.forEach((mult,idx)=>{const o=actx.createOscillator(),g=actx.createGain(),ws=actx.createWaveShaper();o.type="sawtooth";o.frequency.value=rf*mult;ws.curve=distCurve;ws.oversample="2x";
    const gain=idx===0?0.10:0.06;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(gain,t+.008);g.gain.setValueAtTime(gain,t+dur*.85);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(ws);ws.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.03);});}
function pKick(t){const o=actx.createOscillator(),g=actx.createGain();o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(48,t+.1);
  g.gain.setValueAtTime(.6,t);g.gain.exponentialRampToValueAtTime(.0001,t+.16);o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.18);}
function pSnare(t){const bs=actx.sampleRate*.12,buf=actx.createBuffer(1,bs,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,2);const s=actx.createBufferSource();s.buffer=buf;
  const f=actx.createBiquadFilter();f.type="highpass";f.frequency.value=1200;const g=actx.createGain();
  g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.0001,t+.12);s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);s.stop(t+.13);}
function pHat(t){const bs=actx.sampleRate*.04,buf=actx.createBuffer(1,bs,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,1.5);const s=actx.createBufferSource();s.buffer=buf;
  const f=actx.createBiquadFilter();f.type="highpass";f.frequency.value=7000;const g=actx.createGain();
  g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.0001,t+.04);s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);s.stop(t+.05);}
// タップ予告音（1拍前のウッドブロック風）と判定音
function pStab(t){const o=actx.createOscillator(),g=actx.createGain();o.type="square";o.frequency.value=660;
  g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.12,t+.005);g.gain.exponentialRampToValueAtTime(.0001,t+.08);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.1);}
// タップ音: 判定別に変化。打撃感(ノイズ)＋トーンで曲に埋もれず気持ちよく
function sfxTap(quality){
  if(!actx)return;
  const t=actx.currentTime;
  // 判定別の高さ: perfect=高く快感, good=中, bad=低め
  const baseFreq = quality==="perfect"?1480 : quality==="good"?1100 : 760;
  // (1) トーン（ピッチが上がる打撃）
  const o=actx.createOscillator(),g=actx.createGain();
  o.type="square";
  o.frequency.setValueAtTime(baseFreq,t);
  o.frequency.exponentialRampToValueAtTime(baseFreq*1.5,t+.05);
  g.gain.setValueAtTime(.32,t);
  g.gain.exponentialRampToValueAtTime(.0001,t+.12);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.14);
  // (2) クラップ的なノイズ（打撃のアタック感）
  const bs=actx.sampleRate*.05,buf=actx.createBuffer(1,bs,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,2.5);
  const s=actx.createBufferSource();s.buffer=buf;
  const f=actx.createBiquadFilter();f.type="bandpass";f.frequency.value=2200;f.Q.value=1.2;
  const ng=actx.createGain();ng.gain.setValueAtTime(.35,t);ng.gain.exponentialRampToValueAtTime(.0001,t+.06);
  s.connect(f);f.connect(ng);ng.connect(masterGain);s.start(t);s.stop(t+.07);
  // (3) perfectだけ、きらめきの倍音を追加
  if(quality==="perfect"){
    const o2=actx.createOscillator(),g2=actx.createGain();
    o2.type="sine";o2.frequency.setValueAtTime(baseFreq*2,t);
    g2.gain.setValueAtTime(.18,t);g2.gain.exponentialRampToValueAtTime(.0001,t+.18);
    o2.connect(g2);g2.connect(masterGain);o2.start(t);o2.stop(t+.2);
  }
}
function sfxMiss(){if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator(),g=actx.createGain();
  o.type="sawtooth";o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(70,t+.22);
  g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.0001,t+.26);o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.28);}

/* =========================================================================
   ゲーム状態 & スケジューラ
   ========================================================================= */
let G=null; // ゲーム状態
const LANE_TRAVEL_BEATS=4; // ノーツが流れてくる拍数
let userOffsetMs=0;

function startGame(songKey){
  if(!actx) initAudio();
  if(actx.state==="suspended") actx.resume();

  const song=SONGS[songKey];
  const spb=60/song.bpm;
  const chart=buildChart(getNeta());

  // 画面切替（ロード中表示）
  document.getElementById("title").style.display="none";
  document.getElementById("game").style.display="flex";
  document.getElementById("result").style.display="none";
  document.getElementById("lane").querySelectorAll(".note").forEach(n=>n.remove());
  document.getElementById("scoreDisp").textContent="0";
  document.getElementById("comboDisp").textContent="";
  document.documentElement.style.setProperty("--line", songKey==="shab"?"#5aa9e0":"#ff7a5c");
  showJudge("読込中…","j-good");

  // MP3をロードしてから再生開始
  loadSongBuffer(song).then(buffer=>{
    const playStart=actx.currentTime+0.25; // 再生開始までの余裕
    // 曲の1拍目(introOffset)を、譜面の拍0に合わせる
    const t0 = playStart + song.introOffset;

    // MP3再生（AudioBufferSourceをマスタークロックでスケジュール）
    const src=actx.createBufferSource();
    src.buffer=buffer;
    src.connect(masterGain);
    src.start(playStart);

    G={
      songKey, song, spb, t0,
      chart, src, playStart,
      songDuration: buffer.duration,
      notes: chart.map((c,i)=>({...c, id:i, dom:null, judged:false, rollCount:0, holding:false})),
      score:0, combo:0, maxCombo:0,
      counts:{perfect:0,good:0,bad:0,miss:0},
      totalNotes: chart.length,
      finished:false,
    };

    // スケジューラ開始（タップ予告音のみ）と描画ループ
    G.schedulerId=setInterval(scheduler, 25);
    requestAnimationFrame(renderLoop);
  }).catch(err=>{
    showJudge("音源読込失敗","j-miss");
    alert("音源ファイルの読み込みに失敗しました。\n"+song.file+" が同じ場所にあるか確認してください。\n"+err.message);
    document.getElementById("game").style.display="none";
    document.getElementById("title").style.display="flex";
  });
}

// スケジューラ: MP3は既に再生中なので、タップ予告音(スタブ)と終了判定のみ
function scheduler(){
  if(!G||G.finished) return;
  const now=actx.currentTime;
  const ahead=0.12;
  // タップ予告音(スタブ): まだ鳴らしていないノーツの拍が近づいたら予約
  G.notes.forEach(nt=>{
    if(nt.stabbed) return;
    const noteTime=G.t0+nt.beat*G.spb;
    if(noteTime <= now+ahead){
      pStab(noteTime);
      nt.stabbed=true;
    }
  });
  // 曲終了判定（MP3の長さで判定）
  const endTime=G.playStart + G.songDuration;
  if(now > endTime+0.2 && !G.finished){ finishGame(); }
}

/* =========================================================================
   描画ループ（ノーツの位置更新）── 判定には使わない
   ========================================================================= */
const lane=document.getElementById("lane");
const HIT_X=60; // 判定ラインのx座標(px)
// 判定窓: この曲は演奏の揺らぎ約50msのため、レポートのBakuSou(100/150/200)を参考に緩めに設定
// Perfectでも±85ms確保し、正確に叩けば気持ちよくPerfectが出るように
const WIN={perfect:0.085, good:0.150, bad:0.220}; // 秒
// 1拍あたりの画面上のピクセル長（ノーツの流れる速度から算出）
function beatPxLen(){
  const laneW=lane.clientWidth;
  const startX=laneW+40;
  return (startX-HIT_X)/LANE_TRAVEL_BEATS;
}
function renderLoop(){
  if(!G||G.finished) return;
  const now=actx.currentTime;
  const curBeat=(now-G.t0)/G.spb;
  const laneW=lane.clientWidth;

  G.notes.forEach(nt=>{
    // ノーツが見える範囲(判定の数拍前〜過ぎ)
    const appearBeat=nt.beat-LANE_TRAVEL_BEATS;
    // 判定済み: hit/missアニメ(0.3秒)の後、DOMを確実に削除
    if(nt.judged){
      if(nt.dom){
        if(nt.judgedAt===undefined) nt.judgedAt=now;
        if(now - nt.judgedAt > 0.32){ nt.dom.remove(); nt.dom=null; }
      }
      return;
    }
    // まだ見えない／通り過ぎた（未判定でMiss確定前）
    if(curBeat<appearBeat){
      if(nt.dom){ nt.dom.remove(); nt.dom=null; }
      return;
    }
    // DOM生成
    if(!nt.dom){
      const el=document.createElement("div");
      el.className="note "+(KIND_CLASS[nt.kind]||"")+(nt.type==="roll"?" is-roll":"")+(nt.type==="hold"?" is-hold":"")+(nt.accent?" is-accent":"")+(nt.isBack?" is-back":"");
      const sz=SIZE_PX[nt.size];
      el.style.height=sz+"px";
      // 連打・長押しは横長の札（拍の長さぶん）
      let bodyW=sz;
      if(nt.type==="roll"){ bodyW=sz + nt.rollBeats*beatPxLen(); }
      else if(nt.type==="hold"){ bodyW=sz + nt.holdBeats*beatPxLen(); }
      el.style.width=bodyW+"px";
      let markHtml="";
      if(nt.type==="roll") markHtml='<span class="mark roll">連打!</span>';
      else if(nt.type==="hold") markHtml='<span class="mark hold">長押し</span>';
      else if(nt.type==="rest") markHtml='<span class="mark rest">間</span>';
      let extra="";
      if(nt.type==="roll") extra='<span class="rollcount" data-id="'+nt.id+'">0</span>';
      if(nt.type==="hold") extra='<span class="holdgauge"></span>';
      el.innerHTML=`${markHtml}<span class="nlabel">${nt.tag}</span><span class="ntype">${nt.kind}</span>${extra}`;
      lane.appendChild(el);
      nt.dom=el;
      nt.bodyW=bodyW;
    }
    // 位置計算: nt.beat で札の「頭(右端でなく判定側の左端)」が判定ライン(HIT_X)に来る
    const progress=(curBeat-appearBeat)/LANE_TRAVEL_BEATS; // 0→1
    const startX=laneW+40;
    if(nt.type==="roll"||nt.type==="hold"){
      // 長尺札: 札の左端が判定ラインに「開始拍」で到達。札は右へ伸びる
      const headCenterX=startX + (HIT_X-startX)*progress;
      const sz=SIZE_PX[nt.size];
      nt.dom.style.left=(headCenterX - sz/2)+"px";
      nt.dom.style.transform="translateY(-50%)";
      // 連打中は震えるアニメ
      if(nt.type==="roll" && nt.rollActivated && !nt.judged){
        const shake=(Math.random()-0.5)*4;
        nt.dom.style.transform=`translateY(calc(-50% + ${shake}px))`;
      }
    }else{
      const centerX=startX + (HIT_X-startX)*progress;
      const halfW=SIZE_PX[nt.size]/2;
      nt.dom.style.left=(centerX-halfW)+"px";
      nt.dom.style.transform="translateY(-50%)";
      // 間(rest)は判定ライン手前で「タメ」の予告（点滅）
      if(nt.type==="rest" && !nt.judged){
        const noteTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
        const toHit=noteTime-now;
        if(toHit<0.4 && toHit>0){ nt.dom.style.opacity=0.5+0.5*Math.abs(Math.sin(now*18)); }
        else nt.dom.style.opacity=1;
      }
    }
  });

  // 拍インジケータ
  const beatPos=((Math.floor(curBeat)%4)+4)%4;
  document.querySelectorAll("#beatInd .beat-pip").forEach((p,i)=>p.classList.toggle("on", i===beatPos && curBeat>=0));
  // ステージ脈動
  const phase=curBeat-Math.floor(curBeat);
  const bob=1-phase*0.12;
  const pb=document.getElementById("perfBoke"), pt=document.getElementById("perfTsu");
  if(pb) pb.style.transform=`scaleY(${bob})`;
  if(pt) pt.style.transform=`scaleY(${bob})`;
  document.getElementById("hitTarget").style.transform=`translate(-50%,-50%) scale(${1+phase*0.06})`;

  // 各種終了判定
  G.notes.forEach(nt=>{
    if(nt.judged) return;
    const noteTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
    if(nt.type==="roll"){
      // 連打の終了: 末尾が判定ラインを抜けたら、回数で判定
      const endTime=G.t0+(nt.beat+nt.rollBeats)*G.spb + userOffsetMs/1000;
      if(now > endTime){
        const c=nt.rollCount||0;
        let j = c>=nt.rollNeed?"perfect" : c>=Math.ceil(nt.rollNeed/2)?"good" : c>0?"bad":"miss";
        judgeNote(nt, j);
      }
    }else if(nt.type==="hold"){
      // 長押しの終了: holdBeats拍ぶん押し続けたら成功。離すのが早い/遅いで判定
      const endTime=G.t0+(nt.beat+nt.holdBeats)*G.spb + userOffsetMs/1000;
      if(nt.holding){
        // ゲージ更新
        const gauge=nt.dom?nt.dom.querySelector(".holdgauge"):null;
        if(gauge){const p=Math.min(1,(now-noteTime)/(nt.holdBeats*G.spb));gauge.style.width=(p*100)+"%";}
        if(now>=endTime){ judgeNote(nt, nt.holdStartJudge||"good"); }
      }else if(now>noteTime+WIN.bad && !nt.holding){
        judgeNote(nt,"miss"); // 押し始めなかった
      }
    }else{
      if(now > noteTime + WIN.bad){ judgeNote(nt, "miss"); }
    }
    // 連打カウント表示更新
    if(nt.type==="roll" && nt.dom){
      const rc=nt.dom.querySelector(".rollcount");
      if(rc) rc.textContent=(nt.rollCount||0);
    }
  });

  requestAnimationFrame(renderLoop);
}

/* =========================================================================
   判定（タップ入力）── マスタークロックで時刻比較
   ========================================================================= */
function handleTap(){
  if(!G||G.finished) return;
  const now=actx.currentTime;

  // (A) 連打ノーツが判定範囲内にあれば、連打カウント（最優先）
  let rollActive=null;
  G.notes.forEach(nt=>{
    if(nt.type!=="roll" || nt.judged) return;
    const startTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
    const endTime=G.t0+(nt.beat+nt.rollBeats)*G.spb + userOffsetMs/1000;
    // 連打受付: 開始の少し前〜終了まで
    if(now>=startTime-WIN.bad && now<=endTime+WIN.bad){ rollActive=nt; }
  });
  if(rollActive){
    rollActive.rollCount=(rollActive.rollCount||0)+1;
    rollActive.rollActivated=true;
    sfxTap(rollActive.rollCount>=rollActive.rollNeed?"perfect":"good");
    flashTarget();
    bounceAudience();
    rollHitEffect(rollActive); // 連打アニメーション
    return;
  }

  // (B) 通常ノーツ（tap/back/rest/hold）: 判定時刻が最も近いもの
  let target=null, bestDiff=Infinity;
  G.notes.forEach(nt=>{
    if(nt.judged || nt.type==="roll") return;
    const noteTime=G.t0+nt.beat*G.spb + userOffsetMs/1000;
    const diff=Math.abs(now-noteTime);
    if(diff<bestDiff){ bestDiff=diff; target=nt; }
  });
  if(!target || bestDiff>WIN.bad+0.05){ return; } // 空打ち

  // 長押し: 押し始めの判定（離しは renderLoop で処理）
  if(target.type==="hold"){
    let j;
    if(bestDiff<=WIN.perfect) j="perfect";
    else if(bestDiff<=WIN.good) j="good";
    else if(bestDiff<=WIN.bad) j="bad";
    else return;
    target.holdStartJudge=j;
    target.holding=true;
    sfxTap(j);
    flashTarget();
    holdStartEffect(target);
    return;
  }

  // 単純/裏拍/間: 即判定
  let j;
  if(bestDiff<=WIN.perfect) j="perfect";
  else if(bestDiff<=WIN.good) j="good";
  else if(bestDiff<=WIN.bad) j="bad";
  else return;
  judgeNote(target, j);
}

function judgeNote(nt, j){
  if(nt.judged) return;
  nt.judged=true;
  nt.judgedAt = actx.currentTime; // 削除タイミングの基準
  G.counts[j]++;
  if(j==="miss"){
    G.combo=0;
    sfxMiss();
    if(nt.dom) nt.dom.classList.add("missed");
    showJudge("…シーン","j-miss");
  }else{
    const base={perfect:1000,good:600,bad:250}[j];
    const powBonus=Math.round(nt.pow*20*({perfect:1,good:0.6,bad:0.25}[j]));
    G.score+=base+powBonus;
    G.combo++;
    if(G.combo>G.maxCombo)G.maxCombo=G.combo;
    // 連打・長押しは判定確定前に既に音を鳴らしているので、ここでは鳴らさない
    if(nt.type!=="roll" && nt.type!=="hold") sfxTap(j);
    if(nt.dom) nt.dom.classList.add("hit");
    flashTarget();
    bounceAudience();
    actBoke(nt.kind);
    showJudge({perfect:"ピタッ!",good:"まずまず",bad:"ズレた"}[j], "j-"+j);
  }
  document.getElementById("scoreDisp").textContent=G.score.toLocaleString();
  document.getElementById("comboDisp").textContent=G.combo>1?G.combo+" コンボ":"";
}

/* =========================================================================
   演出
   ========================================================================= */
const judgeEl=document.getElementById("judge");
function showJudge(txt,cls){
  judgeEl.textContent=txt;
  judgeEl.className="";judgeEl.classList.add(cls);
  void judgeEl.offsetWidth;
  judgeEl.classList.add("show");
}
function flashTarget(){const t=document.getElementById("hitTarget");t.style.borderColor="#fff";t.style.background="rgba(255,255,255,.2)";  setTimeout(()=>{t.style.borderColor="";t.style.background="";},100); spawnRing();}
// 判定ラインで弾けるリング（タップの手応え）
function spawnRing(){
  const lane=document.getElementById("lane");
  const r=document.createElement("div");
  r.className="hit-ring";
  lane.appendChild(r);
  setTimeout(()=>r.remove(),360);
}
// 連打ヒット時: 札が弾けて回数ポップ
function rollHitEffect(nt){
  if(!nt.dom) return;
  nt.dom.style.filter="brightness(1.5)";
  setTimeout(()=>{ if(nt.dom)nt.dom.style.filter=""; },60);
  const rc=nt.dom.querySelector(".rollcount");
  if(rc){ rc.style.transform="scale(1.5)"; setTimeout(()=>{if(rc)rc.style.transform="";},80); }
}
// 長押し開始時
function holdStartEffect(nt){
  if(!nt.dom) return;
  nt.dom.style.filter="brightness(1.4)";
}
function bounceAudience(){document.querySelectorAll(".aud-dot").forEach(d=>{d.style.transform=`translateY(-${4+Math.random()*8}px)`;setTimeout(()=>d.style.transform="",150);});}
function actBoke(kind){
  const pb=document.getElementById("perfBoke"),pt=document.getElementById("perfTsu");
  if(kind==="ツッコミ"){ if(pt){pt.style.transform="translateX(-12px) scaleY(.9)";setTimeout(()=>pt.style.transform="",150);} if(pb){pb.style.transform="translateX(8px) rotate(8deg)";setTimeout(()=>pb.style.transform="",150);} }
  else { if(pb){pb.style.transform="translateY(-12px)";setTimeout(()=>pb.style.transform="",150);} }
}

// 観客席生成
(function(){const a=document.getElementById("audience");for(let i=0;i<20;i++){const d=document.createElement("div");d.className="aud-dot";a.appendChild(d);}})();

/* =========================================================================
   終了処理
   ========================================================================= */
function finishGame(){
  if(G.finished) return;
  G.finished=true;
  clearInterval(G.schedulerId);
  const c=G.counts;
  const acc=G.totalNotes>0 ? Math.round((c.perfect+c.good*0.6+c.bad*0.25)/G.totalNotes*100):0;
  document.getElementById("resultStats").innerHTML=
    `<div class="big">${G.score.toLocaleString()}</div>点<br>`+
    `ピタッ! ${c.perfect} / まずまず ${c.good} / ズレた ${c.bad} / シーン ${c.miss}<br>`+
    `最大 ${G.maxCombo} コンボ ・ 達成度 ${acc}%`;
  // 本番なら結果を育成へ返す
  if(HONBAN){
    const _neta=getNeta(); const _np=_neta.length? _neta.reduce((s,p)=>s+(p.pow||0),0)/_neta.length : 0;
    try{ localStorage.setItem("pm_result", JSON.stringify({kind:HONBAN.kind, turn:HONBAN.turn, round:HONBAN.round, acc, netaPow:_np, score:G.score, counts:c, maxCombo:G.maxCombo})); }catch(e){}
    try{ localStorage.removeItem("pm_honban"); }catch(e){}
    const bb=document.getElementById("backBtn"); if(bb) bb.textContent="育成へ戻る（結果を反映）";
  }
  setTimeout(()=>{document.getElementById("game").style.display="none";document.getElementById("result").style.display="flex";},600);
}

/* =========================================================================
   入力イベント
   ========================================================================= */
const tapZone=document.getElementById("tapZone");
tapZone.addEventListener("pointerdown",e=>{e.preventDefault();handleTap();});
tapZone.addEventListener("pointerup",e=>{e.preventDefault();handleRelease();});
tapZone.addEventListener("pointercancel",e=>{handleRelease();});
// 長押しを離したときの処理
function handleRelease(){
  if(!G||G.finished) return;
  const now=actx.currentTime;
  G.notes.forEach(nt=>{
    if(nt.type==="hold" && nt.holding && !nt.judged){
      const endTime=G.t0+(nt.beat+nt.holdBeats)*G.spb + userOffsetMs/1000;
      if(now < endTime - 0.10){
        // 早く離した: 判定を下げる
        nt.holding=false;
        judgeNote(nt, "bad");
      }
      // 十分押していたら renderLoop 側で成功判定される
    }
  });
}

document.querySelectorAll(".song-btn").forEach(b=>{
  b.addEventListener("click",()=>startGame(b.dataset.song));
});
document.getElementById("backBtn").addEventListener("click",()=>{
  if(HONBAN){ location.href="success-play.html"; return; }   // 本番結果を持って育成へ
  document.getElementById("result").style.display="none";
  document.getElementById("title").style.display="flex";
});
// オフセット調整
function updateOffsetDisp(){document.getElementById("offVal").textContent=(userOffsetMs>0?"+":"")+userOffsetMs+" ms";}
document.getElementById("offMinus50").addEventListener("click",()=>{userOffsetMs-=50;updateOffsetDisp();});
document.getElementById("offMinus").addEventListener("click",()=>{userOffsetMs-=10;updateOffsetDisp();});
document.getElementById("offPlus").addEventListener("click",()=>{userOffsetMs+=10;updateOffsetDisp();});
document.getElementById("offPlus50").addEventListener("click",()=>{userOffsetMs+=50;updateOffsetDisp();});
</script>
