<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ネタ構成 ─ パワフル漫才</title>
<style>
  :root{
    --ink:#16234f; --ink2:#2c3c7a;
    --yellow:#ffce2b; --red:#ff5252; --blue:#34a6ff; --green:#3ccf6e; --orange:#ff9a3c; --purple:#b06bff;
    --cream:#fff8e6; --panel:#fbf2dc;
    --k-tsukami:#b06bff; --k-tsukami-d:#8e4fd0;
    --k-furi:#34a6ff;    --k-furi-d:#1f7fc0;
    --k-boke:#ffce2b;    --k-boke-d:#e0a800;
    --k-tsukkomi:#ff7a5c;--k-tsukkomi-d:#e0492c;
    --k-ochi:#3ccf6e;    --k-ochi-d:#2aa052;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;font-weight:800;
    background:#0a1130;color:var(--ink);touch-action:manipulation;user-select:none;-webkit-user-select:none;overscroll-behavior:none;
  }
  #app{position:fixed;inset:0;max-width:520px;margin:0 auto;height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#0a1130;}

  /* ===== ヘッダー ===== */
  #hdr{
    flex:none;display:flex;align-items:center;gap:10px;padding:8px 11px;
    background:linear-gradient(180deg,#33459e,#1b2c6e);box-shadow:0 3px 8px rgba(0,0,0,.4);z-index:6;border-bottom:2px solid #0a1130;
  }
  .hd-title{flex:none;color:#fff;line-height:1.15;}
  .hd-title b{font-size:16px;font-weight:900;}
  .hd-title span{display:block;font-size:9px;color:#aebbf0;font-weight:800;}
  .hd-spacer{flex:1;}
  /* 手応え hero */
  .tegotae{
    flex:none;display:flex;align-items:center;gap:5px;
    background:linear-gradient(180deg,#fff7da,#ffe9a8);border:2.5px solid var(--ink);border-radius:13px;
    padding:2px 12px 3px 9px;box-shadow:0 3px 0 var(--ink),0 5px 7px rgba(0,0,0,.35);
  }
  .tegotae .lbl{font-size:10px;font-weight:900;color:#9a6a00;line-height:1.05;writing-mode:vertical-rl;letter-spacing:.05em;}
  .tegotae .val{font-size:34px;font-weight:900;color:var(--red);line-height:.9;text-shadow:1px 1px 0 #fff,2px 3px 0 rgba(214,58,58,.35);font-variant-numeric:tabular-nums;}
  .tegotae .unit{font-size:12px;font-weight:900;color:#9a6a00;align-self:flex-end;margin-bottom:4px;}
  .tegotae .approx{font-size:8px;color:#b08a3a;align-self:flex-start;margin-top:3px;}
  /* 形式トグル */
  .form-toggle{flex:none;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .ft-lbl{font-size:8.5px;font-weight:900;color:#cdd6f5;}
  .switch{position:relative;width:128px;height:34px;border-radius:18px;cursor:pointer;background:#0f1838;border:2.5px solid var(--ink);box-shadow:inset 0 2px 4px rgba(0,0,0,.4);display:flex;align-items:center;overflow:hidden;}
  .switch .knob{position:absolute;top:2px;left:2px;width:60px;height:26px;border-radius:14px;transition:left .2s cubic-bezier(.4,1.4,.6,1),background .2s;box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.4);z-index:1;}
  .switch.is-shab .knob{left:2px;background:linear-gradient(180deg,#6fc6ff,var(--blue));}
  .switch.is-konto .knob{left:62px;background:linear-gradient(180deg,#ffc06a,var(--orange));}
  .switch .opt{flex:1 1 50%;text-align:center;font-size:12px;font-weight:900;z-index:2;transition:color .2s;line-height:1;}
  .switch.is-shab .opt-shab,.switch.is-konto .opt-konto{color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.3);}
  .switch.is-shab .opt-konto,.switch.is-konto .opt-shab{color:#8a93c0;}

  /* ===== コンボ帯 ===== */
  #comboBar{flex:none;display:flex;align-items:center;gap:8px;padding:5px 10px;background:#11183a;border-bottom:2px solid #0a1130;}
  .cb-label{flex:none;font-size:10px;font-weight:900;color:var(--yellow);letter-spacing:.08em;}
  .combo-chips{flex:1;min-width:0;display:flex;gap:6px;align-items:center;overflow-x:auto;overflow-y:hidden;padding:2px 1px;scrollbar-width:thin;}
  .combo-chips::-webkit-scrollbar{height:4px;}
  .combo-chips::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px;}
  .chip{flex:none;font-size:12px;font-weight:900;padding:3px 11px 3px 6px;border-radius:999px;white-space:nowrap;border:2px solid;display:flex;align-items:center;gap:5px;box-shadow:0 2px 0 rgba(0,0,0,.3);animation:pop .22s ease-out;}
  .chip .r{font-size:9px;font-weight:900;padding:1px 5px;border-radius:6px;color:#fff;}
  .chip.small{background:#eaffd9;border-color:var(--k-ochi-d);color:#246b2a;}.chip.small .r{background:var(--k-ochi-d);}
  .chip.medium{background:#fff3cf;border-color:var(--k-boke-d);color:#8a5e00;}.chip.medium .r{background:#e0a800;}
  .chip.yakuman{background:linear-gradient(135deg,#ffe680,#ff9a3c);border-color:#fff;color:#7a2d00;box-shadow:0 0 14px rgba(255,154,60,.9),0 2px 0 rgba(0,0,0,.2);animation:glow 1.4s ease-in-out infinite alternate;}
  .chip.yakuman .r{background:#e0531c;}
  .chip.none{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#8a93c0;box-shadow:none;}
  @keyframes pop{from{transform:scale(.5) rotate(-4deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
  @keyframes glow{from{box-shadow:0 0 8px rgba(255,154,60,.6),0 2px 0 rgba(0,0,0,.2);}to{box-shadow:0 0 18px rgba(255,206,43,.95),0 2px 0 rgba(0,0,0,.2);}}

  /* ===== 打線エリア ===== */
  #lineupArea{flex:1 1 auto;min-height:0;overflow-y:auto;padding:9px 10px 10px;background:radial-gradient(ellipse at 50% 0%,#1a2450,#0a1130 70%);}
  #lineupArea::-webkit-scrollbar{width:6px;}#lineupArea::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px;}
  .lineup{display:flex;flex-direction:column;gap:6px;}
  .slot{display:flex;align-items:stretch;gap:8px;min-height:50px;border-radius:13px;padding:5px 7px 5px 5px;background:linear-gradient(180deg,#fffefb,var(--panel));border:2.5px solid var(--ink);box-shadow:0 3px 0 var(--ink),0 4px 6px rgba(0,0,0,.3);transition:transform .08s,box-shadow .08s,background .12s;}
  .slot.fixed{background:linear-gradient(180deg,#fff7e0,#ffeebf);}
  .slot.empty{background:repeating-linear-gradient(135deg,#fbf3dd,#fbf3dd 9px,#f3e7c6 9px,#f3e7c6 18px);}
  .slot.drag-over{border-color:var(--red);transform:scale(1.015);box-shadow:0 3px 0 var(--ink),0 0 0 3px rgba(255,82,82,.4);}
  /* 打順メダル */
  .batt{flex:none;align-self:center;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Yu Gothic',sans-serif;font-style:italic;font-weight:900;font-size:19px;color:#fff;background:radial-gradient(circle at 35% 28%,#5566b0,var(--ink));border:2.5px solid var(--ink);box-shadow:0 2px 0 var(--ink),inset 0 2px 3px rgba(255,255,255,.3);}
  .slot.fixed .batt{background:radial-gradient(circle at 35% 28%,#ffe27a,var(--yellow));color:var(--ink);text-shadow:none;}
  /* 空き枠 */
  .slot.empty{align-items:center;}
  .slothead{flex:none;display:flex;align-items:center;gap:7px;}
  .role{flex:none;font-size:11px;font-weight:900;color:#fff;padding:3px 11px;border-radius:8px;background:linear-gradient(180deg,#5566b0,var(--ink2));box-shadow:0 2px 0 var(--ink);}
  .slot.fixed .role{background:linear-gradient(180deg,#ffb35c,var(--orange));box-shadow:0 2px 0 #c26a10;}
  .slot-drop{flex:1 1 auto;min-width:0;display:flex;align-items:center;}
  .slot.filled .slot-drop{align-items:stretch;}
  .slot-empty-hint{font-size:11px;font-weight:800;color:rgba(22,35,79,.42);padding-left:8px;}
  .slot-drop .part .pgrip{display:none;}

  /* ===== パーツ ===== */
  .part{width:100%;display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:11px;cursor:grab;position:relative;color:var(--ink);border:2.5px solid var(--ink);box-shadow:0 3px 0 var(--ink),inset 0 1px 0 rgba(255,255,255,.5);transition:transform .07s,box-shadow .1s;touch-action:none;overflow:hidden;}
  .part.t-tsukami{background:linear-gradient(180deg,#e2b3f0,var(--k-tsukami));}
  .part.t-furi{background:linear-gradient(180deg,#a8d4f2,var(--k-furi));}
  .part.t-boke{background:linear-gradient(180deg,#ffe680,var(--k-boke));}
  .part.t-tsukkomi{background:linear-gradient(180deg,#ffb3a0,var(--k-tsukkomi));}
  .part.t-ochi{background:linear-gradient(180deg,#b3e8a8,var(--k-ochi));}
  .part .pmeta{flex:1 1 auto;min-width:0;display:flex;align-items:baseline;gap:5px;overflow:hidden;}
  .part .ptag{font-size:14px;font-weight:900;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .part .ptype{font-size:9.5px;color:rgba(22,35,79,.6);font-weight:800;white-space:nowrap;flex:none;}
  .part:active{cursor:grabbing;transform:translateY(1px);}
  .part.dragging{opacity:.35;}
  .part .pw{flex:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Yu Gothic',sans-serif;font-weight:900;font-size:18px;color:#fff;border:2px solid var(--ink);box-shadow:inset 0 1px 0 rgba(255,255,255,.4);}
  .part.f-shab .pw{background:linear-gradient(180deg,#6fc6ff,var(--blue));}
  .part.f-konto .pw{background:linear-gradient(180deg,#ffc06a,var(--orange));}
  .part.f-both .pw{background:linear-gradient(180deg,#cf9bff,var(--purple));}
  .part .pgrip{flex:none;color:rgba(22,35,79,.3);font-size:15px;letter-spacing:-3px;font-weight:900;}

  /* ===== パーツ庫 ===== */
  #inventory{flex:none;height:34dvh;min-height:200px;display:flex;flex-direction:column;background:linear-gradient(180deg,#f3bf6e,#c98a38);border-top:4px solid var(--ink);box-shadow:0 -3px 8px rgba(0,0,0,.35);}
  .inv-head{flex:none;display:flex;align-items:center;gap:8px;padding:7px 10px 5px;flex-wrap:wrap;}
  .inv-title{flex:none;font-size:13px;font-weight:900;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.5);}
  .filters{flex:1;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
  .filters button{font-family:inherit;font-size:11px;font-weight:900;padding:4px 11px;border-radius:999px;cursor:pointer;background:#fff;color:var(--ink2);border:2px solid var(--ink);box-shadow:0 2px 0 var(--ink);}
  .filters button:active{transform:translateY(2px);box-shadow:0 0 0 var(--ink);}
  .filters button.on{background:linear-gradient(180deg,#6fc6ff,var(--blue));color:#fff;}
  .stock-grid{flex:1 1 auto;overflow-y:auto;padding:4px 10px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;align-content:start;}
  .stock-grid::-webkit-scrollbar{width:7px;}.stock-grid::-webkit-scrollbar-thumb{background:var(--ink);border-radius:4px;}
  .stock-grid .part{cursor:grab;}
  .stock-grid .part.used{opacity:.32;filter:grayscale(.7);pointer-events:none;}
  .stock-grid .part .ptype,.stock-grid .part .pgrip{display:none;}
  .stock-grid .part .ptag{font-size:13px;}
  .seedlbl{grid-column:1/-1;font-size:11px;font-weight:900;color:#fff;margin:5px 0 1px;padding:3px 11px;border-radius:7px;background:linear-gradient(90deg,var(--ink),transparent);box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .seedlbl:first-child{margin-top:0;}
  .part img{display:none;}

  /* ドラッグゴースト */
  #dragGhost{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;width:165px;opacity:.94;transform:translate(-50%,-50%) rotate(-3deg) scale(1.05);filter:drop-shadow(0 8px 14px rgba(0,0,0,.45));display:none;}
  #dragGhost .part{margin:0;cursor:grabbing;}
  body.dragging-active{cursor:grabbing;}
</style>
</head>
<body>
<div id="app">

  <!-- ヘッダー -->
  <header id="hdr">
    <div class="hd-title"><b>ネタ構成</b><span>打線を組む</span></div>
    <div class="hd-spacer"></div>
    <div class="tegotae">
      <span class="lbl">手応え</span>
      <span class="val" id="tegotaeVal">0</span>
      <span class="unit">点</span>
      <span class="approx">概算</span>
    </div>
    <div class="form-toggle">
      <span class="ft-lbl">ネタ形式</span>
      <div class="switch is-shab" id="formSwitch">
        <span class="knob"></span>
        <span class="opt opt-shab">しゃべくり</span>
        <span class="opt opt-konto">コント</span>
      </div>
    </div>
  </header>

  <!-- コンボ帯 -->
  <div id="comboBar">
    <span class="cb-label">コンボ</span>
    <div class="combo-chips" id="comboChips">
      <span class="chip none">パーツを並べてコンボを狙え</span>
    </div>
  </div>

  <!-- 打線 -->
  <main id="lineupArea">
    <div class="lineup" id="lineup"></div>
  </main>

  <!-- パーツ庫 -->
  <section id="inventory">
    <div class="inv-head">
      <span class="inv-title">パーツ庫</span>
      <div class="filters" id="filters">
        <button data-f="all" class="on">すべて</button>
        <button data-f="ツカミ">ツカミ</button>
        <button data-f="フリ">フリ</button>
        <button data-f="ボケ">ボケ</button>
        <button data-f="ツッコミ">ツッコミ</button>
        <button data-f="オチ">オチ</button>
      </div>
    </div>
    <div class="stock-grid" id="stockGrid"></div>
  </section>
</div>

<script src="neta-builder-logic.js"></script>
</body>
</html>
