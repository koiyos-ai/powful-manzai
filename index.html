<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16234f">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パワフル漫才">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<title>パワフル漫才</title>
<style>
  :root{
    --ink:#16234f; --ink-d:#0e1838;
    --yellow:#ffce2b; --red:#ff5252; --red-d:#d63a3a;
    --blue:#34a6ff; --blue-d:#1f7fc0;
    --green:#3ccf6e; --green-d:#2aa052;
    --orange:#ff9a3c; --cream:#fff8e6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  html{background:#0a1130;}
  body{
    font-family:'DotGothic16','Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;
    font-weight:400;color:var(--ink);
    -webkit-font-smoothing:none;font-smooth:never;
    touch-action:manipulation;user-select:none;-webkit-user-select:none;overscroll-behavior:none;
  }
  #app{
    position:fixed;inset:0;max-width:520px;margin:0 auto;
    height:100vh;height:100dvh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    padding:max(20px,env(safe-area-inset-top)) 20px max(16px,env(safe-area-inset-bottom));
    background:
      radial-gradient(circle at 50% 6%, #ffffff 0%, transparent 38%),
      linear-gradient(180deg,#7fd0ff 0%, #bfe9ff 42%, #ffe9c2 100%);
  }

  /* ===== タイトルロゴ ===== */
  .title-area{flex:none;text-align:center;margin-top:4px;}
  .logo{
    font-size:clamp(34px,11vw,46px);font-weight:900;color:var(--yellow);
    letter-spacing:.02em;line-height:1.05;
    -webkit-text-stroke:5px var(--ink);paint-order:stroke fill;
    text-shadow:0 5px 0 rgba(22,35,79,.32);
  }
  .tagline{
    display:inline-block;margin-top:9px;font-size:13px;color:#fff;font-weight:900;
    background:var(--red);border:3px solid var(--ink);border-radius:999px;
    padding:3px 18px;box-shadow:0 3px 0 var(--ink);letter-spacing:.05em;
  }

  /* ===== キャラ（主人公＋矢田） ===== */
  .hero-duo{
    flex:1 1 auto;min-height:0;width:100%;
    display:flex;align-items:flex-end;justify-content:center;
    position:relative;margin:8px 0 2px;
  }
  .hero-duo::after{
    content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
    width:74%;height:22px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(22,35,79,.20),transparent 70%);
  }
  .ch{
    max-height:100%;max-width:47%;width:auto;height:auto;object-fit:contain;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.22));position:relative;
    animation:floaty 3.4s ease-in-out infinite;
  }
  .ch-hero{margin-right:-8px;z-index:2;}
  .ch-partner{margin-left:-8px;z-index:1;max-height:90%;animation-delay:.5s;}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

  /* ===== メニュー ===== */
  .menu{flex:none;width:100%;display:flex;flex-direction:column;gap:11px;margin-top:4px;}
  .menu-btn{
    display:flex;align-items:center;gap:13px;text-decoration:none;color:#fff;
    border:4px solid var(--ink);border-radius:18px;padding:10px 15px;
    box-shadow:0 6px 0 var(--ink),0 9px 11px rgba(0,0,0,.18);
    transition:transform .07s,box-shadow .07s;
  }
  .menu-btn:active{transform:translateY(5px);box-shadow:0 1px 0 var(--ink),0 2px 5px rgba(0,0,0,.18);}
  .mb-success{background:linear-gradient(180deg,#ff8a6a,var(--red));}
  .mb-manzai{background:linear-gradient(180deg,#5bb8ff,var(--blue));}
  .mb-neta{background:linear-gradient(180deg,#5be08a,var(--green));}
  .mb-ico{
    flex:none;width:48px;height:48px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    background:var(--ink);border:2.5px solid rgba(255,255,255,.65);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.14),inset 0 -2px 0 rgba(0,0,0,.25);
  }
  .pix{width:32px;height:32px;display:block;image-rendering:pixelated;}
  .mb-txt{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.2;text-align:left;text-shadow:0 1px 1px rgba(0,0,0,.28);}
  .mb-txt b{font-size:21px;font-weight:900;letter-spacing:.03em;}
  .mb-txt small{font-size:12px;font-weight:400;opacity:.92;margin-top:3px;letter-spacing:-.02em;}
  .mb-arrow{flex:none;font-size:15px;opacity:.85;}

  /* ===== フッター ===== */
  .foot{flex:none;margin-top:12px;font-size:11px;font-weight:800;color:rgba(22,35,79,.5);text-align:center;letter-spacing:.03em;}
</style>
</head>
<body>
<div id="app">

  <div class="title-area">
    <h1 class="logo">パワフル漫才</h1>
    <div class="tagline">芸人育成 × リズム漫才</div>
  </div>

  <div class="hero-duo">
    <img src="images/hero.png" alt="主人公" class="ch ch-hero">
    <img src="images/partner.png" alt="矢田" class="ch ch-partner">
  </div>

  <nav class="menu">
    <a class="menu-btn mb-success" href="success-play.html">
      <span class="mb-ico"><svg class="pix" viewBox="0 0 14 14" shape-rendering="crispEdges" fill="#fff" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="1" width="4" height="1"/><rect x="4" y="2" width="6" height="5"/><rect x="5" y="7" width="4" height="1"/><rect x="6" y="8" width="2" height="3"/><rect x="4" y="11" width="6" height="1"/><rect x="3" y="12" width="8" height="1"/></svg></span>
      <span class="mb-txt"><b>サクセス</b><small>芸人を育てる（育成モード）</small></span>
      <span class="mb-arrow">▶</span>
    </a>
    <a class="menu-btn mb-manzai" href="manzai-play.html">
      <span class="mb-ico"><svg class="pix" viewBox="0 0 14 14" shape-rendering="crispEdges" fill="#fff" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="2" width="1" height="7"/><rect x="6" y="2" width="3" height="2"/><rect x="6" y="4" width="2" height="1"/><rect x="2" y="9" width="4" height="3"/></svg></span>
      <span class="mb-txt"><b>漫才プレイ</b><small>リズムで本番（劇場・賞レース）</small></span>
      <span class="mb-arrow">▶</span>
    </a>
    <a class="menu-btn mb-neta" href="neta-builder.html">
      <span class="mb-ico"><svg class="pix" viewBox="0 0 14 14" shape-rendering="crispEdges" fill="#fff" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="9" height="1"/><rect x="2" y="11" width="9" height="1"/><rect x="2" y="2" width="1" height="10"/><rect x="10" y="2" width="1" height="10"/><rect x="4" y="5" width="5" height="1"/><rect x="4" y="7" width="5" height="1"/><rect x="4" y="9" width="4" height="1"/></svg></span>
      <span class="mb-txt"><b>ネタ構成</b><small>打線を組む（ネタ作り）</small></span>
      <span class="mb-arrow">▶</span>
    </a>
  </nav>

  <div class="foot">芸歴7年目 ─ M-1優勝へ ／ prototype</div>
</div>
</body>
</html>
